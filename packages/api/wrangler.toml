# LabWired API Worker — Cloudflare configuration
# After running `wrangler kv:namespace create KV_KEYS` etc., paste the returned IDs below.
name = "labwired-api"
main = "src/index.ts"
compatibility_date = "2025-05-14"
compatibility_flags = ["nodejs_compat"]
# Custom domain temporarily disabled for dry-run deploy to *.workers.dev.
# Re-enable after curl verifies the workers.dev URL responds correctly.
# routes = [{ pattern = "api.labwired.com", custom_domain = true }]

# ── KV namespaces ────────────────────────────────────────────────────────────
# Replace the id/preview_id values with the real namespace IDs you get from:
#   wrangler kv:namespace create KV_KEYS
#   wrangler kv:namespace create KV_WORKSPACES
#   wrangler kv:namespace create KV_STRIPE_SUBS

[[kv_namespaces]]
binding = "KV_KEYS"
id = "5d15fd1dfc2c46f9b4c33ea9f4c1ccc4"

[[kv_namespaces]]
binding = "KV_WORKSPACES"
id = "bceec07d091b4238be0d9e322b76bf69"

[[kv_namespaces]]
binding = "KV_STRIPE_SUBS"
id = "1a683745399d43ef93c97c6568d191a4"

# ── Secrets (set via `wrangler secret put <NAME>`) ───────────────────────────
# Do NOT put real values here. This block just declares the expected names.
# See .dev.vars.example for local development stubs.
#
# Required secrets:
#   STRIPE_SECRET_KEY         — Stripe restricted key (NOT the leaked one!)
#   STRIPE_WEBHOOK_SECRET     — Signing secret from Stripe webhook endpoint
#   RESEND_API_KEY            — Resend API key for transactional email
#   CLERK_SECRET_KEY          — Clerk backend secret key.
#                               Register the Clerk app at https://dashboard.clerk.com → API Keys → Secret keys.

# ── Environment variables ────────────────────────────────────────────────────
[vars]
LABWIRED_API_BASE = "https://api.labwired.com"
FROM_EMAIL = "onboarding@labwired.com"
PRO_CYCLES_QUOTA = "100000000"
ENVIRONMENT = "production"
# Public Clerk JWT verification key (PEM). Paste from Clerk dashboard → API Keys.
CLERK_JWT_KEY = ""
