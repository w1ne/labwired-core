      probe: "ST-LINK V2 J36 (NUCLEO-L476RG onboard) — mass-erased to clean reset state"
      result: "l476_mmio_diff 15/15 + parity 104/104, 0 divergence vs live silicon (L476_STRICT)"
    models:
