      - "h563_mmio_diff::{h563_mmio_sim_only,h563_parity_sim_only,h563_class_sim_only}"
    silicon:
      last_capture: 2026-06-22
      probe: "STLINK-V3 (USB 0483:374e, NUCLEO-H563ZI, dapdirect AP1 recipe)"
      result: "FLASH program-behaviour live-diff run on the board 2026-06-22 (drives real program/erase over SWD): write buffer (NSSR.WBNE) accumulates a 16-byte quad-word, commits + sets EOP only on completion; a misaligned quad-word raises INCERR alone and commits nothing; program-over-not-erased is permitted and ANDs the bits (no PGSERR); flags clear via NSCCR (0x30), not by writing NSSR. The sim H5 flash error-flag + read-while-write fidelity gates were CORRECTED to match this capture (earlier datasheet model was wrong on all four points). Prior MMIO/reset diff (h563_mmio_diff + h563_parity_diff + h563_class_diff, 0 divergence) still holds."
    # FLASH model extended for UDS OTA: NSCR sector-erase + OPTSR_PRG.SWAP_BANK/
    # OBL_LAUNCH (drained in Machine::step / batched run) + H563 sized in MiB,
    # plus opt-in program error-flag (WRPERR/PGSERR/INCERR) and read-while-write
    # fidelity gates (default off). The erase/program *behavioural* live-diff
    # (writes real flash over SWD) WAS run on 2026-06-22 and the model corrected
    # to match silicon (write-buffer/EOP/INCERR/NSCCR; see result above).
    # 2026-06-24: fdcan.rs changed for the async-TX fix (#336/#342) — request_tx
    # now queues into pending_tx and drain_pending_tx delivers on the next tick,
    # so TXBRP stays asserted from the TXBAR write until the following tick
    # (matches real M_CAN; prevents the udslib #88 reset-before-TX false-pass).
    # TX-completion *timing* change, NOT a register-reset-value change: the prior
    # MMIO/parity/class reset diffs (0 divergence) and the 2026-06-22 FLASH
    # behavioural capture still hold. Live re-diff of FDCAN TX timing over SWD is
    # tracked as a follow-up (no H563 probe attached this session).
    # 2026-06-26: uart.rs generalised — UartRegMap gained status_width/status_idle/
    # rx_present_set/rx_present_clear and 20+ vendor layouts were added for the
    # onboarding library. The Stm32V2 arm (this board's USART) reproduces the prior
    # hardcoded behaviour byte-for-byte (ISR@0x1C, TDR@0x28, RDR@0x24, status_idle
    # 0xC0=TXE|TC, RXNE 1<<5, TXEIE 1<<7/TCIE 1<<6); h563_mmio_diff/parity pass
    # unchanged, so no behavioural change to this board's pinned registers.
    # 2026-06-27: Stm32V2 USART now persists BRR (USARTDIV @ 0x0C) for read-back
    # fidelity (was dropped → read 0). Additive and read-back only — no byte-path
    # or reset-value change; h563_mmio_diff/parity (which don't write-then-read BRR)
    # pass unchanged. No live re-capture this session.
    drift_ack: 2026-06-27
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/i2c.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/gpdma.rs
      - crates/core/src/peripherals/adc.rs
      - crates/core/src/peripherals/rtc_v3.rs
      - crates/core/src/peripherals/fdcan.rs
      - crates/core/src/peripherals/crc.rs
      - crates/core/src/peripherals/pwr.rs
      - crates/core/src/peripherals/flash.rs
      - crates/core/src/peripherals/iwdg.rs
      - crates/core/src/peripherals/wwdg.rs
      - crates/core/src/peripherals/rng.rs
