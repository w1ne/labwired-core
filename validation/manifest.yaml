    tier: silicon-smoke
    offline_tests:
      - "stm32l0_mmio_diff::{l0_mmio_sim_only,l0_parity_sim_only}"
      - "firmware_survival L073 smoke case"
    silicon:
      last_capture: 2026-06-03
      probe: "ST-LINK SWD (NUCLEO-L073RZ)"
      result: "boot + USART2 byte-parity; RCC/GPIO/SPI1/TIM2/TIM21 mmio diff (IDCODE 0x2008_6447)"
    drift_ack: 2026-06-14   # shared uart/timer/dma models advanced to 06-14; re-capture pending
    models:
