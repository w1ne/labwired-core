    doc: docs/boards/nrf52840.md
    chip: configs/chips/nrf52840.yaml
    tier: silicon-verified
    offline_tests:
      - "nrf52_conformance::conformance_sim (digest vs frozen 2026-06-09 capture)"
      - "nrf52_mmio_diff / nrf52_gpio_conformance (sim halves)"
    silicon:
      last_capture: 2026-06-17
      probe: "ST-LINK V2 (J37S7)"
      result: "conformance 16/16; mmio 16/16; GPIO P0 22/0, P1 23/0; onboarding 22/22; POWER 10/0, SPIS 19/0, TWIS 20/0, RTC0 12/0, TIMER0 16/0; SPIM0/CCM/full-register clean"
    # The UARTE model gained an EasyDMA TX path (STARTTX now reads the TXD buffer,
    # emits the bytes, and raises TXSTARTED/TXDRDY/ENDTX/TXSTOPPED) so an unmodified
    # nrfx console boots under the sim. Additive: the 2026-06-17 register sweep
    # (conformance/mmio/GPIO/POWER/SPIS/TWIS/RTC/TIMER) is unaffected. No live SWD
    # re-capture of the new TX register sequence was run this session (no bench
    # board); a UARTE TX live diff is tracked.
    # 2026-06-27: SAADC + PWM gained Tier-3 behavioral engines (real conversion /
    # duty output) for the coverage matrix. Additive and behavioral-only; the
    # 2026-06-17 register sweep is unaffected. No live SWD re-capture this session.
    drift_ack: 2026-06-27
    models:
      - crates/core/src/peripherals/nrf52
      - configs/chips/nrf52840.yaml

