# LabWired board validation manifest — the source of truth for what is actually
# validated, and against which silicon, on what date.
#
# WHY THIS FILE EXISTS
#   The board docs (docs/boards/*.md) used to be hand-written and drifted out of
#   sync with the models and tests (some claimed less than was true, some more).
#   This manifest is the machine-checkable record. `scripts/generate_validation_status.py`
#   renders docs/boards/VALIDATION_STATUS.md from it on every CI run and fails the
#   build if (a) the generated doc is stale, or (b) a peripheral model changed
#   AFTER the board's last silicon capture without an explicit, dated drift_ack.
#
# THE HONESTY RULE
#   CI runners have no hardware, so the only thing CI can re-prove each run is the
#   OFFLINE oracle suite (sim vs the silicon values frozen into the test sources).
#   A `silicon.last_capture` is a HUMAN ASSERTION that a live `--ignored` diff was
#   run on that date with that result. When you re-run a live diff (board plugged
#   in, `--features hw-oracle-* -- --ignored`), update last_capture + result here.
#
# DRIFT
#   `models` lists the source paths whose change can invalidate the capture. The
#   generator takes the newest git commit date across them. If that date is newer
#   than last_capture, the board has DRIFTED — its "silicon-verified" claim is
#   stale until re-captured. `drift_ack` is an explicit, dated acknowledgement
#   ("yes, the model changed on this date, re-capture is tracked") that keeps CI
#   green; any model change PAST the ack date re-fails the gate. No silent decay.
#
# TIERS
#   silicon-verified   — live register/behaviour diff vs real silicon (dated)
#   silicon-smoke      — boot + one path (usually UART) byte-parity vs silicon
#   sim-validated      — deep peripheral models + green sim/e2e tests, but no
#                        silicon-diff oracle yet (model is real; HW diff is the gap)
#   smoke-manual       — a manual runbook exists; no automated/silicon assertion
#   structural         — thin/declarative model only (e.g. UART0 stub), no silicon

boards:
  # ── Fresh: re-verified on live silicon 2026-06-17 ────────────────────────────
