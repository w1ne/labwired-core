    # sweep (conformance/mmio/GPIO/POWER/SPIS/TWIS/RTC/TIMER) is unaffected. No live
    # SWD re-capture of the legacy-UART TX sequence this session (no bench board).
    # 2026-07-10: bus-trace single-choke-point refactor (attach wraps at SystemBus::attach_i2c_slave/attach_spi_device; no per-callsite set_bus_trace) + cycle stamp on trace events + gpio_routing/pin_routing metadata. Additive; oracle output unchanged.
    # 2026-07-19: unified stimulus interface — every bus controller gained a
    # `for_each_attached_sim_input` impl (and TWIM/SPIM gained `as_any` +
    # attached-device accessors) so SimInput reaches devices without
    # downcasting. PURELY ADDITIVE: `git diff` over every model file listed
    # below shows 0 removed lines — no existing method body was modified, so
    # no register read/write path changed. Reset values, register layout and
    # byte paths are unchanged; the mmio/conformance diffs pass unchanged.
    # Drift is the shared-file commit date only. No live re-capture.
    # 2026-07-20: per-cycle-walk participation only. Six shared peripheral
    # models (gpio, stub, nrf52 timer/egu/temp/uarte) gained
    # `legacy_tick_active()` / `legacy_tick_dynamic()` overrides so peripherals
    # that do nothing are skipped by the legacy walk (nRF54L15 measured
    # 2.74M -> 5.09M IPS). PURELY ADDITIVE: `git diff origin/main..HEAD` over
    # those six files shows +12/+18 and **0 removed lines** — no existing method
    # body was touched, so no register read/write path, reset value or layout
    # changed. A peripheral is skipped ONLY in states where its `tick()` already
    # returned a default PeripheralTickResult (or where it overrides no tick at
    # all), and the bus re-arms the entry via `refresh_legacy_tick_index()` on
    # any MMIO write. GPIOTE was tried the same way and REVERTED — its tick()
    # detects IN edges rather than draining a queue, and
    # nrf52840_onboarding_gpiote_event_in_fires_on_edge caught it. Offline
    # oracle/mmio/conformance suites pass unchanged. No live re-capture.
    # 2026-07-21: GPIOTE now DOES opt out of the walk — but safely, unlike the
    # reverted attempt. `legacy_tick_active()` returns true whenever any queue
    # is non-empty (pending_gpio_writes / pending_in_events / pending_in_mask),
    # so it stays in the walk exactly when its tick() has an IN edge or GPIO
    # write to deliver, and drops out ONLY when genuinely idle (all queues
    # empty, tick() takes its no-op early return). NVIC also opted out (its
    # tick() is the trait-default no-op). PURELY ADDITIVE: +16/+11, 0 removed
    # lines — no register read/write path, reset value or layout touched.
    # EVIDENCE it is byte-identical: nrf52840_onboarding_gpiote_event_in_fires_
    # on_edge (the exact test that caught the reverted attempt) passes, and all
    # cross-chip walk-vs-scheduler byte-identical differentials pass (82 walk
    # tests + f401/h563/l073/l476 Zephyr-boot). No live re-capture required.
    # 2026-07-22: BLE virtual air moved from a process-static (static AIR) to an
    # injected VirtualAirBus handle each Nrf52Radio holds. Nrf52Radio::new() (what
    # the factory builds) binds a transitional process-global bus, so existing
    # behaviour is byte-identical: cross_instance_via_virtual_air and
    # nrf52840_ble_loopback_through_virtual_air pass UNCHANGED. No register
    # read/write path, reset value or layout touched — drift is the shared nrf52
    # file commit date only. No live re-capture.
    # 2026-07-24: IR-component-engine retirement (phase B) removed the dead
    # `type: ir` SPI escape-hatch branch from nrf52/factory.rs. No register
    # read/write path, reset value or layout touched — drift is the shared nrf52
    # file commit date only. No live re-capture.
    drift_ack: 2026-07-24
    models:
      - crates/core/src/peripherals/nrf52
      - configs/chips/nrf52840.yaml

