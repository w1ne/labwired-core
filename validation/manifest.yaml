# LabWired board validation manifest — the source of truth for what is actually
# validated, and against which silicon, on what date.
#
# WHY THIS FILE EXISTS
#   The board docs (docs/boards/*.md) used to be hand-written and drifted out of
#   sync with the models and tests (some claimed less than was true, some more).
#   This manifest is the machine-checkable record. `scripts/generate_validation_status.py`
#   renders docs/boards/VALIDATION_STATUS.md from it on every CI run and fails the
#   build if (a) the generated doc is stale, or (b) a peripheral model changed
#   AFTER the board's last silicon capture without an explicit, dated drift_ack.
#
# THE HONESTY RULE
#   CI runners have no hardware, so the only thing CI can re-prove each run is the
#   OFFLINE oracle suite (sim vs the silicon values frozen into the test sources).
#   A `silicon.last_capture` is a HUMAN ASSERTION that a live `--ignored` diff was
#   run on that date with that result. When you re-run a live diff (board plugged
#   in, `--features hw-oracle-* -- --ignored`), update last_capture + result here.
#
# DRIFT
#   `models` lists the source paths whose change can invalidate the capture. The
#   generator takes the newest git commit date across them. If that date is newer
#   than last_capture, the board has DRIFTED — its "silicon-verified" claim is
#   stale until re-captured. `drift_ack` is an explicit, dated acknowledgement
#   ("yes, the model changed on this date, re-capture is tracked") that keeps CI
#   green; any model change PAST the ack date re-fails the gate. No silent decay.
#
# TIERS
#   silicon-verified   — live register/behaviour diff vs real silicon (dated)
#   silicon-smoke      — boot + one path (usually UART) byte-parity vs silicon
#   sim-validated      — deep peripheral models + green sim/e2e tests, but no
#                        silicon-diff oracle yet (model is real; HW diff is the gap)
#   smoke-manual       — a manual runbook exists; no automated/silicon assertion
#   structural         — thin/declarative model only (e.g. UART0 stub), no silicon

boards:
  # ── Fresh: re-verified on live silicon 2026-06-17 ────────────────────────────
  - id: nrf52840
    doc: docs/boards/nrf52840.md
    chip: configs/chips/nrf52840.yaml
    tier: silicon-verified
    offline_tests:
      - "nrf52_conformance::conformance_sim (digest vs frozen 2026-06-09 capture)"
      - "nrf52_mmio_diff / nrf52_gpio_conformance (sim halves)"
    silicon:
      last_capture: 2026-06-17
      probe: "ST-LINK V2 (J37S7)"
      result: "conformance 16/16; mmio 16/16; GPIO P0 22/0, P1 23/0; onboarding 22/22; POWER 10/0, SPIS 19/0, TWIS 20/0, RTC0 12/0, TIMER0 16/0; SPIM0/CCM/full-register clean"
    models:
      - crates/core/src/peripherals/nrf52
      - configs/chips/nrf52840.yaml

  - id: seeed-xiao-nrf52840-sense
    doc: docs/boards/seeed-xiao-nrf52840-sense.md
    chip: configs/chips/nrf52840.yaml
    tier: silicon-verified
    note: "Same silicon as nrf52840 (the bench board IS a Seeed XIAO nRF52840 Sense)."
    offline_tests:
      - "nrf52.rs xiao_* (manifest build, GPIO task regs, SPIM0 EasyDMA)"
    silicon:
      last_capture: 2026-06-17
      probe: "ST-LINK V2 (J37S7)"
      result: "rides the nrf52840 full register sweep (16/16) re-confirmed 2026-06-17"
    models:
      - crates/core/src/peripherals/nrf52
      - configs/chips/nrf52840.yaml

  - id: stm32h563
    doc: docs/boards/stm32h563.md
    chip: configs/chips/stm32h563.yaml
    tier: silicon-verified
    offline_tests:
      - "h563_conformance (5 tests vs frozen 2026-06-10..12 captures)"
      - "h563_mmio_diff::{h563_mmio_sim_only,h563_parity_sim_only,h563_class_sim_only}"
    silicon:
      last_capture: 2026-06-22
      probe: "STLINK-V3 (USB 0483:374e, NUCLEO-H563ZI, dapdirect AP1 recipe)"
      result: "FLASH program-behaviour live-diff run on the board 2026-06-22 (drives real program/erase over SWD): write buffer (NSSR.WBNE) accumulates a 16-byte quad-word, commits + sets EOP only on completion; a misaligned quad-word raises INCERR alone and commits nothing; program-over-not-erased is permitted and ANDs the bits (no PGSERR); flags clear via NSCCR (0x30), not by writing NSSR. The sim H5 flash error-flag + read-while-write fidelity gates were CORRECTED to match this capture (earlier datasheet model was wrong on all four points). Prior MMIO/reset diff (h563_mmio_diff + h563_parity_diff + h563_class_diff, 0 divergence) still holds."
    # FLASH model extended for UDS OTA: NSCR sector-erase + OPTSR_PRG.SWAP_BANK/
    # OBL_LAUNCH (drained in Machine::step / batched run) + H563 sized in MiB,
    # plus opt-in program error-flag (WRPERR/PGSERR/INCERR) and read-while-write
    # fidelity gates (default off). The erase/program *behavioural* live-diff
    # (writes real flash over SWD) WAS run on 2026-06-22 and the model corrected
    # to match silicon (write-buffer/EOP/INCERR/NSCCR; see result above).
    drift_ack: 2026-06-22
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/i2c.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/gpdma.rs
      - crates/core/src/peripherals/adc.rs
      - crates/core/src/peripherals/rtc_v3.rs
      - crates/core/src/peripherals/fdcan.rs
      - crates/core/src/peripherals/crc.rs
      - crates/core/src/peripherals/pwr.rs
      - crates/core/src/peripherals/flash.rs
      - crates/core/src/peripherals/iwdg.rs
      - crates/core/src/peripherals/wwdg.rs
      - crates/core/src/peripherals/rng.rs
      - configs/chips/stm32h563.yaml

  # ── Silicon-verified once, but shared models drifted since (acknowledged) ─────
  - id: esp32c3
    doc: docs/boards/esp32c3.md
    chip: configs/chips/esp32c3.yaml
    tier: silicon-verified
    note: "Reset-state oracle, not behavioural. ~40 peripherals declared (NOT 6 as the prose doc says)."
    offline_tests:
      - "esp32c3_reset_conformance::esp32c3_reset_values_match_silicon (79 regs; 366/423 overlap matched silicon)"
    silicon:
      last_capture: 2026-06-17
      probe: "USB-JTAG (built-in, openocd-esp32) — re-verified live"
      result: "reset oracle re-captured live 2026-06-17: 1123/1123 static registers match committed baseline (13 deltas all in per-chip efuse + live USB-device state, none in the asserted set); esp32c3_reset_values_match_silicon passes"
    models:
      - crates/core/src/peripherals/esp32c3
      - crates/core/src/peripherals/esp_xtensa_common
      - configs/chips/esp32c3.yaml
    # 2026-06-20: added behavioural I2C0 controller (esp32c3/i2c.rs) + external-device
    # slave-attach. Live I2C0 reset capture this date over USB-JTAG is byte-identical to
    # the model (CTR=0x20b, FIFO_CONF=0x408b, FIFO_ST=0, TO=0x10, INT_RAW=0x2). Full
    # 79-reg live re-capture tracked; this ack covers the model change in the interim.
    drift_ack: 2026-06-20

  - id: nucleo-l476rg
    doc: docs/boards/nucleo-l476rg.md
    chip: configs/chips/stm32l476.yaml
    tier: silicon-verified
    note: "Register diff covers RCC/GPIO/SPI1/TIM2 (15 mmio cases + 104-pattern parity sweep), NOT a full-chip sweep — the prose doc's 'every peripheral exercised' is still an overstatement; this is the honest scope."
    offline_tests:
      - "l476_mmio_diff::{l476_mmio_sim_only,l476_parity_sim_only}"
      - "firmware_survival L476 cases (UART byte stream)"
    silicon:
      last_capture: 2026-06-20
      probe: "STLINK-V2.1 (USB 0483:374b serial 0670FF…1747, NUCLEO-L476RG onboard)"
      result: "Live re-capture after the v0.17.0 merge: l476_mmio_diff + l476_parity_diff pass (15 mmio + 104 parity), 0 divergence. Supersedes the 2026-06-19 drift_ack."
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/i2c.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/dma.rs
      - crates/core/src/peripherals/adc.rs
      - crates/core/src/peripherals/rtc_v3.rs
      - crates/core/src/peripherals/crc.rs
      - crates/core/src/peripherals/pwr.rs
      - configs/chips/stm32l476.yaml

  - id: nucleo-l073rz
    doc: docs/boards/nucleo-l073rz.md
    chip: configs/chips/stm32l073.yaml
    tier: silicon-verified
    note: "Register diff covers RCC/GPIO/SPI1/TIM2/TIM21 (20 mmio cases) — not a full-chip sweep. Caught + fixed a real model bug: L0 TIM2 was declared 32-bit (L4 assumption); genuine L0 TIM2 is 16-bit, yaml corrected to width:16."
    offline_tests:
      - "stm32l0_mmio_diff::{l0_mmio_sim_only,l0_parity_sim_only}"
      - "firmware_survival L073 smoke case"
    silicon:
      last_capture: 2026-06-20
      probe: "ST-LINK V2.1 (NUCLEO-L073RZ over SWD)"
      result: "Live re-capture after the v0.17.0 merge: l0_mmio_diff 20/20, 0 divergence (RCC/GPIO/SPI1/TIM2/TIM21, incl. the TIM2-16-bit fix). Supersedes the 2026-06-19 drift_ack."
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/dma.rs
      - crates/core/src/peripherals/crc.rs
      - configs/chips/stm32l073.yaml

  - id: stm32f103
    doc: docs/boards/stm32f103.md
    chip: configs/chips/stm32f103.yaml
    tier: silicon-verified
    note: "Prose doc is STALE-PESSIMISTIC: lists SPI/TIM/ADC/CAN/RTC/IWDG/WWDG as 'not modeled' — all are modeled AND silicon-pinned."
    offline_tests:
      - "stm32f1_mmio_diff::{f1_reset_sim_only,f1_mmio_sim_only,f1_parity_sim_only,f1_sweep_sim_only}"
      - "f103_conformance::conformance_sim (digest)"
    silicon:
      last_capture: 2026-06-20
      probe: "ST-LINK V2.1 (USB 0483:374b), genuine STM32F103"
      result: "Live re-capture after the v0.17.0 bxcan/clock-gating merge: stm32f1_mmio_diff 102/102 (24 reset + 26 R/W + 52 sweep), 0 divergence, and f103_conformance digest matches silicon. Supersedes the 2026-06-19 drift_ack. (Earlier capture caught + fixed a classic SPI CR1 bug masking CRCNEXT bit 12 — 0xEFFF vs silicon 0xFFFF.)"
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/afio.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/i2c.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/dma.rs
      - crates/core/src/peripherals/adc.rs
      - crates/core/src/peripherals/bxcan.rs
      - crates/core/src/peripherals/rtc_f1.rs
      - crates/core/src/peripherals/iwdg.rs
      - crates/core/src/peripherals/wwdg.rs
      - configs/chips/stm32f103.yaml

  - id: stm32f407
    doc: docs/boards/stm32f407.md
    chip: configs/chips/stm32f407.yaml
    tier: silicon-smoke
    note: "examples/nucleo-f407-i2c/VALIDATION.md badges '✅ Hardware-validated 2026-05-11' but I²C/UART/GPIO models were rewritten in June with no re-capture — STALE."
    offline_tests:
      - "stm32f4_mmio_diff::{f4_reset_sim_only,f4_sweep_sim_only,f4_behavior_sim_only}"
      - "firmware_survival F407 smoke + i2c cases (sim-self-pinned)"
    silicon:
      last_capture: 2026-06-20
      probe: "ST-LINK/V2 (USB 0483:3748, IDCODE 0x10016413) — connect-under-reset (firmware was holding SWD), adapter 480 kHz"
      result: "Live re-capture after the v0.17.0 merge: stm32f4_mmio_diff 37/37 (2 reset + 31 sweep + 4 behaviour), 0 divergence. Caught + fixed a real model bug: F407 silicon does NOT latch SPI1 CR1 bit 12 (CRCNEXT) — writes 0xFFFF, reads 0xEFFF — vs F103 which keeps it writable; spi.rs now applies a per-part cr1_mask (F4 0xEFFF). Supersedes the 2026-06-19 drift_ack. (I²C/UART models still smoke-tier — not in the mmio diff.)"
    models:
      - crates/core/src/peripherals/rcc.rs
      - crates/core/src/peripherals/gpio.rs
      - crates/core/src/peripherals/uart.rs
      - crates/core/src/peripherals/i2c.rs
      - crates/core/src/peripherals/spi.rs
      - crates/core/src/peripherals/timer.rs
      - crates/core/src/peripherals/dma.rs
      - configs/chips/stm32f407.yaml

