name: "LabWired test"
description: "Boot firmware on LabWired and assert against it — digital-twin firmware CI in one step."
branding:
  icon: cpu
  color: purple

inputs:
  script:
    description: "Path to the LabWired test script (YAML)."
    required: true
  version:
    description: "LabWired release tag to use, or 'latest'."
    required: false
    default: "v0.18.0"
  repo:
    description: "Repository that publishes the LabWired releases."
    required: false
    default: "w1ne/labwired-core"
  args:
    description: "Whitespace-separated extra flags appended to `labwired test` (shell quoting is not interpreted)."
    required: false
    default: ""
  junit:
    description: "Path to write a JUnit XML report."
    required: false
    default: "labwired-junit.xml"
  output-dir:
    description: "Directory for run artifacts (result.json, uart.log)."
    required: false
    default: "labwired-artifacts"
  upload-artifacts:
    description: "Upload the output dir + JUnit report as a workflow artifact."
    required: false
    default: "true"
  github-token:
    description: "Token used to download the release (defaults to the job token)."
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Install LabWired
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        LABWIRED_VERSION: ${{ inputs.version }}
        LABWIRED_REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        ver="$LABWIRED_VERSION"
        repo="$LABWIRED_REPO"
        if ! [[ "$repo" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
          echo "::error::repo must use the owner/name form."
          exit 1
        fi
        if [ "$ver" = "latest" ]; then
          ver="$(gh release view --repo "$repo" --json tagName -q .tagName)"
        fi
        if ! [[ "$ver" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::version must be a vMAJOR.MINOR.PATCH release tag or latest."
          exit 1
        fi
        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)            plat=linux-x86_64 ;;
          Linux-aarch64|Linux-arm64) plat=linux-aarch64 ;;
          Darwin-x86_64)           plat=darwin-x86_64 ;;
          Darwin-arm64)            plat=darwin-aarch64 ;;
          *) echo "::error::unsupported runner $(uname -s)-$(uname -m)"; exit 1 ;;
        esac
        asset="labwired-${ver}-${plat}.tar.gz"
        dir="$RUNNER_TEMP/labwired"
        mkdir -p "$dir"
        echo "Downloading ${asset} from ${repo}@${ver}"
        gh release download "$ver" --repo "$repo" --pattern "$asset" --dir "$dir"
        tar -xzf "$dir/$asset" -C "$dir"
        chmod +x "$dir/labwired"
        echo "$dir" >> "$GITHUB_PATH"

    - name: Run LabWired test
      shell: bash
      env:
        LABWIRED_SCRIPT: ${{ inputs.script }}
        LABWIRED_JUNIT: ${{ inputs.junit }}
        LABWIRED_OUTPUT_DIR: ${{ inputs.output-dir }}
        LABWIRED_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        command=(labwired test
          --script "$LABWIRED_SCRIPT"
          --junit "$LABWIRED_JUNIT"
          --output-dir "$LABWIRED_OUTPUT_DIR")
        if [ -n "$LABWIRED_ARGS" ]; then
          read -r -a extra_args <<< "$LABWIRED_ARGS"
          command+=("${extra_args[@]}")
        fi
        "${command[@]}"

    - name: Upload artifacts
      if: ${{ always() && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: labwired-${{ github.job }}-${{ github.run_id }}
        path: |
          ${{ inputs.output-dir }}
          ${{ inputs.junit }}
        if-no-files-found: ignore
