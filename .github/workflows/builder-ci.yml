# Build the labwired CLI from the core submodule and run the labwired-builder
# test suite against it.  Triggered on PRs that touch the builder service or
# the core submodule pointer.

name: Builder CI

on:
  pull_request:
    paths:
      - "services/labwired-builder/**"
      - "core"
      - ".github/workflows/builder-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "services/labwired-builder/**"
      - "core"
      - ".github/workflows/builder-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: builder tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules
        # labwired-landing is private and unfetchable by CI; only fetch what we
        # need. Rewrite the SSH submodule URL to HTTPS so it uses the token
        # actions/checkout persisted (no SSH key in CI).
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 core

      - name: Ensure build toolchain
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "C compiler already available"
            exit 0
          fi

          if command -v clang >/dev/null 2>&1; then
            mkdir -p "$HOME/.local/bin"
            printf '#!/usr/bin/env bash\nexec clang "$@"\n' > "$HOME/.local/bin/cc"
            chmod +x "$HOME/.local/bin/cc"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "Created cc shim to clang"
            exit 0
          fi

          if command -v curl >/dev/null 2>&1 && command -v tar >/dev/null 2>&1; then
            arch="$(uname -m)"
            case "$arch" in
              x86_64)
                zig_pkg="zig-linux-x86_64-0.13.0"
                zig_sha="d45312e61ebcc48032b77bc4cf7fd6915c11fa16e4aad116b66c9468211230ea"
                ;;
              aarch64)
                zig_pkg="zig-linux-aarch64-0.13.0"
                zig_sha="041ac42323837eb5624068acd8b00cd5777dac4cf91179e8dad7a7e90dd0c556"
                ;;
              *)
                zig_pkg=""
                zig_sha=""
                ;;
            esac

            if [ -n "$zig_pkg" ]; then
              mkdir -p "$HOME/.local/zig" "$HOME/.local/bin"
              curl -fsSL "https://ziglang.org/download/0.13.0/${zig_pkg}.tar.xz" -o /tmp/zig.tar.xz
              echo "${zig_sha}  /tmp/zig.tar.xz" | sha256sum --check --strict || { echo "Zig checksum mismatch!"; exit 1; }
              tar -xf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                'args=()' \
                'for a in "$@"; do' \
                '  case "$a" in' \
                '    --target=*-unknown-*) args+=("${a/-unknown-/-}");;' \
                '    *) args+=("$a");;' \
                '  esac' \
                'done' \
                'exec "$HOME/.local/zig/zig" cc "${args[@]}"' \
                > "$HOME/.local/bin/cc"
              printf '%s\n' '#!/usr/bin/env bash' \
                'exec "$HOME/.local/zig/zig" ar "$@"' \
                > "$HOME/.local/bin/ar"
              printf '%s\n' '#!/usr/bin/env bash' \
                'exec "$HOME/.local/zig/zig" ranlib "$@"' \
                > "$HOME/.local/bin/ranlib"
              chmod +x "$HOME/.local/bin/ar" "$HOME/.local/bin/ranlib"
              chmod +x "$HOME/.local/bin/cc"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              echo "Created cc shim to zig cc"
              exit 0
            fi
          fi

          if sudo -n true >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential pkg-config
              exit 0
            fi

            if command -v dnf >/dev/null 2>&1; then
              sudo dnf groupinstall -y "Development Tools"
              sudo dnf install -y pkgconf-pkg-config
              exit 0
            fi

            if command -v yum >/dev/null 2>&1; then
              sudo yum groupinstall -y "Development Tools"
              sudo yum install -y pkgconfig
              exit 0
            fi
          fi

          echo "No usable C toolchain found (no cc/clang, zig bootstrap unavailable, and no passwordless sudo for package install)."
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build labwired CLI (release)
        working-directory: core
        run: cargo build -p labwired-cli --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/labwired-builder/package-lock.json

      - name: Install + test labwired-builder
        working-directory: services/labwired-builder
        env:
          LABWIRED_BIN: ${{ github.workspace }}/core/target/release/labwired
        run: |
          npm ci
          npm test
