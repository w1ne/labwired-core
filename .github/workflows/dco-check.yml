name: DCO Check

on:
  pull_request:
    branches:
      - main

jobs:
  dco:
    name: dco-signoff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on all PR commits
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head" --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: .\+<.\+@.\+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (see CONTRIBUTING.md)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo 'Fix with: git rebase --signoff origin/main && git push --force-with-lease'
            exit 1
          fi
          echo "All commits signed off."
