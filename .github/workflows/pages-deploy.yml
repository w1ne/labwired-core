# Build + deploy the playground to Cloudflare Pages on every push to main.
#
# Project: labwired-playground (https://labwired-playground.pages.dev)
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — Pages:Edit + Account:Read on shylenkoa account
#   CLOUDFLARE_ACCOUNT_ID — 53f45abe9550f62856af4475880e0a77
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY — pk_live_…
#
# If these aren't set, the deploy step fails fast. The workflow can also be
# triggered manually via the Actions tab (workflow_dispatch).

name: Deploy playground to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - "core/**"
      # Bare `core` matches the submodule gitlink itself — `core/**` only
      # matches files INSIDE the submodule, so without this entry a plain
      # `git submodule update; git commit core` bump (which is the normal
      # way wasm changes ship) doesn't trigger the deploy.
      - "core"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: [self-hosted, deploy]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside — we own the PARENT, so the
      # rename succeeds — and checkout recreates it clean. Nightly
      # pluto-maintenance reclaims the .broken.* dirs via docker (root).
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full superproject history (not the default shallow depth-1) so that
          # `github.event.before` is present in the local git object store. The
          # "Detect whether this push changed core" step diffs BEFORE..AFTER to
          # decide whether to rebuild the wasm; with depth-1 the before commit is
          # absent, `git cat-file -e` fails, and we fall through to rebuild=true
          # on EVERY push — defeating the playground-only fast path. depth 0
          # makes the diff work for both single-commit pushes and merge commits.
          fetch-depth: 0
      # Fetch ONLY the `core` submodule (wasm/configs this deploy needs).
      # Skipping the private `landing_page` + `vscode` submodules avoids the
      # intermittent labwired-landing clone failure that aborts checkout, and is
      # faster. `git submodule update core` uses the credentials checkout
      # persisted, so the private `core` still clones.
      - name: Fetch core submodule
        # Rewrite the SSH submodule URL (git@github.com:) to HTTPS so the clone
        # uses the token actions/checkout already persisted (persist-credentials)
        # instead of SSH — there's no SSH key in CI. Same token + rewrite that
        # checkout's own `submodules:` handling uses, but only for `core`.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 core

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      # ---------------------------------------------------------------------
      # Auto-rebuild the wasm engine from the pinned core submodule.
      #
      # The wasm (packages/playground/public/wasm/labwired_wasm_bg.wasm + .js)
      # is a committed prebuilt artifact; Vite copies public/ into dist/ at
      # build time, so whatever wasm sits in public/wasm is what ships. When
      # `core` is bumped without a manual `wasm-pack` rebuild, the deployed
      # engine silently lags the pinned core (e.g. it lacks an SPI register
      # layout a chip config needs → "Simulator init failed" at runtime). This
      # has bitten twice. Rebuilding here — BEFORE the playground build, so the
      # fresh engine is in public/wasm when Vite copies it to dist — makes the
      # shipped wasm always match the pinned core. We do NOT commit it back
      # (no commit-back loop): the rebuild lives only in the CI workspace.
      #
      # The "Verify wasm engine supports bundled chip profiles" gate below then
      # becomes belt-and-suspenders, validating the freshly built engine.
      #
      # PERFORMANCE: the actual build (~2 min) is gated on this push actually
      # touching core (the `core` gitlink, files inside `core/**`, or the wasm
      # crate). Playground-only deploys skip it and ship the committed wasm,
      # which is already correct. The toolchain/wasm-pack install + cargo cache
      # steps run unconditionally — they're cheap on a warm cache and keep the
      # gated build fast when it does run.
      - name: Detect whether this push changed core
        id: core_changed
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          rebuild=false
          # workflow_dispatch (no before) or first push to a branch
          # (before is all-zeros, no valid base to diff) → rebuild to be safe.
          if [ -z "${BEFORE:-}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base commit (manual run or first push) — rebuilding wasm."
            rebuild=true
          elif ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "Base commit ${BEFORE} not present locally — rebuilding wasm to be safe."
            rebuild=true
          else
            changed=$(git diff --name-only "${BEFORE}" "${AFTER}" -- core 'core/**' || true)
            if [ -n "${changed}" ]; then
              echo "Core changed in this push:"
              echo "${changed}"
              rebuild=true
            else
              echo "Core unchanged in this push — keeping committed wasm."
            fi
          fi
          echo "rebuild=${rebuild}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install portable C linker
        if: steps.core_changed.outputs.rebuild == 'true'
        run: |
          set -euo pipefail
          version=0.13.0
          archive="zig-linux-x86_64-${version}.tar.xz"
          curl -fsSL "https://ziglang.org/download/${version}/${archive}" -o "/tmp/${archive}"
          tar -xJf "/tmp/${archive}" -C /tmp
          mkdir -p "$RUNNER_TEMP/toolbin"
          zig_bin="/tmp/zig-linux-x86_64-${version}/zig"
          printf '#!/usr/bin/env bash\nexec %q cc "$@"\n' "$zig_bin" > "$RUNNER_TEMP/toolbin/cc"
          chmod +x "$RUNNER_TEMP/toolbin/cc"
          echo "$RUNNER_TEMP/toolbin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/toolbin/cc" --version

      - name: Install wasm-pack
        if: steps.core_changed.outputs.rebuild == 'true'
        run: |
          set -euo pipefail
          cargo install wasm-pack --locked --version 0.13.1

      - name: Rebuild wasm from pinned core
        if: steps.core_changed.outputs.rebuild == 'true'
        working-directory: core/crates/wasm
        run: |
          set -euo pipefail
          # The wasm crate's Cargo.toml already enables the required
          # `event-scheduler` feature on labwired-core — do not pass extra
          # features. wasm-pack auto-downloads wasm-opt as needed.
          wasm-pack build --release --target web \
            --out-dir "${GITHUB_WORKSPACE}/packages/playground/public/wasm"
          ls -l "${GITHUB_WORKSPACE}/packages/playground/public/wasm/labwired_wasm_bg.wasm"

      - name: Install + build @labwired/playground
        working-directory: packages/playground
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          VITE_LABWIRED_API_BASE: https://api.labwired.com
        run: |
          npm ci --ignore-scripts
          npm run build

      # Lean deploy gate: guarantee we never ship a broken build. Checks the
      # actual dist/ that is about to be uploaded — not source — so it catches
      # the real failure mode (an ELF missing/gitignored/0-byte ⇒ the live site
      # serves index.html in its place ⇒ "Simulator init failed" on Run).
      # Pure file checks, no test runner / jsdom — runs in well under a second.
      # (The full playground test suite already gates every PR via
      # playground-ci.yml, so main is green before we get here; this is the
      # last-mile artifact check.)
      - name: Verify build artifacts (deploy gate)
        working-directory: packages/playground
        run: |
          set -euo pipefail
          dist="dist"
          test -f "$dist/index.html" || { echo "::error::dist/index.html missing — build did not produce an app"; exit 1; }

          # Every firmware referenced by a board config must be present in dist,
          # non-empty, and a real ELF (magic 0x7F 45 4C 46).
          mapfile -t elfs < <(grep -oE 'demo-[a-z0-9-]+\.elf' src/bundled-configs.ts | sort -u)
          test "${#elfs[@]}" -gt 0 || { echo "::error::no demoFirmwarePath ELFs found in bundled-configs.ts — gate misconfigured"; exit 1; }
          fail=0
          for name in "${elfs[@]}"; do
            f="$dist/wasm/$name"
            if [ ! -f "$f" ]; then echo "::error::$name missing from dist/wasm — would be served as HTML → 'Simulator init failed'"; fail=1; continue; fi
            sz=$(stat -c%s "$f")
            if [ "$sz" -le 0 ]; then echo "::error::$name is 0 bytes"; fail=1; continue; fi
            magic=$(head -c4 "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$magic" != "7f454c46" ]; then echo "::error::$name is not a real ELF (magic=$magic) — likely HTML/placeholder"; fail=1; continue; fi
            echo "ok: $name ($sz bytes, ELF)"
          done
          test "$fail" -eq 0 || { echo "::error::deploy gate failed — refusing to publish a broken build"; exit 1; }
          echo "Deploy gate passed: ${#elfs[@]} firmware ELFs present + valid in dist."

      # Engine-vs-config gate: the wasm engine is a committed prebuilt artifact
      # that the deploy does NOT rebuild, so it can silently lag the pinned core
      # (e.g. an L476 lab needs SPI profile 'stm32_fifo' but a stale wasm only
      # knows 'stm32, nrf52' → "unsupported SPI register layout" at sim init).
      # The engine carries a string literal per supported peripheral profile, so
      # every `profile:` the bundled chip/system configs reference must appear as
      # a byte string in the wasm. Pure grep, sub-second.
      - name: Verify wasm engine supports bundled chip profiles (deploy gate)
        working-directory: packages/playground
        run: |
          set -euo pipefail
          wasm="dist/wasm/labwired_wasm_bg.wasm"
          test -f "$wasm" || { echo "::error::$wasm missing — cannot verify engine/config sync"; exit 1; }

          # YAML configs bundled into the app are the ?raw imports in
          # bundled-configs.ts; resolve them from the repo root (this step's
          # working-dir is packages/playground, so repo root is ../..).
          mapfile -t cfgs < <(grep -oE 'core/[A-Za-z0-9._/-]+\.ya?ml' src/bundled-configs.ts | sort -u)
          test "${#cfgs[@]}" -gt 0 || { echo "::error::no bundled YAML configs found in bundled-configs.ts — gate misconfigured"; exit 1; }

          profiles=$(for c in "${cfgs[@]}"; do f="../../$c"; [ -f "$f" ] && grep -hoE 'profile:[[:space:]]*"?[A-Za-z0-9_]+' "$f" || true; done \
            | sed -E 's/profile:[[:space:]]*"?//' | sort -u)
          test -n "$profiles" || { echo "::error::no profile: values found in bundled configs — gate misconfigured"; exit 1; }

          fail=0
          for p in $profiles; do
            if grep -aq -- "$p" "$wasm"; then
              echo "ok: engine supports profile '$p'"
            else
              echo "::error::wasm engine has no '$p' profile but a bundled chip config uses it — stale/mismatched engine. Rebuild: wasm-pack build --release --target web --out-dir packages/playground/public/wasm  (from the core commit main pins)"; fail=1
            fi
          done
          test "$fail" -eq 0 || { echo "::error::deploy gate failed — wasm engine out of sync with bundled chip configs"; exit 1; }
          echo "Engine-profile gate passed: $(echo "$profiles" | wc -w) profiles all present in wasm."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass an explicit ASCII commit message. Wrangler otherwise forwards
          # the git HEAD message verbatim, and the Cloudflare Pages API rejects
          # certain code points (e.g. U+2192 "->") with
          # "Invalid commit message, it must be a valid UTF-8 string" — which
          # fails the deploy AFTER the files have already uploaded.
          command: pages deploy packages/playground/dist --project-name=labwired-playground --branch=main --commit-dirty=true --commit-message="main@${{ github.sha }}"

  # Loud alert when a main deploy fails. The default GitHub failure email is
  # easy to miss — and a failed deploy means prod silently serves a STALE build
  # (PR #355's broken core pin went unnoticed for a day). This opens a tracking
  # issue (or comments on the existing open one) so the failure is impossible to
  # overlook and carries the run link + the usual root cause.
  notify-on-failure:
    needs: build-and-deploy
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open/update deploy-failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Playground Pages deploy failed on main';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Deploy playground to Pages** workflow failed on \`main\`.`,
              ``,
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              ``,
              `⚠️ Prod is now serving a **stale build** until this is fixed.`,
              ``,
              `Most common cause: the \`core\` submodule pin doesn't contain example/config files the playground imports (check the build log for an unresolved \`?raw\` import). See the build/import error in the run above.`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const hit = open.data.find((i) => i.title === title && !i.pull_request);
            if (hit) {
              await github.rest.issues.createComment({ owner, repo, issue_number: hit.number, body });
              core.notice(`Commented on existing deploy-failure issue #${hit.number}`);
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body });
              core.notice(`Opened deploy-failure issue #${created.data.number}`);
            }
