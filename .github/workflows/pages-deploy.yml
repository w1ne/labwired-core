# Build + deploy the playground to Cloudflare Pages on every push to main.
#
# Project: labwired-playground (https://labwired-playground.pages.dev)
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — Pages:Edit + Account:Read on shylenkoa account
#   CLOUDFLARE_ACCOUNT_ID — 53f45abe9550f62856af4475880e0a77
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY — pk_live_… (reused from foundry-deploy)
#
# If these aren't set, the deploy step fails fast. The workflow can also be
# triggered manually via the Actions tab (workflow_dispatch).

name: Deploy playground to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - "core/**"
      # Bare `core` matches the submodule gitlink itself — `core/**` only
      # matches files INSIDE the submodule, so without this entry a plain
      # `git submodule update; git commit core` bump (which is the normal
      # way wasm changes ship) doesn't trigger the deploy.
      - "core"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install + build @labwired/playground
        working-directory: packages/playground
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          VITE_LABWIRED_API_BASE: https://api.labwired.com
        run: |
          npm ci --ignore-scripts
          npm run build

      # Lean deploy gate: guarantee we never ship a broken build. Checks the
      # actual dist/ that is about to be uploaded — not source — so it catches
      # the real failure mode (an ELF missing/gitignored/0-byte ⇒ the live site
      # serves index.html in its place ⇒ "Simulator init failed" on Run).
      # Pure file checks, no test runner / jsdom — runs in well under a second.
      # (The full playground test suite already gates every PR via
      # playground-ci.yml, so main is green before we get here; this is the
      # last-mile artifact check.)
      - name: Verify build artifacts (deploy gate)
        working-directory: packages/playground
        run: |
          set -euo pipefail
          dist="dist"
          test -f "$dist/index.html" || { echo "::error::dist/index.html missing — build did not produce an app"; exit 1; }

          # Every firmware referenced by a board config must be present in dist,
          # non-empty, and a real ELF (magic 0x7F 45 4C 46).
          mapfile -t elfs < <(grep -oE 'demo-[a-z0-9-]+\.elf' src/bundled-configs.ts | sort -u)
          test "${#elfs[@]}" -gt 0 || { echo "::error::no demoFirmwarePath ELFs found in bundled-configs.ts — gate misconfigured"; exit 1; }
          fail=0
          for name in "${elfs[@]}"; do
            f="$dist/wasm/$name"
            if [ ! -f "$f" ]; then echo "::error::$name missing from dist/wasm — would be served as HTML → 'Simulator init failed'"; fail=1; continue; fi
            sz=$(stat -c%s "$f")
            if [ "$sz" -le 0 ]; then echo "::error::$name is 0 bytes"; fail=1; continue; fi
            magic=$(head -c4 "$f" | od -An -tx1 | tr -d ' \n')
            if [ "$magic" != "7f454c46" ]; then echo "::error::$name is not a real ELF (magic=$magic) — likely HTML/placeholder"; fail=1; continue; fi
            echo "ok: $name ($sz bytes, ELF)"
          done
          test "$fail" -eq 0 || { echo "::error::deploy gate failed — refusing to publish a broken build"; exit 1; }
          echo "Deploy gate passed: ${#elfs[@]} firmware ELFs present + valid in dist."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass an explicit ASCII commit message. Wrangler otherwise forwards
          # the git HEAD message verbatim, and the Cloudflare Pages API rejects
          # certain code points (e.g. U+2192 "->") with
          # "Invalid commit message, it must be a valid UTF-8 string" — which
          # fails the deploy AFTER the files have already uploaded.
          command: pages deploy packages/playground/dist --project-name=labwired-playground --branch=main --commit-dirty=true --commit-message="main@${{ github.sha }}"
