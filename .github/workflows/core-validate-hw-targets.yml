name: Core Validate HW Targets

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/validate_hw_targets.py'
      - '.github/workflows/core-validate-hw-targets.yml'

permissions:
  contents: write

concurrency:
  group: core-validate-hw-targets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-targets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install west and python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: thumbv6m-none-eabi,thumbv7m-none-eabi,riscv32i-unknown-none-elf

      - name: Build labwired CLI
        run: cargo build --release -p labwired-cli

      - name: Run target validation
        run: python3 scripts/validate_hw_targets.py

      - name: Upload validation manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-onboarding-manifests
          path: configs/onboarding/*.yaml
          retention-days: 14

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hw-target-validation-summary
          path: |
            out/hw-target-validation/summary.json
            out/hw-target-validation/summary.md
          retention-days: 14

      - name: Publish validation summary
        if: always()
        run: |
          if [ -f out/hw-target-validation/summary.md ]; then
            cat out/hw-target-validation/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # NOTE: this job used to auto-commit refreshed pass-rate metadata into
      # configs/onboarding and push to main. `main` is a protected branch that
      # requires the `core-integrity` check, so an automated direct push is
      # rejected (GH006: protected branch hook declined) — the step had been
      # failing on every scheduled run. The validation + summary above are the
      # useful output; we no longer attempt the push. If fresh committed
      # pass-rates are wanted again, do it via a PR (auto-merge) rather than a
      # direct push, the same constraint that retired the tier1 matrix auto-commit.
      - name: Report onboarding metadata drift (no auto-commit)
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- configs/onboarding; then
            echo "Onboarding pass-rate metadata is unchanged."
          else
            echo "::notice::Onboarding pass-rate metadata changed this run. It is NOT auto-committed (protected main rejects bot pushes); regenerate and land via a PR if you want it refreshed."
            git --no-pager diff --stat -- configs/onboarding || true
          fi
