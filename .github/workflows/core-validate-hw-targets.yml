name: Core Validate HW Targets

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/validate_hw_targets.py'
      - '.github/workflows/core-validate-hw-targets.yml'

permissions:
  contents: write

jobs:
  validate-targets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install west and python deps
        run: |
          python -m pip install --upgrade pip
          pip install west pyyaml

      - name: Initialize Zephyr workspace
        run: |
          west init /opt/zephyrproject
          cd /opt/zephyrproject
          west update
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi,thumbv7m-none-eabi,riscv32i-unknown-none-elf

      - name: Build labwired CLI
        run: cargo build --release -p labwired-cli

      - name: Run target validation
        env:
          ZEPHYR_BASE: /opt/zephyrproject/zephyr
        run: python3 scripts/validate_hw_targets.py

      - name: Upload validation manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-onboarding-manifests
          path: configs/onboarding/*.yaml
          retention-days: 14

      - name: Commit and push onboarding updates
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- configs/onboarding; then
            echo "No onboarding manifest changes"
            exit 0
          fi

          git config user.name "LabWired CI"
          git config user.email "ci@labwired.com"
          git add configs/onboarding
          git commit -m "chore(catalog): autoupdate onboarding targets pass rates"
          git push
