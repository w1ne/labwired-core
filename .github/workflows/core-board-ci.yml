name: Core Board CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - id: gen
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          matrix="$(python scripts/ci/board_matrix.py --event "$EVENT_NAME")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  board:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ matrix.submodules }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-board-${{ matrix.id }}
          workspaces: |
            . -> target

      - name: Install apt packages
        if: matrix.apt != ''
        env:
          APT: ${{ matrix.apt }}
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT

      - name: Add rust targets
        if: matrix.rust_targets != ''
        env:
          RUST_TARGETS: ${{ matrix.rust_targets }}
        run: |
          for t in $RUST_TARGETS; do rustup target add "$t"; done

      - name: Fetch device packs
        if: matrix.packs != ''
        uses: ./.github/actions/fetch-pack
        with:
          pack: ${{ matrix.packs }}

      - name: Build firmware
        env:
          BOARD_PATH: ${{ matrix.path }}
        run: "$BOARD_PATH/ci/build.sh"

      - name: Run tests
        env:
          BOARD_PATH: ${{ matrix.path }}
        run: "$BOARD_PATH/ci/test.sh"

      - name: Upload board artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: board-${{ matrix.id }}
          path: out/boards/${{ matrix.id }}/
          if-no-files-found: ignore

  guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject hand-edits to generated tier1 coverage
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed="$(git diff --name-only "$base"...HEAD)"
          if echo "$changed" | grep -qE '^docs/coverage/(tier1-matrix\.json|tier1-scoreboard\.md)$'; then
            echo "::error::docs/coverage/tier1-matrix.json and tier1-scoreboard.md are generated by the Core Board CI aggregate (push to main); do not hand-edit. Remove them from this PR." >&2
            exit 1
          fi

  aggregate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-board-aggregate
          workspaces: |
            . -> target
      - name: Refresh tier1 matrix with evidence
        run: scripts/ci/aggregate-tier1.sh "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
