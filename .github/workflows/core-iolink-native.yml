name: Core IO-Link Native

on:
  push:
    paths:
      - ".github/workflows/core-iolink-native.yml"
      - "Cargo.lock"
      - "crates/core/Cargo.toml"
      - "crates/core/build.rs"
      - "crates/core/native/**"
      - "crates/core/src/peripherals/components/iolink_master.rs"
      - "crates/core/src/world.rs"
      - "crates/core/tests/iolink_multi_node_world.rs"
      - "examples/al2205-iolink-dido/**"
      - "third_party/iolinki"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/core-iolink-native.yml"
      - "Cargo.lock"
      - "crates/core/Cargo.toml"
      - "crates/core/build.rs"
      - "crates/core/native/**"
      - "crates/core/src/peripherals/components/iolink_master.rs"
      - "crates/core/src/world.rs"
      - "crates/core/tests/iolink_multi_node_world.rs"
      - "examples/al2205-iolink-dido/**"
      - "third_party/iolinki"
  workflow_dispatch:

concurrency:
  group: core-iolink-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iolink-native:
    name: iolink-native-c-master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LabWired core
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure private submodule auth
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout iolinki device submodule
        run: git submodule update --init --depth 1 third_party/iolinki

      - name: Checkout C iolinki-master
        uses: actions/checkout@v4
        with:
          repository: w1ne/iolinki-master
          ref: b140b3dbb10a366de16f5d610a05f018e432db12
          path: iolinki-master
          fetch-depth: 0

      - name: Pin C iolinki-master commit
        run: |
          git -C iolinki-master checkout --detach b140b3dbb10a366de16f5d610a05f018e432db12
          test "$(git -C iolinki-master rev-parse HEAD)" = "b140b3dbb10a366de16f5d610a05f018e432db12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install host C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi
          cc --version
          arm-none-eabi-gcc --version

      - name: Native C master UART-boundary tests
        env:
          IOLINKI_MASTER_DIR: ${{ github.workspace }}/iolinki-master
          IOLINKI_DEVICE_DIR: ${{ github.workspace }}/third_party/iolinki
        run: cargo test -p labwired-core --features iolink-native native_ --lib -- --nocapture

      - name: Native C master compile check
        env:
          IOLINKI_MASTER_DIR: ${{ github.workspace }}/iolinki-master
          IOLINKI_DEVICE_DIR: ${{ github.workspace }}/third_party/iolinki
        run: cargo check -p labwired-core --features iolink-native

      - name: Build AL2205 IO-Link device firmware
        run: make -C examples/al2205-iolink-dido/firmware

      - name: Multi-chip LabWired IO-Link world orchestration
        env:
          IOLINKI_MASTER_DIR: ${{ github.workspace }}/iolinki-master
          IOLINKI_DEVICE_DIR: ${{ github.workspace }}/third_party/iolinki
        run: cargo test -p labwired-core --features iolink-native --test iolink_multi_node_world -- --nocapture

      - name: Real LabWired IO-Link simulation
        env:
          IOLINKI_MASTER_DIR: ${{ github.workspace }}/iolinki-master
          IOLINKI_DEVICE_DIR: ${{ github.workspace }}/third_party/iolinki
        run: cargo run --release -q -p labwired-cli --features labwired-core/iolink-native -- test --script examples/al2205-iolink-dido/test.yaml --output-dir out/iolink/al2205 --no-uart-stdout

      - name: Upload LabWired IO-Link simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labwired-iolink-al2205
          path: out/iolink/al2205
