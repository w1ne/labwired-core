name: Core IO-Link Native

on:
  push:
    paths:
      - ".github/workflows/core-iolink-native.yml"
      - "Cargo.lock"
      - "crates/core/Cargo.toml"
      - "crates/core/build.rs"
      - "crates/core/native/**"
      - "crates/core/src/peripherals/components/iolink_master.rs"
      - "crates/core/src/peripherals/components/iolink_native.rs"
      - "crates/core/src/peripherals/components/iolink_station.rs"
      - "crates/core/src/world.rs"
      - "crates/core/tests/iolink_native_master.rs"
      - "crates/core/tests/world_multichip.rs"
      - "crates/core/tests/world_station_services.rs"
      - "crates/core/src/network/mod.rs"
      - "crates/core/src/fidelity.rs"
      - "examples/iolink-dido/**"
      - "examples/iolink-station/**"
      - "examples/esp32c3-mlx90640-thermal/**"
      - "third_party/iolinki"
      - "third_party/iolinki-master/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/core-iolink-native.yml"
      - "Cargo.lock"
      - "crates/core/Cargo.toml"
      - "crates/core/build.rs"
      - "crates/core/native/**"
      - "crates/core/src/peripherals/components/iolink_master.rs"
      - "crates/core/src/peripherals/components/iolink_native.rs"
      - "crates/core/src/peripherals/components/iolink_station.rs"
      - "crates/core/src/world.rs"
      - "crates/core/tests/iolink_native_master.rs"
      - "crates/core/tests/world_multichip.rs"
      - "crates/core/tests/world_station_services.rs"
      - "crates/core/src/network/mod.rs"
      - "crates/core/src/fidelity.rs"
      - "examples/iolink-dido/**"
      - "examples/iolink-station/**"
      - "examples/esp32c3-mlx90640-thermal/**"
      - "third_party/iolinki"
      - "third_party/iolinki-master/**"
  workflow_dispatch:

concurrency:
  group: core-iolink-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iolink-native:
    name: iolink-native-c-master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LabWired core
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure private submodule auth
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout iolinki device submodule
        run: git submodule update --init --depth 1 third_party/iolinki

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install host C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi
          cc --version
          arm-none-eabi-gcc --version

      # LABWIRED_STRICT_FIDELITY makes the first undecoded instruction or
      # unmapped MMIO access this real firmware hits a hard failure, instead of
      # a silent skip. This is the early-warning guard for the class of bug that
      # let newlib's SIMD strlen (UADD8/SEL) run as NOPs and corrupt string
      # ISDU reads for months.
      - name: Native C master UART-boundary tests (strict fidelity)
        env:
          LABWIRED_STRICT_FIDELITY: "1"
        run: cargo test -p labwired-core --features iolink-native --test iolink_native_master -- --nocapture

      - name: Native C master compile check
        run: cargo check -p labwired-core --features iolink-native

      - name: Multi-chip world tests skip cleanly without prebuilt station ELFs
        run: cargo test -p labwired-core --test world_multichip -- --nocapture

      # Service-coverage world test: skips cleanly here (station ELFs are built
      # only in the iolinki-master repo's labwired-real-firmware-model job, which
      # runs it with a fidelity-clean assertion over the full ISDU/PD/event/DS
      # surface). This step guards the path filter + that it still compiles.
      - name: Station service-coverage world test skips cleanly without ELFs
        run: cargo test -p labwired-core --test world_station_services -- --nocapture

      - name: Upload LabWired IO-Link simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labwired-iolink-native
          path: out/iolink

  # Build smoke for the ESP32-C3 thermal-fingerprint firmware, which links the
  # iolinki DEVICE stack for riscv32. This is the firmware an iolinki submodule
  # pin bump silently broke (issue #445: iolink_core.c removed by the reentrant
  # device-context line) — building it here makes the next API-breaking pin
  # bump fail this workflow instead of the example.
  thermal-firmware-build:
    name: esp32c3-mlx90640-thermal firmware build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LabWired core
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure private submodule auth
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout iolinki device submodule
        run: git submodule update --init --depth 1 third_party/iolinki

      # The Espressif riscv32 GCC the example's Makefile auto-discovers under
      # ~/.platformio/packages/toolchain-riscv32-esp (pipx ships on the runner).
      - name: Install riscv32-esp toolchain via PlatformIO
        run: |
          pipx install platformio
          pio pkg install --global --tool "platformio/toolchain-riscv32-esp"
          "$HOME/.platformio/packages/toolchain-riscv32-esp/bin/riscv32-esp-elf-gcc" --version

      - name: Build thermal-fingerprint firmware against the pinned iolinki
        run: make -C examples/esp32c3-mlx90640-thermal/firmware
