name: Rust Core Nightly

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  validation:
    name: Advanced Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Install ARM and RISC-V targets
        run: |
          rustup target add thumbv7m-none-eabi
          rustup target add thumbv6m-none-eabi
          rustup target add riscv32i-unknown-none-elf

      - name: Build Firmware Fixtures
        run: |
          cargo build -p demo-blinky --release --target thumbv7m-none-eabi
          cargo build -p firmware-ci-fixture --release --target thumbv6m-none-eabi
          cargo build -p riscv-ci-fixture --release --target riscv32i-unknown-none-elf

      - name: Unsupported Instruction Audit
        run: ./scripts/unsupported_instruction_audit.sh --firmware target/thumbv7m-none-eabi/release/demo-blinky --system configs/systems/ci-fixture-uart1.yaml --max-steps 20000 --out-dir out/unsupported-audit/ci-fixture --fail-on-unsupported

      - name: Digital Twin Verification
        run: ./scripts/digital_twin_verification.sh out/digital-twin-verification

      - name: Trace Drift Assertions
        run: ./scripts/trace_drift_assert.sh --out-dir out/trace-drift-assert

      - name: Upload Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-artifacts
          path: |
            core/out/unsupported-audit/
            core/out/digital-twin-verification/
            core/out/trace-drift-assert/

  examples:
    name: Verify Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install maturin

      - name: Install ARM and RISC-V targets
        run: |
          rustup target add thumbv7m-none-eabi
          rustup target add thumbv6m-none-eabi
          rustup target add riscv32imac-unknown-none-elf

      - name: Verify Hardware Examples
        run: |
          # arm-c-hello
          make -C examples/arm-c-hello
          cargo run -q -p labwired-cli -- --firmware examples/arm-c-hello/target/firmware --system examples/arm-c-hello/system.yaml --max-steps 1000

          # arm-cortex-m0
          cargo build -p arm-hello --release --target thumbv6m-none-eabi
          cargo run -q -p labwired-cli -- --firmware target/thumbv6m-none-eabi/release/firmware --system examples/arm-cortex-m0/system.yaml --max-steps 1000

          # riscv-virt
          cargo build -p riscv-hello --release --target riscv32imac-unknown-none-elf
          cargo run -q -p labwired-cli -- --firmware target/riscv32imac-unknown-none-elf/release/firmware --system examples/riscv-virt/system.yaml --max-steps 1000

          # demo-blinky
          cargo run -q -p labwired-cli -- test --script examples/demo-blinky/io-smoke.yaml

          # nucleo-h563zi
          ./examples/nucleo-h563zi/scripts/run_full_example.sh

          # python-agent
          cd crates/python && maturin develop --release && cd ../..
          python examples/python-agent/test_agent.py target/thumbv6m-none-eabi/release/firmware
