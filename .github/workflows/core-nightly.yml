name: Rust Core Nightly

on:
  schedule:
    # Nightly 02:00 UTC (was Sunday-only). Slow coverage / validation lives here.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: core-nightly
  cancel-in-progress: true

jobs:
  validation:
    name: Advanced Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-nightly
          workspaces: |
            . -> target

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Install ARM and RISC-V targets
        run: |
          rustup target add thumbv7m-none-eabi
          rustup target add thumbv7em-none-eabihf
          rustup target add thumbv6m-none-eabi
          rustup target add riscv32i-unknown-none-elf

      - name: Build Firmware Fixtures
        run: |
          cargo build -p demo-blinky --release --target thumbv7m-none-eabi
          cargo build -p firmware-h563-demo --release --target thumbv7em-none-eabihf
          cargo build -p firmware-ci-fixture --release --target thumbv6m-none-eabi
          cargo build -p riscv-ci-fixture --release --target riscv32i-unknown-none-elf

      - name: Run ignored H563 CLI integration test
        run: cargo test -p labwired-cli --test h5_demo -- --ignored

      - name: Unsupported Instruction Audit
        run: ./scripts/unsupported_instruction_audit.sh --firmware target/thumbv7m-none-eabi/release/demo-blinky --system configs/systems/ci-fixture-uart1.yaml --max-steps 20000 --out-dir out/unsupported-audit/ci-fixture --fail-on-unsupported

      - name: Digital Twin Verification
        run: ./scripts/digital_twin_verification.sh out/digital-twin-verification

      - name: Trace Drift Assertions
        run: ./scripts/trace_drift_assert.sh --out-dir out/trace-drift-assert

      - name: Upload Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-validation-artifacts
          path: |
            out/unsupported-audit/
            out/digital-twin-verification/
            out/trace-drift-assert/

  example-smokes:
    name: Example Smokes (real-output autochecks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-nightly
          workspaces: |
            . -> target

      # clang + rust-lld build the bare-metal C examples (e.g. the H563 UDS
      # responder); arm-none-eabi-objcopy strips them for the sim.
      - name: Install C cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang gcc-arm-none-eabi

      # Rebuild the H563 UDS responder from source against the pinned UDSLib so a
      # firmware/library regression is caught here, not on the live blog demo.
      - name: Rebuild H563 UDS responder firmware from source
        run: |
          RUST_LLD="$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | sed -n 's/host: //p')/bin/rust-lld"
          make -C examples/h563-uds-ecu/firmware fetch-udslib
          make -C examples/h563-uds-ecu/firmware RUST_LLD="$RUST_LLD"
          arm-none-eabi-objcopy --strip-debug \
            examples/h563-uds-ecu/firmware/build/h563_uds_ecu.elf \
            examples/h563-uds-ecu/firmware/h563_uds_ecu.elf

      # Run every example whose firmware ELF is available; report uncovered ones.
      - name: Run example smokes
        run: ./scripts/example_smokes.sh | tee -a "$GITHUB_STEP_SUMMARY"

      # The decoded-output e2e checks: assert the FDCAN UDS trace (what the web
      # logic analyzer shows) and the Leo air-quality verdicts are real.
      - name: Run example e2e assertions
        run: cargo test --release -p labwired-cli --test e2e_h563_uds --test e2e_leo_airquality

  esp32s3-fixtures-e2e:
    name: ESP32-S3 Fixtures E2E (espup)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-nightly-esp32s3-e2e
          workspaces: |
            . -> target

      - name: Install espup
        run: cargo install espup --locked

      - name: Install Xtensa toolchain via espup
        run: espup install

      # espup emits ~/export-esp.sh; source it so the +esp toolchain and
      # xtensa-esp32s3-none-elf target are available for cargo build.
      - name: Build ESP32-S3 example fixtures
        # Build from INSIDE each example dir so its .cargo/config.toml and
        # rust-toolchain.toml apply (--manifest-path from the repo root skips
        # them — that's what broke the first run with E0463).
        run: |
          source ~/export-esp.sh
          (cd examples/esp32s3-blinky && cargo build --release)
          (cd examples/esp32s3-hello-world && cargo build --release)
          (cd examples/esp32s3-i2c-tmp102 && cargo build --release)

      # FAITHFUL path (default, no FASTBOOT): esp-hal apps now boot on the REAL
      # vendored boot ROM with ZERO thunks. The historical blocker
      # ("rom_config_instruction_cache_mode jumps to 0") is fixed — fast-boot
      # skipped the ROM reset's `.data` copy, leaving rom_cache_internal_table_ptr
      # @0x3FCEFFC4 null; we now replicate that copy (see esp32s3_rom.rs) and use
      # identity XIP for fast-boot (see Esp32s3Opts.real_reset_boot). The boot
      # guard asserts no near-null jump through init; hello-world then prints real
      # serial output through the real ROM.
      #
      # Only hello-world runs on the faithful lane: blinky (GPIO) and i2c_tmp102
      # pace their work with delays, and on the faithful path the real ROM's
      # ets_delay_us BUSY-WAITS for real (the harness thunk returns instantly),
      # so those delay loops elapse genuine simulated time and overrun the
      # harness-tuned step budgets — a fidelity property, not a boot failure.
      # They stay on the harness lane below (instant delays fit the budget).
      - name: Run ESP32-S3 faithful (real-ROM, zero-thunk) e2e
        run: cargo test --release -p labwired-core --features esp32s3-fixtures --test e2e_esp32s3_faithful_boot --test e2e_hello_world

      # The tests are gated on --features esp32s3-fixtures and call
      # ensure_firmware_built() which skips the cargo +esp build if the ELF
      # already exists (we built it above). The tests themselves run on the
      # standard host toolchain; only the ELF needs the Xtensa cross-compiler.
      # LABWIRED_ESP32S3_FASTBOOT=1 forces the thunk harness path (real ROM
      # opted out) — kept as a lane so the harness stays exercised for the
      # toolchain-less / stripped-firmware case and for the delay-heavy
      # blinky/i2c timing.
      - name: Run ESP32-S3 fixtures e2e tests (harness)
        env:
          LABWIRED_ESP32S3_FASTBOOT: "1"
        # Only the three gated e2e binaries — the FASTBOOT opt-out must not
        # leak into lib unit tests (it makes provision_rom_images() return
        # None by design, breaking the ROM-provisioning tests).
        run: cargo test --release -p labwired-core --features esp32s3-fixtures --test e2e_blinky --test e2e_hello_world --test e2e_i2c_tmp102

  tier1-fixture-drift:
    name: Tier-1 Fixture Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Gate to Sundays only for scheduled runs; workflow_dispatch always proceeds.
      - name: Set drift-skip flag on non-Sunday scheduled runs
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$(date -u +%u)" != "7" ]; then
            echo "SKIP_DRIFT=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.SKIP_DRIFT != '1'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        if: env.SKIP_DRIFT != '1'
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache dependencies
        if: env.SKIP_DRIFT != '1'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-nightly-esp
          workspaces: |
            . -> target

      # Install the Espressif Xtensa toolchain via espup.
      # NOTE: Xtensa release builds may not be bit-reproducible across toolchain versions.
      # If espup installs a newer toolchain and the hashes differ from MANIFEST.json,
      # this job fails and a human decides whether to refresh the committed blobs.
      # That failure is the feature — it prevents silent blob drift.
      - name: Install ARM and RISC-V fixture targets
        if: env.SKIP_DRIFT != '1'
        # build_tier1_fixtures.sh chains every per-family build script — the
        # STM32/nRF/RP2040 fixtures need the thumb targets, the C3 needs riscv.
        run: rustup target add thumbv6m-none-eabi thumbv7m-none-eabi thumbv7em-none-eabi riscv32imc-unknown-none-elf

      - name: Install espup and espflash
        if: env.SKIP_DRIFT != '1'
        run: cargo install espup espflash --locked

      - name: Install Xtensa toolchain via espup
        if: env.SKIP_DRIFT != '1'
        run: espup install

      - name: Rebuild tier1 fixture blobs
        if: env.SKIP_DRIFT != '1'
        run: |
          # Snapshot the COMMITTED manifest first — build_tier1_fixtures.sh
          # overwrites MANIFEST.json with hashes of the fresh build, and
          # comparing the rebuild against itself would always pass.
          git show HEAD:tests/fixtures/tier1/MANIFEST.json > /tmp/committed-manifest.json
          source ~/export-esp.sh
          ./scripts/build_tier1_fixtures.sh

      # Compare freshly-built blob hashes against sha256 values in the COMMITTED
      # manifest (snapshotted above), ignoring source_rev (changes every rebuild).
      - name: Verify fixture hashes match committed manifest
        if: env.SKIP_DRIFT != '1'
        run: |
          python3 - <<'EOF'
          import hashlib, json, pathlib, sys

          manifest_path = pathlib.Path("/tmp/committed-manifest.json")
          committed = json.loads(manifest_path.read_text())

          failures = []
          for filename, meta in committed.items():
              blob = pathlib.Path("tests/fixtures/tier1") / filename
              if not blob.exists():
                  failures.append(f"MISSING: {filename}")
                  continue
              actual = hashlib.sha256(blob.read_bytes()).hexdigest()
              expected = meta["sha256"]
              if actual != expected:
                  failures.append(
                      f"DRIFT: {filename}\n"
                      f"  committed sha256 : {expected}\n"
                      f"  rebuilt  sha256  : {actual}"
                  )

          if failures:
              for msg in failures:
                  print(f"::error::{msg}")
              print(
                  "\nTier-1 fixture blobs drifted from the committed manifest.\n"
                  "If the toolchain was upgraded intentionally, re-run "
                  "./scripts/build_tier1_fixtures.sh locally and commit the updated blobs."
              )
              sys.exit(1)

          print(f"All {len(committed)} fixture blobs match committed manifest hashes.")
          EOF
