name: Build & Push Builder Images

# Builds the two deploy images and pushes them to GHCR (private packages):
#   ghcr.io/w1ne/labwired-compile  — PlatformIO compile service (frameworks baked)
#   ghcr.io/w1ne/labwired-builder  — Rust sim /run + thin Node service
# The Hetzner box only pulls these (docker compose pull && up -d); it never builds.

on:
  push:
    branches: ["main"]
    paths:
      - "services/labwired-builder/**"
      - "core"
      - ".github/workflows/builder-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Default to amd64 for fast builds. For portability across ARM Hetzner
      # (CAX) instances, set platforms to "linux/amd64,linux/arm64" — note the
      # PlatformIO bake runs under QEMU for the non-native arch and is slower.
      - name: Build & push labwired-compile
        uses: docker/build-push-action@v6
        with:
          context: services/labwired-builder
          file: services/labwired-builder/Dockerfile.compile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/w1ne/labwired-compile:latest
            ghcr.io/w1ne/labwired-compile:${{ github.sha }}
          cache-from: type=gha,scope=labwired-compile
          cache-to: type=gha,mode=max,scope=labwired-compile

      - name: Build & push labwired-builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/labwired-builder/Dockerfile.builder
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/w1ne/labwired-builder:latest
            ghcr.io/w1ne/labwired-builder:${{ github.sha }}
          cache-from: type=gha,scope=labwired-builder
          cache-to: type=gha,mode=max,scope=labwired-builder
