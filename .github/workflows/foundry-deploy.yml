# Foundry Deploy Workflow

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "foundry/**"
      - "core/**"
      - ".github/workflows/foundry-deploy.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: self-hosted
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-test
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.CHECKOUT_PATH }}/foundry/backend/go.mod
          cache-dependency-path: ${{ env.CHECKOUT_PATH }}/foundry/backend/go.sum

      - name: Backend tests
        working-directory: ${{ env.CHECKOUT_PATH }}/foundry/backend
        run: go test ./cmd/... ./internal/...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.CHECKOUT_PATH }}/foundry/frontend/package-lock.json

      - name: Frontend build
        working-directory: ${{ env.CHECKOUT_PATH }}/foundry/frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing required secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          npm ci
          npm run build

  build-and-push:
    runs-on: self-hosted
    needs: test
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-build
    outputs:
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}

      - name: Docker meta
        id: meta
        run: |
          echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate frontend build secret present
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing required secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CHECKOUT_PATH }}/foundry/backend
          file: ${{ env.CHECKOUT_PATH }}/foundry/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-backend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CHECKOUT_PATH }}/foundry/frontend
          file: ${{ env.CHECKOUT_PATH }}/foundry/frontend/Dockerfile
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-frontend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-frontend:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-deploy
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}

      - name: Deploy to Local Host
        env:
          LABWIRED_ROOT: /home/w1ne/labwired
          DEPLOY_PATH: /home/w1ne/labwired/foundry/deploy
          OWNER_LOWER: ${{ needs.build-and-push.outputs.owner_lower }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          WORK_ROOT="${GITHUB_WORKSPACE}/${CHECKOUT_PATH}"

          if [ ! -d "$WORK_ROOT/.git" ]; then
            echo "Missing checked out repo at $WORK_ROOT"
            exit 1
          fi

          cd "$WORK_ROOT"

          echo "Updating host binaries and configs..."

          # 1. Sync latest hardware configurations
          mkdir -p "$LABWIRED_ROOT/core"
          cp -r core/configs "$LABWIRED_ROOT/core/"
          
          # 2. Sync deployment files
          cp "$WORK_ROOT/foundry/deploy/docker-compose.prod.yml" "$DEPLOY_PATH/"
          cp "$WORK_ROOT/foundry/deploy/Caddyfile" "$DEPLOY_PATH/"

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing .env in $DEPLOY_PATH"
            exit 1
          fi

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          grep -q '^BACKEND_IMAGE=' .env || echo "BACKEND_IMAGE=ghcr.io/$OWNER_LOWER/foundry-backend" >> .env
          grep -q '^FRONTEND_IMAGE=' .env || echo "FRONTEND_IMAGE=ghcr.io/$OWNER_LOWER/foundry-frontend" >> .env

          if grep -q '^BACKEND_IMAGE_TAG=' .env; then
            sed -i "s/^BACKEND_IMAGE_TAG=.*/BACKEND_IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "BACKEND_IMAGE_TAG=$IMAGE_TAG" >> .env
          fi
          if grep -q '^FRONTEND_IMAGE_TAG=' .env; then
            sed -i "s/^FRONTEND_IMAGE_TAG=.*/FRONTEND_IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "FRONTEND_IMAGE_TAG=$IMAGE_TAG" >> .env
          fi

          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          docker compose --env-file .env -f docker-compose.prod.yml ps
