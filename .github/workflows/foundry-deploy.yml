# Foundry Deploy Workflow

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "foundry/**"
      - "core/**"
      - ".github/workflows/foundry-deploy.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: self-hosted
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-test
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.CHECKOUT_PATH }}/foundry/backend/go.mod
          cache-dependency-path: ${{ env.CHECKOUT_PATH }}/foundry/backend/go.sum

      - name: Backend tests
        working-directory: ${{ env.CHECKOUT_PATH }}/foundry/backend
        run: go test ./cmd/... ./internal/...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.CHECKOUT_PATH }}/foundry/frontend/package-lock.json

      - name: Frontend build
        working-directory: ${{ env.CHECKOUT_PATH }}/foundry/frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing required secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          npm ci
          npm run build

  build-and-push:
    runs-on: self-hosted
    needs: test
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-build
    outputs:
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}
          submodules: recursive

      - name: Docker meta
        id: meta
        run: |
          echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate frontend build secret present
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing required secret: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CHECKOUT_PATH }}/foundry/backend
          file: ${{ env.CHECKOUT_PATH }}/foundry/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-backend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CHECKOUT_PATH }}/foundry/frontend
          file: ${{ env.CHECKOUT_PATH }}/foundry/frontend/Dockerfile
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-frontend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-frontend:latest

      - name: Build and push playground image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CHECKOUT_PATH }}/packages
          file: ${{ env.CHECKOUT_PATH }}/packages/playground/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-playground:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/foundry-playground:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    env:
      CHECKOUT_PATH: run-${{ github.run_id }}-deploy
    steps:
      - name: Preflight cleanup
        run: |
          set -euo pipefail
          df -h
          find "$(dirname "$GITHUB_WORKSPACE")" -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
          find /home/w1ne/actions-runner-labwired/_diag -type f -mtime +7 -delete || true
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.CHECKOUT_PATH }}
          submodules: recursive

      - name: Deploy to Local Host
        env:
          LABWIRED_ROOT: /home/w1ne/labwired
          DEPLOY_PATH: /home/w1ne/labwired/foundry/deploy
          OWNER_LOWER: ${{ needs.build-and-push.outputs.owner_lower }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          verify_foundry() {
            local tmp_dir
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' RETURN

            curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/health  > "$tmp_dir/health.json"
            curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/catalog > "$tmp_dir/catalog.json"

            python3 -c 'import json,sys; proxy=json.load(open(sys.argv[1])); catalog=json.load(open(sys.argv[2])); total=len(catalog); arch=sum(1 for r in catalog if (r.get("architecture") or "").strip()); val=sum(1 for r in catalog if (r.get("validation_url") or "").strip()); print(json.dumps({"proxy_status":proxy.get("status"),"catalog_total":total,"catalog_architectures":arch,"catalog_validations":val},indent=2)); proxy.get("status")=="healthy" or sys.exit("proxy health endpoint is not healthy"); total>0 or sys.exit("catalog is empty after deploy"); arch>0 or sys.exit("catalog has zero architecture metadata after deploy"); val>0 or sys.exit("catalog has zero validation links after deploy")' "$tmp_dir/health.json" "$tmp_dir/catalog.json"
          }

          rollback_foundry() {
            echo "Rolling back Foundry to previous image tags..."
            if [ -n "${PREV_BACKEND_IMAGE_TAG:-}" ]; then
              if grep -q '^BACKEND_IMAGE_TAG=' .env; then
                sed -i "s/^BACKEND_IMAGE_TAG=.*/BACKEND_IMAGE_TAG=$PREV_BACKEND_IMAGE_TAG/" .env
              else
                echo "BACKEND_IMAGE_TAG=$PREV_BACKEND_IMAGE_TAG" >> .env
              fi
            fi
            if [ -n "${PREV_FRONTEND_IMAGE_TAG:-}" ]; then
              if grep -q '^FRONTEND_IMAGE_TAG=' .env; then
                sed -i "s/^FRONTEND_IMAGE_TAG=.*/FRONTEND_IMAGE_TAG=$PREV_FRONTEND_IMAGE_TAG/" .env
              else
                echo "FRONTEND_IMAGE_TAG=$PREV_FRONTEND_IMAGE_TAG" >> .env
              fi
            fi
            if [ -n "${PREV_PLAYGROUND_IMAGE_TAG:-}" ]; then
              if grep -q '^PLAYGROUND_IMAGE_TAG=' .env; then
                sed -i "s/^PLAYGROUND_IMAGE_TAG=.*/PLAYGROUND_IMAGE_TAG=$PREV_PLAYGROUND_IMAGE_TAG/" .env
              else
                echo "PLAYGROUND_IMAGE_TAG=$PREV_PLAYGROUND_IMAGE_TAG" >> .env
              fi
            fi

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d
            docker compose --env-file .env -f docker-compose.prod.yml ps
          }

          WORK_ROOT="${GITHUB_WORKSPACE}/${CHECKOUT_PATH}"

          if [ ! -d "$WORK_ROOT/.git" ]; then
            echo "Missing checked out repo at $WORK_ROOT"
            exit 1
          fi

          cd "$WORK_ROOT"

          echo "Updating host binaries and configs..."

          # 1. Sync latest hardware configurations
          mkdir -p "$LABWIRED_ROOT/core"
          cp -r core/configs "$LABWIRED_ROOT/core/"

          # 2. Sync deployment files
          cp "$WORK_ROOT/foundry/deploy/docker-compose.prod.yml" "$DEPLOY_PATH/"
          cp "$WORK_ROOT/foundry/deploy/Caddyfile" "$DEPLOY_PATH/"

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing .env in $DEPLOY_PATH"
            exit 1
          fi

          PREV_BACKEND_IMAGE_TAG="$(awk -F= '/^BACKEND_IMAGE_TAG=/{print $2}' .env | tail -n1)"
          PREV_FRONTEND_IMAGE_TAG="$(awk -F= '/^FRONTEND_IMAGE_TAG=/{print $2}' .env | tail -n1)"
          PREV_PLAYGROUND_IMAGE_TAG="$(awk -F= '/^PLAYGROUND_IMAGE_TAG=/{print $2}' .env | tail -n1)"

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          grep -q '^BACKEND_IMAGE=' .env || echo "BACKEND_IMAGE=ghcr.io/$OWNER_LOWER/foundry-backend" >> .env
          grep -q '^FRONTEND_IMAGE=' .env || echo "FRONTEND_IMAGE=ghcr.io/$OWNER_LOWER/foundry-frontend" >> .env
          grep -q '^PLAYGROUND_IMAGE=' .env || echo "PLAYGROUND_IMAGE=ghcr.io/$OWNER_LOWER/foundry-playground" >> .env

          if [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "Missing required secret: CLERK_SECRET_KEY"
            exit 1
          fi

          # Keep runtime secrets in the host .env consumed by docker compose.
          if grep -q '^CLERK_SECRET_KEY=' .env; then
            sed -i "s|^CLERK_SECRET_KEY=.*|CLERK_SECRET_KEY=${CLERK_SECRET_KEY}|" .env
          else
            echo "CLERK_SECRET_KEY=${CLERK_SECRET_KEY}" >> .env
          fi

          if [ -n "${OPENAI_API_KEY}" ]; then
            if grep -q '^OPENAI_API_KEY=' .env; then
              sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env
            else
              echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
            fi
          fi

          if [ -n "${STRIPE_WEBHOOK_SECRET}" ]; then
            if grep -q '^STRIPE_WEBHOOK_SECRET=' .env; then
              sed -i "s|^STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}|" .env
            else
              echo "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}" >> .env
            fi
          fi

          if grep -q '^BACKEND_IMAGE_TAG=' .env; then
            sed -i "s/^BACKEND_IMAGE_TAG=.*/BACKEND_IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "BACKEND_IMAGE_TAG=$IMAGE_TAG" >> .env
          fi
          if grep -q '^FRONTEND_IMAGE_TAG=' .env; then
            sed -i "s/^FRONTEND_IMAGE_TAG=.*/FRONTEND_IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "FRONTEND_IMAGE_TAG=$IMAGE_TAG" >> .env
          fi
          if grep -q '^PLAYGROUND_IMAGE_TAG=' .env; then
            sed -i "s/^PLAYGROUND_IMAGE_TAG=.*/PLAYGROUND_IMAGE_TAG=$IMAGE_TAG/" .env
          else
            echo "PLAYGROUND_IMAGE_TAG=$IMAGE_TAG" >> .env
          fi

          if ! docker compose --env-file .env -f docker-compose.prod.yml pull; then
            rollback_foundry
            exit 1
          fi
          if ! docker compose --env-file .env -f docker-compose.prod.yml up -d; then
            rollback_foundry
            exit 1
          fi

          # Restart Caddy so it re-reads the updated Caddyfile from disk.
          # docker compose up -d does not restart caddy when only the bind-mounted
          # Caddyfile contents change; caddy reload alone can fail silently on
          # config changes that require a full service restart.
          docker compose --env-file .env -f docker-compose.prod.yml restart caddy
          sleep 5

          docker compose --env-file .env -f docker-compose.prod.yml ps

          if ! verify_foundry; then
            rollback_foundry
            verify_foundry
            exit 1
          fi
