# Run playground, board-config, and mcp tests on PRs and pushes that touch
# the relevant packages.  No secrets or deploy steps — this is a pure test gate.

name: Playground CI

on:
  pull_request:
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - "packages/board-config/**"
      - "packages/mcp/**"
      - ".github/workflows/playground-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - "packages/board-config/**"
      - "packages/mcp/**"
      - ".github/workflows/playground-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Playground tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install + test @labwired/playground
        working-directory: packages/playground
        run: |
          npm ci --ignore-scripts
          npm test

  board-config:
    name: board-config tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/board-config/package-lock.json

      - name: Install + test @labwired/board-config
        working-directory: packages/board-config
        run: |
          npm ci
          npm test

  mcp:
    name: mcp tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install + build @labwired/mcp
        working-directory: packages/mcp
        run: |
          npm ci
          npm run build

      - name: Test @labwired/mcp
        working-directory: packages/mcp
        run: npm test
