# Run playground tests on PRs and pushes that touch the playground or ui packages.
# No secrets or deploy steps — this is a pure test gate.

name: Playground CI

on:
  pull_request:
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - ".github/workflows/playground-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "packages/playground/**"
      - "packages/ui/**"
      - ".github/workflows/playground-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Playground tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install + test @labwired/playground
        working-directory: packages/playground
        run: |
          npm ci --ignore-scripts
          npm test
