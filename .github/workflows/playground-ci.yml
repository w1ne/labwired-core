# Run playground, board-config, and mcp tests on every PR + push to main.
# No secrets or deploy steps — this is a pure test gate.
#
# DELIBERATELY NOT path-filtered. The "Playground tests" job is a REQUIRED
# status check on main, and it must catch a `core` submodule pin bump that
# drops example/config files the playground imports (that exact gap let PR #355
# ship a pin whose core lacked `f103-uds-ecu`, breaking the Pages build/deploy
# for a day). A pin bump only changes the `core` gitlink — it does NOT touch
# `packages/playground/**`, so a path filter would skip this gate on the one
# kind of PR that needs it most. A required check that never runs also blocks
# merges forever. Both problems vanish by always running. The jobs are fast.

name: Playground CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Playground tests
    runs-on: [self-hosted, ci]
    steps:
      # Self-hosted hygiene: a prior job can leave root-owned files in the
      # runner workspace (e.g. a container that wrote as root), which makes
      # actions/checkout's clean step fail with EACCES. Wipe the workspace
      # first. Uses passwordless sudo when available, plain rm otherwise.
      - name: Reset self-hosted workspace
        run: |
          sudo -n rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || true
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4
      # Fetch ONLY the `core` submodule (the configs/wasm these tests need).
      # `landing_page` (private) + `vscode` aren't needed here, and the
      # labwired-landing clone intermittently fails in CI ("Repository not
      # found"), which was aborting the whole `submodules: recursive` checkout.
      - name: Fetch core submodule
        # Rewrite the SSH submodule URL (git@github.com:) to HTTPS so the clone
        # uses the token actions/checkout already persisted (persist-credentials)
        # instead of SSH — there's no SSH key in CI. Same token + rewrite that
        # checkout's own `submodules:` handling uses, but only for `core`.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 core

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install + test @labwired/playground
        working-directory: packages/playground
        run: |
          npm ci --ignore-scripts
          npm test

  board-config:
    name: board-config tests
    runs-on: [self-hosted, ci]
    steps:
      # Self-hosted hygiene: a prior job can leave root-owned files in the
      # runner workspace (e.g. a container that wrote as root), which makes
      # actions/checkout's clean step fail with EACCES. Wipe the workspace
      # first. Uses passwordless sudo when available, plain rm otherwise.
      - name: Reset self-hosted workspace
        run: |
          sudo -n rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || true
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/board-config/package-lock.json

      - name: Install + test @labwired/board-config
        working-directory: packages/board-config
        run: |
          npm ci
          npm test

  mcp:
    name: mcp tests
    runs-on: [self-hosted, ci]
    steps:
      # Self-hosted hygiene: a prior job can leave root-owned files in the
      # runner workspace (e.g. a container that wrote as root), which makes
      # actions/checkout's clean step fail with EACCES. Wipe the workspace
      # first. Uses passwordless sudo when available, plain rm otherwise.
      - name: Reset self-hosted workspace
        run: |
          sudo -n rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || rm -rf "$GITHUB_WORKSPACE" 2>/dev/null || true
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install + build @labwired/mcp
        working-directory: packages/mcp
        run: |
          npm ci
          npm run build

      - name: Test @labwired/mcp
        working-directory: packages/mcp
        run: npm test
