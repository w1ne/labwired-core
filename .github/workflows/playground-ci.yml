# Run playground, board-config, and mcp tests on every PR + push to main.
# No secrets or deploy steps — this is a pure test gate.
#
# DELIBERATELY NOT path-filtered. The "Playground tests" job is a REQUIRED
# status check on main, and it must catch a `core` submodule pin bump that
# drops example/config files the playground imports (that exact gap let PR #355
# ship a pin whose core lacked `f103-uds-ecu`, breaking the Pages build/deploy
# for a day). A pin bump only changes the `core` gitlink — it does NOT touch
# `packages/playground/**`, so a path filter would skip this gate on the one
# kind of PR that needs it most. A required check that never runs also blocks
# merges forever. Both problems vanish by always running. The jobs are fast.

name: Playground CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Playground tests
    runs-on: [self-hosted, ci]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside — we own the PARENT, so the
      # rename succeeds — and checkout recreates it clean. Nightly
      # pluto-maintenance reclaims the .broken.* dirs via docker (root).
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4
      # Fetch ONLY the `core` submodule (the configs/wasm these tests need).
      # `landing_page` (private) + `vscode` aren't needed here, and the
      # labwired-landing clone intermittently fails in CI ("Repository not
      # found"), which was aborting the whole `submodules: recursive` checkout.
      - name: Fetch core submodule
        # Rewrite the SSH submodule URL (git@github.com:) to HTTPS so the clone
        # uses the token actions/checkout already persisted (persist-credentials)
        # instead of SSH — there's no SSH key in CI. Same token + rewrite that
        # checkout's own `submodules:` handling uses, but only for `core`.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 core

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/ui/package-lock.json
            packages/playground/package-lock.json

      - name: Install + build @labwired/ui
        working-directory: packages/ui
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Install + typecheck + test @labwired/playground
        working-directory: packages/playground
        run: |
          npm ci --ignore-scripts
          # Production-build typecheck. vitest runs via esbuild (no type-check),
          # so cross-package type errors (e.g. a ComponentDef attr-field type the
          # playground doesn't accept) only surfaced at deploy. tsc -b catches
          # them here, pre-merge. @labwired/ui is built above; @labwired/board-config
          # resolves its types from src via package exports, so no extra build.
          npx tsc -b
          npm test

  board-config:
    name: board-config tests
    runs-on: [self-hosted, ci]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside — we own the PARENT, so the
      # rename succeeds — and checkout recreates it clean. Nightly
      # pluto-maintenance reclaims the .broken.* dirs via docker (root).
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/board-config/package-lock.json

      - name: Install + test @labwired/board-config
        working-directory: packages/board-config
        run: |
          npm ci
          npm test

  mcp:
    name: mcp tests
    runs-on: [self-hosted, ci]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside — we own the PARENT, so the
      # rename succeeds — and checkout recreates it clean. Nightly
      # pluto-maintenance reclaims the .broken.* dirs via docker (root).
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install + build @labwired/mcp
        working-directory: packages/mcp
        run: |
          npm ci
          npm run build

      - name: Test @labwired/mcp
        working-directory: packages/mcp
        run: npm test

  catalog:
    name: catalog tests
    runs-on: [self-hosted, ci]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside — we own the PARENT, so the
      # rename succeeds — and checkout recreates it clean. Nightly
      # pluto-maintenance reclaims the .broken.* dirs via docker (root).
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/catalog/package-lock.json

      # The generator imports board-config + ui manifest source via tsx, so no
      # build of sibling packages is needed — only this package's devDeps.
      - name: Install @labwired/catalog
        working-directory: packages/catalog
        run: npm ci

      # Fails if catalog-facts.json drifted from board-config / the manifest.
      - name: Check catalog facts are up to date
        working-directory: packages/catalog
        run: npm run check:facts

      - name: Test @labwired/catalog
        working-directory: packages/catalog
        run: npm test
