# Publish @labwired/mcp to npm when a `mcp-v<semver>` tag is pushed.
#
# One-time setup:
#   1. Create an automation NPM token: https://www.npmjs.com/settings/<user>/tokens/granular-access-tokens/new
#      Scope: publish-only on @labwired/* (or unscoped if you don't have an org).
#   2. Add to this repo: gh secret set NPM_TOKEN
#
# Release flow:
#   cd packages/mcp
#   npm version patch           # or minor / major — bumps + tags
#   git push origin main --follow-tags
#   (Workflow takes over from there.)

name: Publish @labwired/mcp

on:
  push:
    tags:
      - "mcp-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install
        working-directory: packages/mcp
        run: npm ci --ignore-scripts

      - name: Build
        working-directory: packages/mcp
        run: npm run build

      - name: Test
        working-directory: packages/mcp
        run: npm test

      - name: Publish
        working-directory: packages/mcp
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
