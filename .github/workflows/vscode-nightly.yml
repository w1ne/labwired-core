name: VS Code Extension Nightly

on:
  schedule:
    - cron: '10 4 * * *'
  workflow_dispatch:

jobs:
  build_matrix:
    defaults:
      run:
        working-directory: ./vscode
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest npm ci

      - name: Build LabWired (DAP)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/core w1ne/labwired-dev:latest cargo build -p labwired-dap --release

      - name: Compile
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest npm run compile

      - name: Build Demo Firmware Fixture
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/core w1ne/labwired-dev:latest cargo build -p demo-blinky --release --target thumbv7m-none-eabi

      - name: Run Tests (Linux)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest xvfb-run --auto-servernum bash -lc 'ELECTRON_RUN_AS_NODE= npm test'

      - name: Run Unit Tests (Docker Logic)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest ./node_modules/.bin/mocha out/test/unit/docker.test.js
