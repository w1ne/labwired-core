name: VS Code Extension Nightly

on:
  schedule:
    - cron: '10 4 * * *'
  workflow_dispatch:

jobs:
  build_matrix:
    defaults:
      run:
        working-directory: ./vscode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules
        # labwired-landing is private and unfetchable by CI; only fetch what we
        # need. Rewrite the SSH submodule URL to HTTPS so it uses the token
        # actions/checkout persisted (no SSH key in CI).
        working-directory: .
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 core vscode

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build LabWired (DAP)
        run: cargo build -p labwired-dap --release
        working-directory: ./core

      - name: Compile
        run: npm run compile

      - name: Install ARM target
        run: rustup target add thumbv7m-none-eabi

      - name: Build Demo Firmware Fixture
        run: cargo build -p demo-blinky --release --target thumbv7m-none-eabi
        working-directory: ./core

      - name: Run Tests (Linux)
        run: xvfb-run --auto-servernum bash -lc 'ELECTRON_RUN_AS_NODE= npm test'

      - name: Run Unit Tests (Docker Logic)
        run: xvfb-run --auto-servernum ./node_modules/.bin/mocha out/test/unit/docker.test.js
