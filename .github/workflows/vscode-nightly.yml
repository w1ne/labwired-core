name: VS Code Extension Nightly

on:
  schedule:
    - cron: '10 4 * * *'
  workflow_dispatch:

jobs:
  build_matrix:
    defaults:
      run:
        working-directory: ./vscode
    runs-on: self-hosted
    container: ubuntu:22.04
    steps:
      - name: Install baseline tools
        run: |
          apt-get update
          apt-get install -y git sudo curl build-essential
          git config --global --add safe.directory /__w/labwired/labwired

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build LabWired (DAP)
        run: cargo build -p labwired-dap --release
        working-directory: ./core

      - name: Compile
        run: npm run compile

      - name: Install ARM target
        run: rustup target add thumbv7m-none-eabi

      - name: Build Demo Firmware Fixture
        run: cargo build -p demo-blinky --release --target thumbv7m-none-eabi
        working-directory: ./core

      - name: Install system dependencies for VS Code tests
        run: |
          apt-get update
          apt-get install -y xvfb libglib2.0-0 libnss3 libxss1 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2

      - name: Run Tests (Linux)
        run: xvfb-run --auto-servernum bash -lc 'ELECTRON_RUN_AS_NODE= npm test'

      - name: Run Unit Tests (Docker Logic)
        run: xvfb-run --auto-servernum ./node_modules/.bin/mocha out/test/unit/docker.test.js
