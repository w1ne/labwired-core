name: VS Code Extension Nightly

on:
  workflow_dispatch:

jobs:
  build_matrix:
    defaults:
      run:
        working-directory: ./vscode
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build LabWired (DAP)
        run: cargo build -p labwired-dap --release
        working-directory: ./core

      - name: Compile
        run: npm run compile

      - name: Install ARM target
        run: rustup target add thumbv7m-none-eabi

      - name: Build Demo Firmware Fixture
        run: cargo build -p demo-blinky --release --target thumbv7m-none-eabi
        working-directory: ./core

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum bash -lc 'ELECTRON_RUN_AS_NODE= npm test'

      - name: Run Tests (Non-Linux)
        if: runner.os != 'Linux'
        run: npm test
        working-directory: ./vscode

      - name: Run Unit Tests (Docker Logic)
        run: ./node_modules/.bin/mocha out/test/unit/docker.test.js
