name: Rust Core CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  test:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install ARM and RISC-V targets for exhaustive tests
        run: |
          rustup target add thumbv7m-none-eabi
          rustup target add thumbv6m-none-eabi
          rustup target add riscv32imac-unknown-none-elf

      - name: Build Demo Firmware Fixture
        run: cargo build -p demo-blinky --release --target thumbv7m-none-eabi

      - name: Unsupported Instruction Audit
        run: ./scripts/unsupported_instruction_audit.sh --firmware target/thumbv7m-none-eabi/release/demo-blinky --system configs/systems/ci-fixture-uart1.yaml --max-steps 20000 --out-dir out/unsupported-audit/ci-fixture --fail-on-unsupported

      - name: Run Workspace Tests
        run: cargo test --workspace

      - name: Build Workspace
        run: cargo build --workspace

      - name: Upload Unsupported Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unsupported-instruction-audit
          path: core/out/unsupported-audit/

  build:
    name: build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: echo "Build check passed (bridged from test)"
