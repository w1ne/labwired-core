name: Core Integration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  integration-smoke:
    name: core-integration-smoke
    runs-on: self-hosted
    container: ubuntu:22.04
    steps:
      - name: Install baseline tools
        run: |
          apt-get update
          apt-get install -y git sudo curl build-essential
          git config --global --add safe.directory /__w/labwired/labwired

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build CLI
        run: cargo build -p labwired-cli

      - name: Run integration smoke
        run: cargo run -q -p labwired-cli -- test --script examples/ci/dummy-max-uart-bytes.yaml --output-dir out/integration-smoke --no-uart-stdout
