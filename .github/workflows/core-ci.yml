name: Rust Core CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  test:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build Demo Firmware Fixture
        run: cargo build -p demo-blinky --release

      - name: Run Tests
        run: cargo test

      - name: Build
        run: cargo build

  build:
    name: Build (Bridge)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build check passed (bridged from test)"
