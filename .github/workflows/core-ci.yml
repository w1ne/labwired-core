name: Core Integration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  integration-smoke:
    name: core-integration-smoke
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure build toolchain
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "C compiler already available"
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential pkg-config
            exit 0
          fi

          if command -v dnf >/dev/null 2>&1; then
            sudo dnf groupinstall -y "Development Tools"
            sudo dnf install -y pkgconf-pkg-config
            exit 0
          fi

          if command -v yum >/dev/null 2>&1; then
            sudo yum groupinstall -y "Development Tools"
            sudo yum install -y pkgconfig
            exit 0
          fi

          echo "No supported package manager found to install a C toolchain."
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build CLI
        run: cargo build -p labwired-cli

      - name: Run integration smoke
        run: cargo run -q -p labwired-cli -- test --script examples/ci/dummy-max-uart-bytes.yaml --output-dir out/integration-smoke --no-uart-stdout
