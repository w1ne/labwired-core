name: Rust Core CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'core/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  integrity:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Workspace Tests
        run: cargo test --workspace

  build:
    name: build
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Unified build check passed"

  coverage:
    name: coverage
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Proxied to Nightly"

  unsupported-audit:
    name: unsupported-audit
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Proxied to Nightly"

  ci-fixture-arm:
    name: ci-fixture-arm
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Proxied to Nightly"

  ci-fixture-riscv:
    name: ci-fixture-riscv
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Proxied to Nightly"

  nucleo-h563zi:
    name: nucleo-h563zi
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - run: echo "Proxied to Nightly"
