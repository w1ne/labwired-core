name: Core Integration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

defaults:
  run:
    working-directory: ./checkout-main/core

jobs:
  integration-smoke:
    name: core-integration-smoke
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: checkout-main
          submodules: recursive

      - name: Ensure build toolchain
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "C compiler already available"
            exit 0
          fi

          if command -v clang >/dev/null 2>&1; then
            mkdir -p "$HOME/.local/bin"
            printf '#!/usr/bin/env bash\nexec clang "$@"\n' > "$HOME/.local/bin/cc"
            chmod +x "$HOME/.local/bin/cc"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "Created cc shim to clang"
            exit 0
          fi

          if command -v curl >/dev/null 2>&1 && command -v tar >/dev/null 2>&1; then
            arch="$(uname -m)"
            case "$arch" in
              x86_64) zig_pkg="zig-linux-x86_64-0.13.0" ;;
              aarch64) zig_pkg="zig-linux-aarch64-0.13.0" ;;
              *)
                zig_pkg=""
                ;;
            esac

            if [ -n "$zig_pkg" ]; then
              mkdir -p "$HOME/.local/zig" "$HOME/.local/bin"
              curl -fsSL "https://ziglang.org/download/0.13.0/${zig_pkg}.tar.xz" -o /tmp/zig.tar.xz
              tar -xf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
              printf '#!/usr/bin/env bash\nexec "$HOME/.local/zig/zig" cc "$@"\n' > "$HOME/.local/bin/cc"
              chmod +x "$HOME/.local/bin/cc"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              echo "Created cc shim to zig cc"
              exit 0
            fi
          fi

          if sudo -n true >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential pkg-config
              exit 0
            fi

            if command -v dnf >/dev/null 2>&1; then
              sudo dnf groupinstall -y "Development Tools"
              sudo dnf install -y pkgconf-pkg-config
              exit 0
            fi

            if command -v yum >/dev/null 2>&1; then
              sudo yum groupinstall -y "Development Tools"
              sudo yum install -y pkgconfig
              exit 0
            fi
          fi

          echo "No usable C toolchain found (no cc/clang, zig bootstrap unavailable, and no passwordless sudo for package install)."
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build CLI
        run: cargo build -p labwired-cli

      - name: Run integration smoke
        run: cargo run -q -p labwired-cli -- test --script examples/ci/dummy-max-uart-bytes.yaml --output-dir out/integration-smoke --no-uart-stdout

  determinism-gate:
    name: determinism-proof
    runs-on: self-hosted
    needs: integration-smoke
    steps:
      - uses: actions/checkout@v4
        with:
          path: checkout-main
          submodules: recursive

      - name: Ensure build toolchain
        run: |
          if command -v cc >/dev/null 2>&1; then
            echo "C compiler already available"
            exit 0
          fi

          if command -v clang >/dev/null 2>&1; then
            mkdir -p "$HOME/.local/bin"
            printf '#!/usr/bin/env bash\nexec clang "$@"\n' > "$HOME/.local/bin/cc"
            chmod +x "$HOME/.local/bin/cc"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "Created cc shim to clang"
            exit 0
          fi

          if command -v curl >/dev/null 2>&1 && command -v tar >/dev/null 2>&1; then
            arch="$(uname -m)"
            case "$arch" in
              x86_64) zig_pkg="zig-linux-x86_64-0.13.0" ;;
              aarch64) zig_pkg="zig-linux-aarch64-0.13.0" ;;
              *)
                zig_pkg=""
                ;;
            esac

            if [ -n "$zig_pkg" ]; then
              mkdir -p "$HOME/.local/zig" "$HOME/.local/bin"
              curl -fsSL "https://ziglang.org/download/0.13.0/${zig_pkg}.tar.xz" -o /tmp/zig.tar.xz
              tar -xf /tmp/zig.tar.xz -C "$HOME/.local/zig" --strip-components=1
              printf '#!/usr/bin/env bash\nexec "$HOME/.local/zig/zig" cc "$@"\n' > "$HOME/.local/bin/cc"
              chmod +x "$HOME/.local/bin/cc"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              echo "Created cc shim to zig cc"
              exit 0
            fi
          fi

          if sudo -n true >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential pkg-config
              exit 0
            fi
          fi

          echo "No usable C toolchain found"
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Run determinism proof (5 runs, result + trace comparison)
        run: cargo test -p labwired-cli --test determinism -- --nocapture

  compatibility-matrix:
    name: generate-compat-matrix
    runs-on: self-hosted
    needs: integration-smoke
    steps:
      - uses: actions/checkout@v4
        with:
          path: checkout-main
          submodules: recursive

      - name: Generate compatibility matrix
        run: python3 scripts/generate_compat_matrix.py > compatibility_matrix.json
        working-directory: ./checkout-main/core

      - name: Upload compatibility matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-matrix
          path: ./checkout-main/core/compatibility_matrix.json
