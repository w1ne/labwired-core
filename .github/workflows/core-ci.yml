name: Core Integration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

defaults:
  run:
    working-directory: ./core

jobs:
  integration-smoke:
    name: core-integration-smoke
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug Docker
        run: docker images

      - name: Build CLI
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/core w1ne/labwired-dev:latest cargo build -p labwired-cli

      - name: Run integration smoke
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/core w1ne/labwired-dev:latest cargo run -q -p labwired-cli -- test --script examples/ci/dummy-max-uart-bytes.yaml --output-dir out/integration-smoke --no-uart-stdout
