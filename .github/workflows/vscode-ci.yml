name: VS Code Extension CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'
      - 'core/**'
      - '.github/workflows/vscode-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'
      - 'core/**'
      - '.github/workflows/vscode-ci.yml'
  workflow_dispatch:

jobs:
  integration-smoke:
    name: vscode-integration-smoke
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest npm ci

      - name: Build LabWired (DAP)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/core w1ne/labwired-dev:latest cargo build -p labwired-dap --release

      - name: Compile
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/vscode w1ne/labwired-dev:latest npm run compile

      - name: Run Unit Tests (Docker Logic)
        run: ./node_modules/.bin/mocha out/test/unit/docker.test.js
