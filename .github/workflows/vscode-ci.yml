name: VS Code Extension CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'

defaults:
  run:
    working-directory: ./vscode

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.x

      - name: Install Dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Run Headless Test
        if: runner.os == 'Linux'
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test

      - name: Run Unit Tests (Docker Logic)
        run: ./node_modules/.bin/mocha out/test/unit/docker.test.js
