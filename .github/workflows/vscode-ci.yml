name: VS Code Extension CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'
      - 'core/**'
      - '.github/workflows/vscode-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vscode/**'
      - 'core/**'
      - '.github/workflows/vscode-ci.yml'
  workflow_dispatch:

jobs:
  integration-smoke:
    name: vscode-integration-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build LabWired (DAP)
        run: cargo build -p labwired-dap --release
        working-directory: ../core

      - name: Compile
        run: npm run compile

      - name: Run Unit Tests (Docker Logic)
        run: xvfb-run --auto-servernum ./node_modules/.bin/mocha out/test/unit/docker.test.js
