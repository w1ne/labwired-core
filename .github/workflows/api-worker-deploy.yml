name: Deploy API Worker

on:
  push:
    branches: ["main"]
    paths:
      - "packages/api/**"
      - "packages/board-config/**"
      - ".github/workflows/api-worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-deploy:
    # Self-hosted pluto runner ([self-hosted, deploy]) — GitHub-hosted runners
    # are unavailable while Actions billing is blocked. Same runner the catalog
    # publish + Pages deploy use.
    runs-on: [self-hosted, deploy]
    steps:
      # A prior job (e.g. a container running as root) can leave root-owned files
      # in the self-hosted runner workspace; the runner user has no sudo, so
      # actions/checkout's clean step fails with EACCES. rm what we can; if
      # root-owned files remain, rename the dir aside (we own the PARENT) and
      # checkout recreates it clean.
      - name: Reset self-hosted workspace
        run: |
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -d "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE" 2>/dev/null \
              || mv "$GITHUB_WORKSPACE" "${GITHUB_WORKSPACE}.broken.$(date +%s%N)" 2>/dev/null \
              || true
          fi
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            packages/api/package-lock.json
            packages/board-config/package-lock.json

      - name: Install board-config dependencies
        working-directory: packages/board-config
        run: npm ci --ignore-scripts

      - name: Build board-config
        working-directory: packages/board-config
        run: npm run build

      - name: Install dependencies
        working-directory: packages/api
        run: npm ci --ignore-scripts

      - name: Run API tests
        working-directory: packages/api
        run: npm test

      - name: Deploy to Cloudflare Workers
        working-directory: packages/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_API_ACCOUNT_ID }}
        run: npx wrangler deploy
