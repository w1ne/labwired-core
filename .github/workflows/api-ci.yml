name: API Fast Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'foundry/backend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./foundry/backend

jobs:
  test:
    name: go-test-api
    runs-on: self-hosted
    container: ubuntu:22.04
    steps:
      - name: Install baseline tools
        run: |
          apt-get update
          apt-get install -y git sudo curl build-essential
          git config --global --add safe.directory /__w/labwired/labwired

      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: foundry/backend/go.sum

      - name: Run Tests
        run: go test -v -short ./...
