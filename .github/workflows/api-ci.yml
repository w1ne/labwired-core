name: API Fast Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'foundry/backend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./foundry/backend

jobs:
  test:
    name: go-test-api
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app/foundry/backend w1ne/labwired-dev:latest go test -v -short ./...
