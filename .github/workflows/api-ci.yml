name: API Fast Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'foundry/backend/**'
  workflow_dispatch:

jobs:
  test:
    name: go-test-api
    runs-on: [self-hosted, ci]
    container: ubuntu:22.04
    steps:
      # Note: cannot use job-level `defaults.run.working-directory: ./foundry/backend`
      # because the first step (Install baseline tools) runs BEFORE checkout
      # and the foundry/ directory doesn't yet exist in the workspace — the
      # container fails to chdir and exits 127. Set working-directory per
      # step instead, only on the steps that need it.
      - name: Install baseline tools
        run: |
          apt-get update
          apt-get install -y git sudo curl build-essential
          git config --global --add safe.directory /__w/labwired/labwired

      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: foundry/backend/go.sum

      - name: Run Tests
        working-directory: ./foundry/backend
        run: go test -v -short ./...
