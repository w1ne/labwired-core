name: Pluto Maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Maintenance task to run on Pluto"
        required: false
        default: cleanup
        type: choice
        options:
          - cleanup
          - foundry-repair
  schedule:
    - cron: "30 3 * * *"

jobs:
  cleanup:
    if: github.event_name == 'schedule' || github.event.inputs.task == 'cleanup' || github.event.inputs.task == ''
    runs-on: self-hosted
    timeout-minutes: 20
    concurrency:
      group: pluto-maintenance
      cancel-in-progress: false
    steps:
      - name: Environment snapshot
        run: |
          set -euo pipefail
          echo "host=$(hostname)"
          date -u
          df -h
          docker system df || true

      - name: Cleanup runner workspaces and logs
        run: |
          set -euo pipefail
          # Keep only fresh run folders and recent diagnostics.
          for base in /home/w1ne/actions-runner*; do
            [ -d "$base" ] || continue
            find "$base/_work" -mindepth 1 -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
            find "$base/_work/_temp" -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + || true
            find "$base/_diag" -type f -mtime +7 -delete || true
          done

          # Legacy github-pages temp dirs can accumulate quickly.
          find /home/w1ne -maxdepth 1 -type d -name 'actions_github_pages_*' -mtime +2 -exec rm -rf {} + || true

      - name: Cleanup Docker caches
        run: |
          set -euo pipefail
          # Safe pruning: no volume prune to avoid deleting active data.
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true

      - name: Post-clean snapshot
        run: |
          set -euo pipefail
          df -h
          docker system df || true

  foundry_repair:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'foundry-repair'
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Repair Foundry on Pluto
        env:
          DEPLOY_PATH: /home/w1ne/labwired/foundry/deploy
        run: |
          set -euo pipefail

          verify_foundry() {
            local proxy_health catalog_json
            proxy_health="$(curl -fsS --retry 10 --retry-delay 3 -H 'Host: foundry.labwired.com' http://127.0.0.1/v1/health)"
            catalog_json="$(curl -fsS --retry 10 --retry-delay 3 -H 'Host: foundry.labwired.com' http://127.0.0.1/v1/catalog)"

            PROXY_HEALTH_JSON="$proxy_health" CATALOG_JSON="$catalog_json" python3 -c 'import json, os, sys; proxy=json.loads(os.environ["PROXY_HEALTH_JSON"]); catalog=json.loads(os.environ["CATALOG_JSON"]); total=len(catalog); architectures=sum(1 for row in catalog if (row.get("architecture") or "").strip()); validations=sum(1 for row in catalog if (row.get("validation_url") or "").strip()); print(json.dumps({"proxy_status": proxy.get("status"), "catalog_total": total, "catalog_architectures": architectures, "catalog_validations": validations}, indent=2)); proxy.get("status") == "healthy" or sys.exit("foundry proxy health endpoint is not healthy"); (total > 0 and architectures > 0 and validations > 0) or sys.exit("foundry catalog metadata verification failed")'
          }

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing .env in $DEPLOY_PATH"
            exit 1
          fi

          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          docker compose --env-file .env -f docker-compose.prod.yml ps
          docker compose --env-file .env -f docker-compose.prod.yml logs --tail=120 foundry-backend

          verify_foundry
