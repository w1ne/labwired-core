name: Pluto Maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Maintenance task to run on Pluto"
        required: false
        default: cleanup
        type: choice
        options:
          - cleanup
          - foundry-repair
  schedule:
    - cron: "30 3 * * *"

jobs:
  foundry-emergency-repair:
    runs-on: self-hosted
    timeout-minutes: 15
    concurrency:
      group: pluto-foundry-emergency-repair
      cancel-in-progress: false
    steps:
      - name: Restore Foundry backend bootability
        run: |
          set -euxo pipefail
          cd /home/w1ne/labwired/foundry/deploy

          if grep -q '^STRIPE_WEBHOOK_SECRET=' .env; then
            current_value="$(sed -n 's/^STRIPE_WEBHOOK_SECRET=//p' .env)"
          else
            current_value=""
          fi

          if [ -z "$current_value" ]; then
            if grep -q '^STRIPE_WEBHOOK_SECRET=' .env; then
              sed -i 's/^STRIPE_WEBHOOK_SECRET=.*/STRIPE_WEBHOOK_SECRET=disabled/' .env
            else
              echo 'STRIPE_WEBHOOK_SECRET=disabled' >> .env
            fi
          fi

          docker compose --env-file .env -f docker-compose.prod.yml up -d
          docker compose --env-file .env -f docker-compose.prod.yml restart caddy
          sleep 5
          docker compose --env-file .env -f docker-compose.prod.yml ps
          docker compose --env-file .env -f docker-compose.prod.yml logs --tail=50 foundry-backend || true
          curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/health
          curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/catalog

  cleanup:
    if: github.event_name == 'schedule' || github.event.inputs.task == 'cleanup' || github.event.inputs.task == ''
    runs-on: self-hosted
    timeout-minutes: 20
    concurrency:
      group: pluto-maintenance
      cancel-in-progress: false
    steps:
      - name: Environment snapshot
        run: |
          set -euo pipefail
          echo "host=$(hostname)"
          date -u
          df -h
          docker system df || true

      - name: Cleanup runner workspaces and logs
        run: |
          set -euo pipefail
          # Keep only fresh run folders and recent diagnostics.
          for base in /home/w1ne/actions-runner*; do
            [ -d "$base" ] || continue
            find "$base/_work" -mindepth 1 -maxdepth 1 -type d -name 'run-*' -mtime +1 -exec rm -rf {} + || true
            find "$base/_work/_temp" -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + || true
            find "$base/_diag" -type f -mtime +7 -delete || true
          done

          # Legacy github-pages temp dirs can accumulate quickly.
          find /home/w1ne -maxdepth 1 -type d -name 'actions_github_pages_*' -mtime +2 -exec rm -rf {} + || true

      - name: Cleanup Docker caches
        run: |
          set -euo pipefail
          # Safe pruning: no volume prune to avoid deleting active data.
          docker container prune -f --filter "until=240h" || true
          docker image prune -af --filter "until=240h" || true
          docker builder prune -af --filter "until=240h" || true

      - name: Post-clean snapshot
        run: |
          set -euo pipefail
          df -h
          docker system df || true

  foundry_repair:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'foundry-repair'
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Repair Foundry on Pluto
        env:
          DEPLOY_PATH: /home/w1ne/labwired/foundry/deploy
        run: |
          set -euo pipefail

          verify_foundry() {
            local tmp_dir
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' RETURN

            curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/health  > "$tmp_dir/health.json"
            curl -fsS --retry 10 --retry-all-errors --retry-delay 3 https://foundry.labwired.com/v1/catalog > "$tmp_dir/catalog.json"

            python3 -c 'import json,sys; proxy=json.load(open(sys.argv[1])); catalog=json.load(open(sys.argv[2])); total=len(catalog); arch=sum(1 for r in catalog if (r.get("architecture") or "").strip()); val=sum(1 for r in catalog if (r.get("validation_url") or "").strip()); print(json.dumps({"proxy_status":proxy.get("status"),"catalog_total":total,"catalog_architectures":arch,"catalog_validations":val},indent=2)); proxy.get("status")=="healthy" or sys.exit("proxy health endpoint is not healthy"); total>0 or sys.exit("catalog is empty"); arch>0 or sys.exit("catalog has zero architecture metadata"); val>0 or sys.exit("catalog has zero validation links")' "$tmp_dir/health.json" "$tmp_dir/catalog.json"
          }

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing .env in $DEPLOY_PATH"
            exit 1
          fi

          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          docker compose --env-file .env -f docker-compose.prod.yml ps
          docker compose --env-file .env -f docker-compose.prod.yml logs --tail=120 foundry-backend

          # Print the Caddyfile on disk to verify it has the expected routes
          echo "=== Caddyfile on disk ==="
          cat "$DEPLOY_PATH/Caddyfile"
          echo "=== End Caddyfile ==="

          # Print Caddy's active in-memory config via admin API
          echo "=== Caddy active routes (playground check) ==="
          docker compose --env-file .env -f docker-compose.prod.yml exec -T caddy \
            wget -qO- http://localhost:2019/config/ 2>/dev/null | python3 -c "import sys,json; cfg=json.load(sys.stdin); routes=cfg.get('apps',{}).get('http',{}).get('servers',{}).get('srv0',{}).get('routes',cfg.get('apps',{}).get('http',{}).get('servers',{})); print(json.dumps(routes, indent=2))" 2>/dev/null || echo "(admin API check failed)"

          # Restart Caddy to ensure it picks up the new Caddyfile
          docker compose --env-file .env -f docker-compose.prod.yml restart caddy
          sleep 5

          verify_foundry
