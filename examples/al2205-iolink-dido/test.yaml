# Headless run of the two-port IO-Link DI firmware in the simulator.
# The run exits as soon as both ports reach OPERATE with distinct process data.
schema_version: "1.0"
inputs:
  system: "./system.yaml"
  firmware: "./firmware/al2205_dido.elf"
limits:
  max_steps: 20000000
  stop_when_assertions_pass: true
assertions:
  - uart_contains: "AL2205 BOOT"
  - uart_contains: "IOLINK INIT OK"
  - uart_contains: "PORT2 STATE=04 OPERATE PD=A5"
  - uart_contains: "PORT3 STATE=04 OPERATE PD=3C"
