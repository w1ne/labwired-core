[package]
name = "tier1-fixture-esp32"
version = "0.1.0"
edition = "2021"
authors = ["LabWired Team <team@labwired.io>"]
license = "MIT"
description = "ESP32-classic Tier-1 fixture firmware: raw-register peripheral self-tests reporting over UART0 via the TIER1 protocol."

[dependencies]
esp-hal                = { version = "1.1", features = ["esp32", "unstable"] }
esp-println   = { version = "0.17", default-features = false, features = ["esp32", "uart", "critical-section"] }
esp-backtrace = { version = "0.19", features = ["esp32", "panic-handler", "println"] }

[profile.release]
opt-level     = "s"
lto           = "thin"
codegen-units = 1
debug         = true   # keep DWARF so the simulator can resolve symbols
