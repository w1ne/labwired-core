; LabWired — PlatformIO + LabWired digital-twin example (ESP32 e-paper)
;
; Build a real Arduino-ESP32 e-paper firmware with PlatformIO, then run the
; same ELF inside the LabWired simulator — the firmware drives a simulated
; SSD1680 tri-color panel exactly as it drives the physical Waveshare 2.9".
; No board, no panel, no flashing.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    zinggjm/GxEPD2@^1.6.0
