; LabWired - PlatformIO + LabWired integration example
;
; `pio test` builds a Unity test firmware for the nRF52840, then runs it inside
; the LabWired deterministic simulator instead of on physical hardware. Unity
; output is streamed over UART0 to the process stdout, where PlatformIO's Unity
; parser reads the PASS/FAIL results back. No hardware, no probe, no upload.
;
; Prerequisite: the `labwired` CLI must be on PATH (override with the LABWIRED
; env var if you keep it elsewhere). See README.md.

[platformio]
; Required so the ${platformio.*} template variables below resolve.

[env:nrf52840_dk]
platform = nordicnrf52
board = nrf52840_dk
; No framework: bare-metal. Unity output is configured by test/unity_config.h.
framework =
test_framework = unity

; No framework: a tiny, deterministic bare-metal image that boots instantly in
; the model (own startup + linker script in this directory).
board_build.ldscript = nrf52840.ld
build_flags =
    -mcpu=cortex-m4
    -mthumb
    -mfloat-abi=soft
    -nostartfiles
    -ffreestanding
    ; Bare-metal target: no setjmp/longjmp runtime. Unity's TEST_PROTECT/ABORT
    ; degrade gracefully (a failing assert is recorded, the suite continues).
    -D UNITY_EXCLUDE_SETJMP_H
; Compile src/ (startup, UART driver) into the test firmware too.
test_build_src = true

; ---------------------------------------------------------------------------
; The integration point: run unit tests in LabWired rather than on-target.
; PlatformIO builds firmware.elf, then executes this command and parses its
; stdout for Unity results.
; ---------------------------------------------------------------------------
test_testing_command =
    labwired
    test
    --no-key
    --script
    labwired.test.yaml
    --firmware
    ${platformio.build_dir}/${this.__env__}/firmware.elf
