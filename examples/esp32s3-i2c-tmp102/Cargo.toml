[package]
name = "esp32s3-i2c-tmp102"
version = "0.1.0"
edition = "2021"
authors = ["LabWired Team <team@labwired.io>"]
license = "MIT"
description = "ESP32-S3 I2C + TMP102 demo (Plan 4) for the LabWired simulator and real silicon."

[[bin]]
name = "esp32s3-i2c-tmp102"
path = "src/main.rs"

[dependencies]
esp-hal       = { version = "1.1", features = ["esp32s3", "unstable"] }
esp-println   = { version = "0.17", default-features = false, features = ["esp32s3", "jtag-serial", "colors", "critical-section"] }
esp-backtrace = { version = "0.19", features = ["esp32s3", "panic-handler", "println"] }
critical-section = "1.2"

[profile.release]
opt-level     = "s"
lto           = "thin"
codegen-units = 1
debug         = true   # keep DWARF so the simulator can resolve symbols
