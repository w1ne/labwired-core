[workspace]
members = []

[package]
name = "stm32h735-embassy-demo"
version = "0.1.0"
edition = "2021"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }
embassy-stm32 = { version = "0.2", features = ["stm32h735vg", "memory-x", "unstable-pac"] }

[profile.release]
debug = true
opt-level = "s"
