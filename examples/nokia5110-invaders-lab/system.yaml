name: "nokia5110-invaders-lab"
chip: "../../configs/chips/stm32l476.yaml"
# STM32L476 reset clock: MSI range 6, 4 MHz. Peripheral calibration clocks
# below are independent device settings and must not affect MCU pacing.
cpu_hz: 4_000_000
# Walk-deletion (event-scheduler builds): the firmware drives only SPI1
# (event-migrated) + GPIO (no-op tick); the HC-SR04 echo is serviced outside
# the walk; every other peripheral is inert here. Verified byte-identical
# walk-free — see the walk-identity check. ~2x sim throughput in the browser.
walk_deleted: true
# spi1, gpioa-e and rcc all come from the chip descriptor; we only attach the
# external devices and declare the host-controllable I/O here.
external_devices:
  - id: "lcd"
    type: "pcd8544"
    connection: "spi1"
    config:
      cs_pin: "PB6"
      dc_pin: "PC7"
  - id: "dist"
    type: "hc-sr04"
    # GPIO-wired (no SPI/I2C bus); connection is unused for this device type.
    connection: "gpioa"
    config:
      trig_pin: "PA8"
      echo_pin: "PB10"
      distance_cm: 30.0
      cpu_hz: 250000
board_io:
  - id: "lcd"
    kind: "spi_device"
    peripheral: "spi1"
    pin: 6
    signal: "input"
    active_high: true
    device_type: "pcd8544"
