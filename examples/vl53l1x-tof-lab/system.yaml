name: "vl53l1x-tof-lab"
chip: "../../configs/chips/stm32f103.yaml"
external_devices:
  - id: "vl53l1x"
    type: "vl53l1x"
    connection: "i2c1"
    config:
      i2c_address: 0x29
board_io:
