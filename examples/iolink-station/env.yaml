name: "iolink-station-2node"
nodes:
  - id: "master"
    system: "master/system.yaml"
    firmware: "master-fw/master.elf"
  - id: "sensor1"
    system: "sensor/system.yaml"
    firmware: "../iolink-dido/firmware/iolink_dido.elf"
interconnects:
  - type: "uart_cross_link"
    nodes: ["master", "sensor1"]
    config:
      node_a_uart: "uart2"
      node_b_uart: "uart2"
