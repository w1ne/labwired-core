name: "f103-j1939-monitor"
chip: "../../configs/chips/stm32f103.yaml"
external_devices:
  # Replays an 8s synthetic J1939 traffic capture (see captures/synthetic-j1939-8s.log,
  # generated by tools/gen_synthetic_j1939.py) onto bxCAN at recorded relative
  # timing. 1 tick = 1 µs of recorded time.
  - type: "can-player"
    id: "capture-replay"
    connection: "bxcan1"
    config:
      path: "./captures/synthetic-j1939-8s.log"
      ticks_per_second: 1000000
board_io: []
