# LabWired - Leo air-quality sensor (ESP32-C3 + Sensirion + Vishay), NORMAL.
#
# An ESP32-C3 reads four air-quality sensors over the behavioral I²C0 controller
# (0x60013000) using the REAL, unmodified Sensirion embedded-i2c drivers
# (SCD41/SGP41/SPS30) plus a register-level VEML7700 driver, all ON-TARGET. It
# turns the raw measurements into a plain-language verdict over UART0 — Leo's
# core promise, with no hardware in the loop.
#
# NORMAL scenario: a closed room slowly fills up. CO₂ climbs from a fresh
# ~450 ppm toward a stuffy ~1400 ppm (first-order, alpha 0.08), particulates
# drift up, the light dims toward evening. The firmware's verdict must flip from
# "air quality is good" to "CO2 climbing, crack a window" as CO₂ crosses
# 1000 ppm — a transition the firmware infers purely from the decoded readings,
# blind to this scene config.
name: "esp32c3-leo-airquality-normal"
chip: "../../configs/chips/esp32c3.yaml"
cpu_hz: 160_000_000

external_devices:
  # ── Sensirion SCD41: CO₂ + temperature + humidity ─────────────────────────
  - id: "scd41"
    type: "scd41"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x62
      co2_ppm: 450.0          # initial value; the scene drives `co2` at runtime
      temp_c: 22.0
      rh_pct: 50.0           # initial value; driven via `humidity`

  # ── Sensirion SGP41: VOC / NOx raw signals (→ VOC Index on-device) ─────────
  - id: "sgp41"
    type: "sgp41"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x59
      voc_sraw: 28000.0       # initial value; driven via `voc_sraw`
      nox_sraw: 16000.0

  # ── Sensirion SPS30: particulate matter (PM1/2.5/4/10) ─────────────────────
  - id: "sps30"
    type: "sps30"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x69
      pm2_5: 6.0             # initial value; driven via `pm2_5`

  # ── Vishay VEML7700: ambient light ────────────────────────────────────────
  - id: "veml7700"
    type: "veml7700"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x10
      lux: 450.0             # initial value; driven via `lux`

  # ── Melexis MLX90614: IR surface temperature (condensation / mold) ────────
  # Pointed at a cold spot (window / exterior wall). As the room air RH climbs
  # into the 70s, this cold surface drifts down past the dew point, so its
  # surface RH hits condensation while the *air* still reads a benign ~70 %.
  # That crossover is what the firmware's surface-condensation flag catches —
  # the moisture-first mold signal an air-only humidity index cannot see.
  - id: "surface-ir"
    type: "mlx90614"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x5A
      surface_temp_c: 18.0    # initial value; driven via `surface_temp`
      ambient_temp_c: 22.0          # roughly the room air temperature

  # ── SSD1306 OLED: on-device screen showing the plain-language verdict ──────
  - id: "oled"
    type: "oled-ssd1306"
    connection: "i2c0"
    route:
      sda: "GPIO4"
      scl: "GPIO5"
    config:
      i2c_address: 0x3C

# Every device declares the physical I²C0 route (SDA=GPIO4, SCL=GPIO5); no
# GPIO board_io binding is needed for these I²C peripherals.
board_io: []
