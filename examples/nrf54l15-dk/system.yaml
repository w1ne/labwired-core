# LabWired - nRF54L15-DK Example System Configuration
#
# Local mirror of configs/systems/nrf54l15dk.yaml so the strict-onboarding gate
# (crates/core/tests/strict_onboarding.rs) can associate this example directory
# with the nrf54l15 chip via its `system.yaml`, exactly like every other
# onboarded board. Pin assignments come from the Zephyr board devicetree
# `boards/nordic/nrf54l15dk/nrf54l15dk_common.dtsi`. UARTE20 is the DK console.
name: "nrf54l15dk-example"
chip: "../../configs/chips/nrf54l15.yaml"
external_devices: []
board_io:
  # LEDs — all active-high on this board (DT: GPIO_ACTIVE_HIGH).
  - id: "led0"
    kind: "led"
    peripheral: "gpio2"
    pin: 9
    signal: "output"
    active_high: true
  - id: "led1"
    kind: "led"
    peripheral: "gpio1"
    pin: 10
    signal: "output"
    active_high: true
  - id: "led2"
    kind: "led"
    peripheral: "gpio2"
    pin: 7
    signal: "output"
    active_high: true
  - id: "led3"
    kind: "led"
    peripheral: "gpio1"
    pin: 14
    signal: "output"
    active_high: true

  # Buttons — active-low with pull-ups (DT: GPIO_PULL_UP | GPIO_ACTIVE_LOW).
  - id: "button0"
    kind: "button"
    peripheral: "gpio1"
    pin: 13
    signal: "input"
    active_high: false
  - id: "button1"
    kind: "button"
    peripheral: "gpio1"
    pin: 9
    signal: "input"
    active_high: false
  - id: "button2"
    kind: "button"
    peripheral: "gpio1"
    pin: 8
    signal: "input"
    active_high: false
  - id: "button3"
    kind: "button"
    peripheral: "gpio0"
    pin: 4
    signal: "input"
    active_high: false
