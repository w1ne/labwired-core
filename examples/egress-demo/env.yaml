# Egress-bridge demo environment.
#
# Streams a simulated node's UART TX out to a real backend. The `egress`
# interconnect taps the node's `usart2` and publishes every transmitted byte to
# an MQTT topic — so your existing dashboard/broker receives data from the exact
# firmware you will flash, no hardware required.
#
# Swap `transport`/`url` to point at your own broker or socket:
#   transport: tcp   url: "127.0.0.1:9000"
#   transport: mqtt  url: "mqtt://broker.example.io:1883"  topic: "plant/line3/temp"
#   transport: http  url: "http://ingest.example.io:8080/telemetry"
#
# encoding: raw | ndjson-trace | frames-json
name: "egress-demo"
nodes:
  - id: "sensor"
    system: "../neo6m-gps-lab/system.yaml"
    firmware: "../neo6m-gps-lab/firmware.elf"
interconnects:
  - type: "egress"
    nodes: ["sensor"]
    config:
      uart: "usart2"
      transport: "mqtt"
      url: "mqtt://127.0.0.1:1883"
      topic: "labwired/sensor/uart"
      encoding: "raw"
      buffer_max: 4096
