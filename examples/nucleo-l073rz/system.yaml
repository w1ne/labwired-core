# LabWired - NUCLEO-L073RZ system manifest (example copy)
#
# Mirrors configs/systems/nucleo-l073rz.yaml so this example is reproducible
# standalone. Board pinout per UM1724 (STM32 Nucleo-64). LD2 (green) on PA5;
# B1 (blue user) on PC13. USART2 PA2 (TX, AF4) / PA3 (RX, AF4) → on-board
# ST-LINK V2-1 Virtual COM Port.

name: "nucleo-l073rz"
chip: "../../configs/chips/stm32l073.yaml"
external_devices: []
board_io:
  - id: "led_ld2"
    kind: "led"
    peripheral: "gpioa"
    pin: 5
    signal: "output"
    active_high: true
  - id: "button_b1"
    kind: "button"
    peripheral: "gpioc"
    pin: 13
    signal: "input"
    active_high: false
