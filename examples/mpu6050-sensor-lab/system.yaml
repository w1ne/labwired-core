name: "mpu6050-sensor-lab"
chip: "../../configs/chips/stm32f103.yaml"
external_devices:
  - id: "mpu6050"
    type: "mpu6050"
    connection: "i2c1"
    config:
      i2c_address: 0x68
board_io:
  - id: "mpu6050"
    kind: "i2c_device"
    peripheral: "i2c1"
    pin: 0
    signal: "input"
    active_high: true
    i2c_address: 0x68
    device_type: "mpu6050"
