name: "ina219-power-lab"
chip: "../../configs/chips/stm32f103.yaml"
external_devices:
  - id: "ina219"
    type: "ina219"
    connection: "i2c1"
    config:
      i2c_address: 0x40
board_io:
  - id: "ina219"
    kind: "i2c_device"
    peripheral: "i2c1"
    pin: 0
    signal: "input"
    active_high: true
    i2c_address: 0x40
    device_type: "ina219"
