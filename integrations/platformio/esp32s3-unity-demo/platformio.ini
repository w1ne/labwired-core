; LabWired × PlatformIO — closed-loop demo
; An agent authors + compiles this firmware with PlatformIO, then it is
; deployed into the LabWired simulator for deterministic verification.
;
; `test_testing_command` (wired in a later step) hands the built ELF to the
; `labwired` simulator instead of flashing hardware — the Renode-style seam.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; The connected board (and the esp32s3-zero sim model) have 4 MB flash; the
; devkitc-1 default image header says 8 MB, which makes IDF's flash probe
; assert and reboot-loop before setup(). Pin 4 MB for real/sim parity.
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
; The board default partition table is sized for 8 MB (a partition overruns
; 0x400000). Arduino's default.csv fits exactly 4 MB.
board_build.partitions = default.csv
; No HWCDC takeover: the Arduino HWCDC re-enumerates USB on boot, which on this
; host drops the whole 303a device (killing both CDC and the JTAG link). Leaving
; USB in its ROM/IDF state keeps the built-in JTAG alive across boot, so the HW
; oracle reads the Unity result struct from RAM over JTAG (output routing is
; irrelevant — the struct is populated regardless). Boot the app without a
; button via esptool `--after watchdog-reset` (full RTC reset).
