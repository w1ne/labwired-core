name: ADXL345
registers:
- name: DEVID
  offset: '0x00'
  reset_value: '0xE5'
  access: ReadOnly
  fields:
  - name: DEVID
    bit_range:
    - 0
    - 7
    description: Fixed device ID code of 0xE5 (11100101 binary, 345 octal).
- name: THRESH_TAP
  offset: '0x1D'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: THRESHOLD
    bit_range:
    - 0
    - 7
    description: Tap threshold. Unsigned data format. Scale factor 62.5 mg/LSB (0x00=0
      g, 0xFF=+16 g). A value of 0 may result in undesirable behavior if tap/double
      tap interrupts are enabled.
- name: OFSX
  offset: '0x1E'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: OFSX
    bit_range:
    - 0
    - 7
    description: X-axis offset adjustment in twos complement format with a scale factor
      of 15.6 mg/LSB (that is, 0x7F = +2 g).
- name: OFSY
  offset: '0x1F'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: OFSY
    bit_range:
    - 0
    - 7
    description: Y-axis offset adjustment in twos complement format with a scale factor
      of 15.6 mg/LSB (0x7F = +2 g)
- name: OFSZ
  offset: '0x20'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: OFSZ
    bit_range:
    - 0
    - 7
    description: Z-axis offset adjustment in twos complement format with a scale factor
      of 15.6 mg/LSB (0x7F = +2 g).
- name: DUR
  offset: '0x21'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: Duration
    bit_range:
    - 0
    - 7
    description: "Unsigned time value representing the maximum time that an event\
      \ must be above the THRESH_TAP threshold to qualify as a tap event. The scale\
      \ factor is 625 \u03BCs/LSB. A value of 0 disables the tap/double tap functions."
- name: Latent
  offset: '0x22'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: LATENT
    bit_range:
    - 0
    - 7
    description: Unsigned time value representing the wait time from the detection
      of a tap event to the start of the time window (defined by the window register)
      during which a possible second tap event can be detected. The scale factor is
      1.25 ms/LSB. A value of 0 disables the double tap function.
- name: Window
  offset: '0x23'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: Window
    bit_range:
    - 0
    - 7
    description: Unsigned time value representing the amount of time after the expiration
      of the latency time (determined by the latent register) during which a second
      valid tap can begin. The scale factor is 1.25 ms/LSB. A value of 0 disables
      the double tap function.
- name: THRESH_ACT
  offset: '0x24'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: THRESH_ACT
    bit_range:
    - 0
    - 7
    description: Threshold value for detecting activity. The data format is unsigned,
      so the magnitude of the activity event is compared with the value in the THRESH_ACT
      register. The scale factor is 62.5 mg/LSB. A value of 0 may result in undesirable
      behavior if the activity interrupt is enabled.
- name: THRESH_INACT
  offset: '0x25'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: THRESH_INACT
    bit_range:
    - 0
    - 7
    description: 'Threshold value for detecting inactivity. Unsigned data format.
      Scale factor: 62.5 mg/LSB.'
- name: TIME_INACT
  offset: '0x26'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: Inactivity Time
    bit_range:
    - 0
    - 7
    description: Unsigned time value representing the amount of time that acceleration
      must be less than the value in the THRESH_INACT register for inactivity to be
      declared. The scale factor is 1 sec/LSB. Uses filtered output data. A value
      of 0 results in an interrupt when the output data is less than the value in
      the THRESH_INACT register.
- name: ACT_INACT_CTL
  offset: '0x27'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: ACT_AC_DC
    bit_range:
    - 7
    - 7
    description: ACT AC/DC coupling. 0 selects dc-coupled operation, 1 enables ac-coupled
      operation.
  - name: ACT_X_EN
    bit_range:
    - 6
    - 6
    description: ACT_X enable. 1 enables x-axis for activity detection, 0 excludes
      it.
  - name: ACT_Y_EN
    bit_range:
    - 5
    - 5
    description: ACT_Y enable. 1 enables y-axis for activity detection, 0 excludes
      it.
  - name: ACT_Z_EN
    bit_range:
    - 4
    - 4
    description: ACT_Z enable. 1 enables z-axis for activity detection, 0 excludes
      it.
  - name: INACT_AC_DC
    bit_range:
    - 3
    - 3
    description: INACT AC/DC coupling. 0 selects dc-coupled operation, 1 enables ac-coupled
      operation.
  - name: INACT_X_EN
    bit_range:
    - 2
    - 2
    description: INACT_X enable. 1 enables x-axis for inactivity detection, 0 excludes
      it.
  - name: INACT_Y_EN
    bit_range:
    - 1
    - 1
    description: INACT_Y enable. 1 enables y-axis for inactivity detection, 0 excludes
      it.
  - name: INACT_Z_EN
    bit_range:
    - 0
    - 0
    description: INACT_Z enable. 1 enables z-axis for inactivity detection, 0 excludes
      it. If all axes excluded, function disabled.
- name: THRESH_FF
  offset: '0x28'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: THRESH_FF
    bit_range:
    - 0
    - 7
    description: Threshold value, in unsigned format, for free-fall detection. The
      root-sum-square (RSS) value of all axes is calculated and compared with the
      value in THRESH_FF to determine if a free-fall event occurred. The scale factor
      is 62.5 mg/LSB. A value of 0 mg may result in undesirable behavior if the free-fall
      interrupt is enabled. Values between 300 mg and 600 mg (0x05 to 0x09) are recommended.
- name: TIME_FF
  offset: '0x29'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: Free-fall time
    bit_range:
    - 0
    - 7
    description: Unsigned time value representing the minimum time that the RSS value
      of all axes must be less than THRESH_FF to generate a free-fall interrupt. The
      scale factor is 5 ms/LSB. A value of 0 may result in undesirable behavior if
      the free-fall interrupt is enabled. Values between 100 ms and 350 ms (0x14 to
      0x46) are recommended.
- name: TAP_AXES
  offset: '0x2A'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: SUPPRESS
    bit_range:
    - 3
    - 3
    description: Setting the suppress bit suppresses double tap detection if acceleration
      greater than the value in THRESH_TAP is present between taps. See the Tap Detection
      section for more details.
  - name: TAP_X
    bit_range:
    - 2
    - 2
    description: A setting of 1 in the TAP_X enable bit enables x-axis participation
      in tap detection. A setting of 0 excludes the x-axis from participation in tap
      detection.
  - name: TAP_Y
    bit_range:
    - 1
    - 1
    description: A setting of 1 in the TAP_Y enable bit enables y-axis participation
      in tap detection. A setting of 0 excludes the y-axis from participation in tap
      detection.
  - name: TAP_Z
    bit_range:
    - 0
    - 0
    description: A setting of 1 in the TAP_Z enable bit enables z-axis participation
      in tap detection. A setting of 0 excludes the z-axis from participation in tap
      detection.
- name: ACT_TAP_STATUS
  offset: '0x2B'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: Reserved
    bit_range:
    - 7
    - 7
    description: Always 0.
  - name: ACT_X_source
    bit_range:
    - 6
    - 6
    description: ACT_X Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
  - name: ACT_Y_source
    bit_range:
    - 5
    - 5
    description: ACT_Y Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
  - name: ACT_Z_source
    bit_range:
    - 4
    - 4
    description: ACT_Z Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
  - name: ASLEEP
    bit_range:
    - 3
    - 3
    description: Asleep Bit. 1 = part is asleep, 0 = part is not asleep. See POWER_CTL
      register for autosleep mode details.
  - name: TAP_X_source
    bit_range:
    - 2
    - 2
    description: TAP_X Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
  - name: TAP_Y_source
    bit_range:
    - 1
    - 1
    description: TAP_Y Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
  - name: TAP_Z_source
    bit_range:
    - 0
    - 0
    description: TAP_Z Source Bit. Indicates the first axis involved in a tap or activity
      event. 1 = involvement, 0 = no involvement. Overwritten by new data. Read before
      clearing interrupt. Cleared if axis disabled on next event.
- name: BW_RATE
  offset: '0x2C'
  reset_value: '0x0A'
  access: ReadWrite
  fields:
  - name: LOW_POWER
    bit_range:
    - 4
    - 4
    description: A setting of 0 in the LOW_POWER bit selects normal operation, and
      a setting of 1 selects reduced power operation, which has somewhat higher noise
      (see the Power Modes section for details).
  - name: RATE
    bit_range:
    - 0
    - 3
    description: These bits select the device bandwidth and output data rate (see
      Table 6 and Table 7 for details). The default value is 0x0A, which translates
      to a 100 Hz output data rate. An output data rate should be selected that is
      appropriate for the communication protocol and frequency selected. Selecting
      too high of an output data rate with a low communication speed results in samples
      being discarded.
- name: POWER_CTL
  offset: '0x2D'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: Reserved
    bit_range:
    - 7
    - 7
    description: Reserved (must be 0)
  - name: Reserved
    bit_range:
    - 6
    - 6
    description: Reserved (must be 0)
  - name: Link
    bit_range:
    - 5
    - 5
    description: 'Link bit: 1=links activity and inactivity functions (delays activity
      until inactivity detected), 0=concurrent'
  - name: AUTO_SLEEP
    bit_range:
    - 4
    - 4
    description: 'AUTO_SLEEP bit: If link=1, 1=switch to sleep on inactivity, 0=disable
      autosleep'
  - name: Measure
    bit_range:
    - 3
    - 3
    description: 'Measure bit: 0=standby mode, 1=measurement mode'
  - name: Sleep
    bit_range:
    - 2
    - 2
    description: 'Sleep bit: 0=normal mode, 1=sleep mode (suppresses DATA_READY, FIFO,
      low sampling rate)'
  - name: WAKEUP
    bit_range:
    - 1
    - 0
    description: 'Wakeup bits: Control frequency of readings in sleep mode (00=8Hz,
      01=4Hz, 10=2Hz, 11=1Hz)'
- name: INT_ENABLE
  offset: '0x2E'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: DATA_READY
    bit_range:
    - 7
    - 7
    description: Enables DATA_READY interrupt output (function always enabled)
  - name: SINGLE_TAP
    bit_range:
    - 6
    - 6
    description: Enables SINGLE_TAP interrupt
  - name: DOUBLE_TAP
    bit_range:
    - 5
    - 5
    description: Enables DOUBLE_TAP interrupt
  - name: Activity
    bit_range:
    - 4
    - 4
    description: Enables Activity interrupt
  - name: Inactivity
    bit_range:
    - 3
    - 3
    description: Enables Inactivity interrupt
  - name: FREE_FALL
    bit_range:
    - 2
    - 2
    description: Enables FREE_FALL interrupt
  - name: Watermark
    bit_range:
    - 1
    - 1
    description: Enables Watermark interrupt output (function always enabled)
  - name: Overrun
    bit_range:
    - 0
    - 0
    description: Enables Overrun interrupt output (function always enabled)
- name: INT_MAP
  offset: '0x2F'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: DATA_READY
    bit_range:
    - 7
    - 7
    description: 'DATA_READY interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: SINGLE_TAP
    bit_range:
    - 6
    - 6
    description: 'SINGLE_TAP interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: DOUBLE_TAP
    bit_range:
    - 5
    - 5
    description: 'DOUBLE_TAP interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: Activity
    bit_range:
    - 4
    - 4
    description: 'Activity interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: Inactivity
    bit_range:
    - 3
    - 3
    description: 'Inactivity interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: FREE_FALL
    bit_range:
    - 2
    - 2
    description: 'FREE_FALL interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: Watermark
    bit_range:
    - 1
    - 1
    description: 'Watermark interrupt mapping (0: INT1 pin, 1: INT2 pin)'
  - name: Overrun
    bit_range:
    - 0
    - 0
    description: 'Overrun interrupt mapping (0: INT1 pin, 1: INT2 pin)'
- name: INT_SOURCE
  offset: '0x30'
  reset_value: '0x02'
  access: ReadOnly
  fields:
  - name: DATA_READY
    bit_range:
    - 7
    - 7
    description: Set to 1 if data ready event occurs; cleared by reading DATAX, DATAY,
      DATAZ registers.
  - name: SINGLE_TAP
    bit_range:
    - 6
    - 6
    description: Set to 1 if single tap event occurs; cleared by reading INT_SOURCE
      register.
  - name: DOUBLE_TAP
    bit_range:
    - 5
    - 5
    description: Set to 1 if double tap event occurs; cleared by reading INT_SOURCE
      register.
  - name: ACTIVITY
    bit_range:
    - 4
    - 4
    description: Set to 1 if activity event occurs; cleared by reading INT_SOURCE
      register.
  - name: INACTIVITY
    bit_range:
    - 3
    - 3
    description: Set to 1 if inactivity event occurs; cleared by reading INT_SOURCE
      register.
  - name: FREE_FALL
    bit_range:
    - 2
    - 2
    description: Set to 1 if free-fall event occurs; cleared by reading INT_SOURCE
      register.
  - name: WATERMARK
    bit_range:
    - 1
    - 1
    description: Set to 1 if FIFO watermark event occurs; cleared by reading DATAX,
      DATAY, DATAZ registers.
  - name: OVERRUN
    bit_range:
    - 0
    - 0
    description: Set to 1 if FIFO overrun event occurs; cleared by reading DATAX,
      DATAY, DATAZ registers.
- name: DATA_FORMAT
  offset: '0x31'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: SELF_TEST
    bit_range:
    - 7
    - 7
    description: A setting of 1 in the SELF_TEST bit applies a self-test force to
      the sensor, causing a shift in the output data. A value of 0 disables the self-test
      force.
  - name: SPI
    bit_range:
    - 6
    - 6
    description: A value of 1 in the SPI bit sets the device to 3-wire SPI mode, and
      a value of 0 sets the device to 4-wire SPI mode.
  - name: INT_INVERT
    bit_range:
    - 5
    - 5
    description: A value of 0 in the INT_INVERT bit sets the interrupts to active
      high, and a value of 1 sets the interrupts to active low.
  - name: RESERVED
    bit_range:
    - 4
    - 4
    description: Reserved bit (always 0).
  - name: FULL_RES
    bit_range:
    - 3
    - 3
    description: When this bit is set to a value of 1, the device is in full resolution
      mode (4 mg/LSB scale factor). When set to 0, the device is in 10-bit mode.
  - name: Justify
    bit_range:
    - 2
    - 2
    description: A setting of 1 in the justify bit selects left (MSB) justified mode,
      and a setting of 0 selects right justified mode with sign extension.
  - name: Range
    bit_range:
    - 0
    - 1
    description: "These bits set the g range: 00 = \xB12 g, 01 = \xB14 g, 10 = \xB1\
      8 g, 11 = \xB116 g."
- name: DATAX0
  offset: '0x32'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: X_Data_LSB
    bit_range:
    - 0
    - 7
    description: Least significant byte of X-axis acceleration data (DATAx0). Output
      data is in two's complement format. The DATA_FORMAT register controls the data
      format.
- name: DATAX1
  offset: '0x33'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: X-axis Data 1
    bit_range:
    - 0
    - 7
    description: Most significant byte of X-axis output data (DATAx1) in two's complement
      format. Together with DATAX0 (LSB), forms 16-bit X-axis value. Format controlled
      by DATA_FORMAT register.
- name: DATAY0
  offset: '0x34'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: Y-axis Data LSB
    bit_range:
    - 0
    - 7
    description: Least significant byte of the Y-axis output data in twos complement
      format. Part of the 16-bit Y-axis acceleration value (DATAY0 [7:0], DATAY1 [7:0]).
- name: DATAY1
  offset: '0x35'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: Y_AXIS_MSB
    bit_range:
    - 0
    - 7
    description: Y-axis data most significant byte (twos complement format, combined
      with DATAY0 for 16-bit value)
- name: DATAZ0
  offset: '0x36'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: Z-Axis Data 0
    bit_range:
    - 0
    - 7
    description: Least significant byte of Z-axis acceleration data in two's complement
      format. Part of the 16-bit Z-axis output (DATAZ0 is LSB, DATAZ1 is MSB).
- name: DATAZ1
  offset: '0x37'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: Z_DATA_MSB
    bit_range:
    - 7
    - 0
    description: Z-axis most significant byte data (twos complement)
- name: FIFO_CTL
  offset: '0x38'
  reset_value: '0x00'
  access: ReadWrite
  fields:
  - name: FIFO_MODE
    bit_range:
    - 6
    - 7
    description: 'These bits set the FIFO mode, as described in Table 19. Setting:
      00 Bypass (FIFO is bypassed), 01 FIFO (FIFO collects up to 32 values and then
      stops collecting data, collecting new data only when FIFO is not full), 10 Stream
      (FIFO holds the last 32 data values. When FIFO is full, the oldest data is overwritten
      with newer data), 11 Trigger (When triggered by the trigger bit, FIFO holds
      the last data samples before the trigger event and then continues to collect
      data until full. New data is collected only when FIFO is not full).'
  - name: TRIGGER
    bit_range:
    - 5
    - 5
    description: A value of 0 in the trigger bit links the trigger event of trigger
      mode to INT1, and a value of 1 links the trigger event to INT2.
  - name: SAMPLES
    bit_range:
    - 0
    - 4
    description: 'The function of these bits depends on the FIFO mode selected (see
      Table 20). Entering a value of 0 in the samples bits immediately sets the watermark
      status bit in the INT_SOURCE register, regardless of which FIFO mode is selected.
      Undesirable operation may occur if a value of 0 is used for the samples bits
      when trigger mode is used. FIFO Mode functions: Bypass None; FIFO Specifies
      how many FIFO entries are needed to trigger a watermark interrupt; Stream Specifies
      how many FIFO entries are needed to trigger a watermark interrupt; Trigger Specifies
      how many FIFO samples are retained in the FIFO buffer before a trigger event.'
- name: FIFO_STATUS
  offset: '0x39'
  reset_value: '0x00'
  access: ReadOnly
  fields:
  - name: FIFO_TRIG
    bit_range:
    - 7
    - 7
    description: A 1 in the FIFO_TRIG bit corresponds to a trigger event occurring,
      and a 0 means that a FIFO trigger event has not occurred.
  - name: RESERVED
    bit_range:
    - 6
    - 6
    description: Reserved (always reads as 0).
  - name: ENTRIES
    bit_range:
    - 0
    - 5
    description: These bits report how many data values are stored in FIFO. Access
      to collect the data from FIFO is provided through the DATAX, DATAY, and DATAZ
      registers. FIFO reads must be done in burst or multiple-byte mode because each
      FIFO level is cleared after any read (single- or multiple-byte) of FIFO. FIFO
      stores a maximum of 32 entries, which equates to a maximum of 33 entries available
      at any given time because an additional entry is available at the output filter
      of the device.
side_effects:
- trigger:
    event: write
    register: FIFO_CTL
    field: SAMPLES
    value: '0x00'
    description: Entering a value of 0 in the samples bits
  action:
    type: set
    target: INT_SOURCE.WATERMARK
    description: Immediately sets the watermark status bit in the INT_SOURCE register
- trigger:
    event: write
    register: FIFO_CTL
    field: FIFO_MODE
    value: '0b00'
    description: Setting the FIFO_MODE to Bypass
  action:
    type: clear
    target: FIFO_STATUS.ENTRIES
    description: Clears the FIFO buffer
- trigger:
    event: write
    register: DATA_FORMAT
    field: SELF_TEST
    value: '1'
    description: Setting the SELF_TEST bit
  action:
    type: apply_force
    target: DATAX0 DATAX1 DATAY0 DATAY1 DATAZ0 DATAZ1
    description: Applies a self-test force to the sensor, causing a shift in the output
      data
- trigger:
    event: write
    register: POWER_CTL
    field: Measure
    value: '0'
    description: Setting the Measure bit to 0
  action:
    type: enter_mode
    target: Global
    description: Places the part into standby mode
- trigger:
    event: write
    register: POWER_CTL
    field: Sleep
    value: '1'
    description: Setting the Sleep bit to 1
  action:
    type: enter_mode
    target: Global
    description: Places the part into sleep mode, suppresses DATA_READY, stops transmission
      of data to FIFO, switches to low sampling rate
- trigger:
    event: write
    register: POWER_CTL
    field: Sleep
    value: '1'
    description: Setting the Sleep bit to 1
  action:
    type: set
    target: ACT_TAP_STATUS.ASLEEP
    description: Sets the Asleep bit indicating the part is asleep
- trigger:
    event: write
    register: POWER_CTL
    field: Link
    value: '1'
    description: Setting the Link bit to 1 with activity and inactivity enabled
  action:
    type: link_functions
    target: Global
    description: Links activity and inactivity functions, delays activity until inactivity
      detected
- trigger:
    event: write
    register: POWER_CTL
    field: AUTO_SLEEP
    value: '1'
    description: Setting the AUTO_SLEEP bit to 1 when Link=1
  action:
    type: enable_autosleep
    target: Global
    description: Switches to sleep mode on inactivity detection
- trigger:
    event: write
    register: DUR
    field: Duration
    value: '0x00'
    description: Setting Duration to 0
  action:
    type: disable
    target: tap_double_tap
    description: Disables the tap/double tap functions
- trigger:
    event: write
    register: Latent
    field: LATENT
    value: '0x00'
    description: Setting LATENT to 0
  action:
    type: disable
    target: double_tap
    description: Disables the double tap function
- trigger:
    event: write
    register: Window
    field: Window
    value: '0x00'
    description: Setting Window to 0
  action:
    type: disable
    target: double_tap
    description: Disables the double tap function
- trigger:
    event: write
    register: ACT_INACT_CTL
    field: INACT_X_EN
