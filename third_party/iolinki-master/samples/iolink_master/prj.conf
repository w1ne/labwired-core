CONFIG_IOLINKI_MASTER=y

# The master drives a trivial in-process fake PHY (see src/main.c), so the
# device-side stack is not needed here. Disabling it also keeps the shared
# frame/CRC helpers compiled by the master module only (no duplicate symbols).
CONFIG_IOLINKI=n

CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096
