name: stm32f401cdu6-blackpill
description: STMicroelectronics STM32F401CDU6 Black Pill ARM Cortex-M4 board with
  384KB Flash, 96KB RAM, active-low PC13 LED, and a broad STM32F401xB/xC peripheral
  map. LabWired executable models cover RCC, GPIO, SysTick, USART, I2C, SPI, timers,
  ADC, and EXTI; DMA stream controllers and remaining mapped blocks without F401-compatible
  behavior are safe stubs. Physical validation is ST-Link USB/SWD sanity only; UART
  and I2C output are simulation evidence.
