# MAX31855 — cold-junction-compensated K-type thermocouple-to-digital converter.
#
# Read-only SPI device: on every CS-framed transaction it clocks out a 32-bit
# big-endian status word, MSB first, across 4 SPI byte transfers. Declarative
# equivalent of the hand-written `peripherals::components::max31855::Max31855`;
# the two are gated byte-for-byte by `ir_spi_component` tests.
#
# Word layout (big-endian bit numbering, MSB first):
#   [31:18] thermocouple temperature x4   (14-bit signed, C x4)
#   [17]    reserved (0)
#   [16]    fault (1 if any fault flag set)
#   [15:4]  internal cold-junction temp x16 (12-bit signed, C x16)
#   [3]     reserved (0)
#   [2:0]   SCV / SCG / OC fault flags (not modelled in v1)
name: MAX31855
vendor: Maxim Integrated
datasheet: "MAX31855 Rev. 4"
kind: declarative
interface:
  spi:
    default_cs_pin: PA4
response:
  bytes: 4
  fields:
    - { name: tc_temp, shift: 18, bits: 14, signed: true, reset: 100 }
    - { name: fault, shift: 16, bits: 1, signed: false, reset: 0 }
    - { name: internal_temp, shift: 4, bits: 12, signed: true, reset: 352 }
