      write_action: oneToClear

  - id: "RTCCALICFG"
    address_offset: 0x068
    size: 32
    access: "R/W"
    reset_value: 0x00000000

  - id: "RTCCALICFG1"
    address_offset: 0x06C
    size: 32
    access: "RO"
    reset_value: 0x00000000

  - id: "REGCLK"
    address_offset: 0x0FC
    size: 32
    access: "R/W"
    reset_value: 0x00000000

interrupts:
  TG0_T0_LEVEL: 32
  TG0_T1_LEVEL: 33
  TG0_WDT_LEVEL: 34
