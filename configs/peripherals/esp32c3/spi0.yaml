  - name: CLKCNT_H
    bit_range:
    - 15
    - 8
    description: In the master mode it must be floor((spi_mem_clkcnt_N+1)/2-1).
  - name: CLKCNT_N
    bit_range:
    - 23
    - 16
    description: In the master mode it is the divider of spi_mem_clk. So spi_mem_clk frequency is system/(spi_mem_clkcnt_N+1)
  - name: CLK_EQU_SYSCLK
    bit_range:
    - 31
