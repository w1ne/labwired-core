  - name: CLK_MODE_13
    bit_range:
    - 2
    - 2
    description: '{CPOL, CPHA},1: support spi clk mode 1 and 3, first edge output data B[0]/B[7].  0: support spi clk mode 0 and 2, first edge output data B[1]/B[6].'
  - name: RSCK_DATA_OUT
    bit_range:
