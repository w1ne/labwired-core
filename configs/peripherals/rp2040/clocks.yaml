  size: 32
  access: READ_WRITE
  reset_value: 1
  fields:
  - name: CLK_REF_SELECTED
    bit_range:
    - 31
    - 0
    description: The glitchless multiplexer does not switch instantaneously (to avoid glitches), so software should poll this register to wait for the switch to complete. This register contains one decoded bit for each of the clock sources enumerated in the CTRL SRC field. At most one of these bits will be set at any time, indicating that clock is currently present at the output of the glitchless mux. Whilst switching is in progress, this register may briefly show all-0s.
  side_effects: null
