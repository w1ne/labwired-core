  - name: DP_PULLUP_EN
    bit_range:
    - 1
    - 1
    description: Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller
  - name: DP_PULLDN_EN
    bit_range:
    - 2
    - 2
