  - name: DM_PULLUP_HISEL
    bit_range:
    - 4
    - 4
    description: when dm_pullup_en is set high, this enables second resistor. 0 - Pull = Rpu2; 1 - Pull = Rpu1 + Rpu2
  - name: DM_PULLUP_EN
    bit_range:
    - 5
    - 5
    description: "Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller \n                            1 - Enable Rpu on DPM"
  - name: DM_PULLDN_EN
    bit_range:
    - 6
    - 6
    description: "Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller \n                            1 - Enable Rpd on DPM"
  - name: TX_DP_OE
    bit_range:
    - 8
    - 8
    description: "Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller \n                            TX_SEMODE=0, OE for DPP/DPM diff pair. 0 - DPP/DPM in Hi-Z state; 1 - DPP/DPM driving \n                            TX_SEMODE=1, OE for DPP only. 0 - DPP in Hi-Z state; 1 - DPP driving"
  - name: TX_DM_OE
    bit_range:
    - 9
    - 9
    description: "Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller \n                            TX_SEMODE=0, Ignored. \n                            TX_SEMODE=1, OE for DPM only. 0 - DPM in Hi-Z state; 1 - DPM driving"
  - name: TX_DP
    bit_range:
    - 10
    - 10
    description: "Value to drive to USB PHY when override enable is set (which will override the default value or value driven from USB controller \n                            TX_SEMODE=0, Drives DPP/DPM diff pair. TX_DP_OE=1 to enable drive. DPP=TX_DP, DPM=~TX_DP \n                            TX_SEMODE=1, Drives DPP only. TX_DP_OE=1 to enable drive. DPP=TX_DP"
  - name: TX_DM
