  - name: EN
    bit_range:
    - 0
    - 0
    description: Enable the PWM channel.
  - name: PH_CORRECT
    bit_range:
    - 1
    - 1
    description: '1: Enable phase-correct modulation. 0: Trailing-edge'
  - name: A_INV
    bit_range:
    - 2
    - 2
    description: Invert output A
  - name: B_INV
    bit_range:
    - 3
    - 3
    description: Invert output B
  - name: DIVMODE
    bit_range:
    - 5
    - 4
    description: null
  - name: PH_RET
    bit_range:
    - 6
    - 6
    description: "Retard the phase of the counter by 1 count, while it is running. \n                            Self-clearing. Write a 1, and poll until low. Counter must be running."
  - name: PH_ADV
    bit_range:
    - 7
    - 7
