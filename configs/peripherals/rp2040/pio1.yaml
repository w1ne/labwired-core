- id: SM0_EXECCTRL
  address_offset: 204
  size: 32
  access: READ_WRITE
  reset_value: 126976
  fields:
  - name: STATUS_N
    bit_range:
    - 3
    - 0
    description: Comparison level for the MOV x, STATUS instruction
  - name: STATUS_SEL
    bit_range:
    - 4
    - 4
    description: Comparison used for the MOV x, STATUS instruction.
  - name: WRAP_BOTTOM
    bit_range:
    - 11
    - 7
    description: After reaching wrap_top, execution is wrapped to this address.
  - name: WRAP_TOP
    bit_range:
    - 16
    - 12
    description: "After reaching this address, execution is wrapped to wrap_bottom. \n                            If the instruction is a jump, and the jump condition is true, the jump takes priority."
  - name: OUT_STICKY
    bit_range:
    - 17
    - 17
    description: Continuously assert the most recent OUT/SET to the pins
  - name: INLINE_OUT_EN
    bit_range:
    - 18
    - 18
    description: "If 1, use a bit of OUT data as an auxiliary write enable \n                            When used in conjunction with OUT_STICKY, writes with an enable of 0 will \n                            deassert the latest pin write. This can create useful masking/override behaviour \n                            due to the priority ordering of state machine pin writes (SM0 < SM1 < ...)"
  - name: OUT_EN_SEL
    bit_range:
    - 23
    - 19
    description: Which data bit to use for inline OUT enable
  - name: JMP_PIN
    bit_range:
    - 28
    - 24
    description: The GPIO number to use as condition for JMP PIN. Unaffected by input mapping.
  - name: SIDE_PINDIR
    bit_range:
    - 29
    - 29
    description: If 1, side-set data is asserted to pin directions, instead of pin values
  - name: SIDE_EN
    bit_range:
    - 30
    - 30
    description: If 1, the MSB of the Delay/Side-set instruction field is used as side-set enable, rather than a side-set data bit. This allows instructions to perform side-set optionally, rather than on every instruction, but the maximum possible side-set width is reduced from 5 to 4. Note that the value of PINCTRL_SIDESET_COUNT is inclusive of this enable bit.
  - name: EXEC_STALLED
    bit_range:
    - 31
    - 31
    description: If 1, an instruction written to SMx_INSTR is stalled, and latched by the state machine. Will clear to 0 once this instruction completes.
  side_effects: null
- id: SM0_SHIFTCTRL
  address_offset: 208
  size: 32
  access: READ_WRITE
  reset_value: 786432
  fields:
  - name: AUTOPUSH
    bit_range:
    - 16
    - 16
    description: Push automatically when the input shift register is filled, i.e. on an IN instruction which causes the input shift counter to reach or exceed PUSH_THRESH.
  - name: AUTOPULL
    bit_range:
    - 17
    - 17
    description: Pull automatically when the output shift register is emptied, i.e. on or following an OUT instruction which causes the output shift counter to reach or exceed PULL_THRESH.
  - name: IN_SHIFTDIR
    bit_range:
    - 18
    - 18
    description: 1 = shift input shift register to right (data enters from left). 0 = to left.
  - name: OUT_SHIFTDIR
    bit_range:
    - 19
    - 19
    description: 1 = shift out of output shift register to right. 0 = to left.
  - name: PUSH_THRESH
    bit_range:
    - 24
    - 20
    description: "Number of bits shifted into ISR before autopush, or conditional push (PUSH IFFULL), will take place. \n                            Write 0 for value of 32."
  - name: PULL_THRESH
    bit_range:
    - 29
    - 25
    description: "Number of bits shifted out of OSR before autopull, or conditional pull (PULL IFEMPTY), will take place. \n                            Write 0 for value of 32."
  - name: FJOIN_TX
    bit_range:
    - 30
    - 30
    description: "When 1, TX FIFO steals the RX FIFO's storage, and becomes twice as deep. \n                            RX FIFO is disabled as a result (always reads as both full and empty). \n                            FIFOs are flushed when this bit is changed."
  - name: FJOIN_RX
    bit_range:
    - 31
    - 31
    description: "When 1, RX FIFO steals the TX FIFO's storage, and becomes twice as deep. \n                            TX FIFO is disabled as a result (always reads as both full and empty). \n                            FIFOs are flushed when this bit is changed."
  side_effects: null
