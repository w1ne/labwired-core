- id: INTERP0_CTRL_LANE0
  address_offset: 172
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: SHIFT
    bit_range:
    - 4
    - 0
    description: Logical right-shift applied to accumulator before masking
  - name: MASK_LSB
    bit_range:
    - 9
    - 5
    description: The least-significant bit allowed to pass by the mask (inclusive)
  - name: MASK_MSB
    bit_range:
    - 14
    - 10
    description: "The most-significant bit allowed to pass by the mask (inclusive) \n                            Setting MSB < LSB may cause chip to turn inside-out"
  - name: SIGNED
    bit_range:
    - 15
    - 15
    description: "If SIGNED is set, the shifted and masked accumulator value is sign-extended to 32 bits \n                            before adding to BASE0, and LANE0 PEEK/POP appear extended to 32 bits when read by processor."
  - name: CROSS_INPUT
    bit_range:
    - 16
    - 16
    description: "If 1, feed the opposite lane's accumulator into this lane's shift + mask hardware. \n                            Takes effect even if ADD_RAW is set (the CROSS_INPUT mux is before the shift+mask bypass)"
  - name: CROSS_RESULT
    bit_range:
    - 17
    - 17
    description: If 1, feed the opposite lane's result into this lane's accumulator on POP.
  - name: ADD_RAW
    bit_range:
    - 18
    - 18
    description: If 1, mask + shift is bypassed for LANE0 result. This does not affect FULL result.
  - name: FORCE_MSB
    bit_range:
    - 20
    - 19
    description: "ORed into bits 29:28 of the lane result presented to the processor on the bus. \n                            No effect on the internal 32-bit datapath. Handy for using a lane to generate sequence \n                            of pointers into flash or SRAM."
  - name: BLEND
    bit_range:
    - 21
    - 21
    description: "Only present on INTERP0 on each core. If BLEND mode is enabled: \n                            - LANE1 result is a linear interpolation between BASE0 and BASE1, controlled \n                            by the 8 LSBs of lane 1 shift and mask value (a fractional number between \n                            0 and 255/256ths) \n                            - LANE0 result does not have BASE0 added (yields only the 8 LSBs of lane 1 shift+mask value) \n                            - FULL result does not have lane 1 shift+mask value added (BASE2 + lane 0 shift+mask) \n                            LANE1 SIGNED flag controls whether the interpolation is signed or unsigned."
  - name: OVERF0
    bit_range:
    - 23
    - 23
    description: Indicates if any masked-off MSBs in ACCUM0 are set.
  - name: OVERF1
    bit_range:
    - 24
    - 24
    description: Indicates if any masked-off MSBs in ACCUM1 are set.
  - name: OVERF
    bit_range:
    - 25
    - 25
    description: Set if either OVERF0 or OVERF1 is set.
  side_effects: null
