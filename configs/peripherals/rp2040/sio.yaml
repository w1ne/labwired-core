  reset_value: 1
  fields:
  - name: READY
    bit_range:
    - 0
    - 0
    description: "Reads as 0 when a calculation is in progress, 1 otherwise. \n                            Writing an operand (xDIVIDEND, xDIVISOR) will immediately start a new calculation, no \n                            matter if one is already in progress. \n                            Writing to a result register will immediately terminate any in-progress calculation \n                            and set the READY and DIRTY flags."
  - name: DIRTY
    bit_range:
    - 1
    - 1
    description: "Changes to 1 when any register is written, and back to 0 when QUOTIENT is read. \n                            Software can use this flag to make save/restore more efficient (skip if not DIRTY). \n                            If the flag is used in this way, it's recommended to either read QUOTIENT only, \n                            or REMAINDER and then QUOTIENT, to prevent data loss on context switch."
  side_effects: null
