  - name: CLAMP
    bit_range:
    - 22
    - 22
    description: "Only present on INTERP1 on each core. If CLAMP mode is enabled: \n                            - LANE0 result is shifted and masked ACCUM0, clamped by a lower bound of \n                            BASE0 and an upper bound of BASE1. \n                            - Signedness of these comparisons is determined by LANE0_CTRL_SIGNED"
  - name: OVERF0
    bit_range:
    - 23
    - 23
    description: Indicates if any masked-off MSBs in ACCUM0 are set.
  - name: OVERF1
    bit_range:
    - 24
    - 24
    description: Indicates if any masked-off MSBs in ACCUM1 are set.
  - name: OVERF
    bit_range:
    - 25
    - 25
    description: Set if either OVERF0 or OVERF1 is set.
  side_effects: null
- id: INTERP1_CTRL_LANE1
  address_offset: 240
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: SHIFT
    bit_range:
    - 4
    - 0
    description: Logical right-shift applied to accumulator before masking
  - name: MASK_LSB
    bit_range:
    - 9
    - 5
    description: The least-significant bit allowed to pass by the mask (inclusive)
  - name: MASK_MSB
    bit_range:
    - 14
    - 10
    description: "The most-significant bit allowed to pass by the mask (inclusive) \n                            Setting MSB < LSB may cause chip to turn inside-out"
  - name: SIGNED
    bit_range:
    - 15
    - 15
    description: "If SIGNED is set, the shifted and masked accumulator value is sign-extended to 32 bits \n                            before adding to BASE1, and LANE1 PEEK/POP appear extended to 32 bits when read by processor."
  - name: CROSS_INPUT
    bit_range:
    - 16
    - 16
    description: "If 1, feed the opposite lane's accumulator into this lane's shift + mask hardware. \n                            Takes effect even if ADD_RAW is set (the CROSS_INPUT mux is before the shift+mask bypass)"
  - name: CROSS_RESULT
    bit_range:
    - 17
    - 17
    description: If 1, feed the opposite lane's result into this lane's accumulator on POP.
  - name: ADD_RAW
    bit_range:
    - 18
    - 18
    description: If 1, mask + shift is bypassed for LANE1 result. This does not affect FULL result.
  - name: FORCE_MSB
    bit_range:
    - 20
    - 19
    description: "ORed into bits 29:28 of the lane result presented to the processor on the bus. \n                            No effect on the internal 32-bit datapath. Handy for using a lane to generate sequence \n                            of pointers into flash or SRAM."
  side_effects: null
