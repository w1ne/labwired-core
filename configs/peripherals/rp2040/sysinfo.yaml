peripheral: SYSINFO
version: 0.1.0
registers:
- id: CHIP_ID
  address_offset: 0
  size: 32
  access: READ_WRITE
  # REVISION[31:28]|PART[27:12]|MANUFACTURER[11:0] = 0x20002927: RP2040 (part
  # 0x0002), Raspberry Pi (0x927), stepping B2 (revision 2). The pico-sdk USB
  # errata-E5 workaround (rp2040_usb_device_enumeration_fix, run from the USB ISR
  # on bus reset) asserts manufacturer == 0x927; a zero CHIP_ID trips that assert
  # inside the ISR and aborts USB enumeration.
  reset_value: 536881447
  fields:
  - name: MANUFACTURER
    bit_range:
    - 11
    - 0
    description: null
  - name: PART
    bit_range:
    - 27
    - 12
    description: null
  - name: REVISION
    bit_range:
    - 31
    - 28
    description: null
  side_effects: null
- id: PLATFORM
  address_offset: 4
  size: 32
  access: READ_WRITE
  # ASIC (bit1) set: reads as real silicon, not FPGA.
  reset_value: 2
  fields:
  - name: FPGA
    bit_range:
    - 0
    - 0
    description: null
  - name: ASIC
    bit_range:
    - 1
    - 1
    description: null
  side_effects: null
- id: GITREF_RP2040
  address_offset: 16
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: GITREF_RP2040
    bit_range:
    - 31
    - 0
    description: null
  side_effects: null
interrupts: null
timing: null
