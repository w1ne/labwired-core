- id: MPU_TYPE
  address_offset: 60816
  size: 32
  access: READ_WRITE
  reset_value: 2048
  fields:
  - name: SEPARATE
    bit_range:
    - 0
    - 0
    description: Indicates support for separate instruction and data address maps. Reads as 0 as ARMv6-M only supports a unified MPU.
  - name: DREGION
    bit_range:
    - 15
    - 8
    description: Number of regions supported by the MPU.
  - name: IREGION
    bit_range:
    - 23
    - 16
    description: Instruction region. Reads as zero as ARMv6-M only supports a unified MPU.
  side_effects: null
- id: MPU_CTRL
  address_offset: 60820
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: ENABLE
    bit_range:
    - 0
    - 0
    description: "Enables the MPU. If the MPU is disabled, privileged and unprivileged accesses use the default memory map. \n                            0 = MPU disabled. \n                            1 = MPU enabled."
  - name: HFNMIENA
    bit_range:
    - 1
    - 1
    description: "Controls the use of the MPU for HardFaults and NMIs. Setting this bit when ENABLE is clear results in UNPREDICTABLE behaviour. \n                            When the MPU is enabled: \n                            0 = MPU is disabled during HardFault and NMI handlers, regardless of the value of the ENABLE bit. \n                            1 = the MPU is enabled during HardFault and NMI handlers."
  - name: PRIVDEFENA
    bit_range:
    - 2
    - 2
    description: "Controls whether the default memory map is enabled as a background region for privileged accesses. This bit is ignored when ENABLE is clear. \n                            0 = If the MPU is enabled, disables use of the default memory map. Any memory access to a location not \n                            covered by any enabled region causes a fault. \n                            1 = If the MPU is enabled, enables use of the default memory map as a background region for privileged software accesses. \n                            When enabled, the background region acts as if it is region number -1. Any region that is defined and enabled has priority over this default map."
  side_effects: null
- id: MPU_RNR
  address_offset: 60824
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: REGION
    bit_range:
    - 3
    - 0
    description: "Indicates the MPU region referenced by the MPU_RBAR and MPU_RASR registers. \n                            The MPU supports 8 memory regions, so the permitted values of this field are 0-7."
  side_effects: null
- id: MPU_RBAR
  address_offset: 60828
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: REGION
    bit_range:
    - 3
    - 0
    description: On writes, specifies the number of the region whose base address to update provided VALID is set written as 1. On reads, returns bits [3:0] of MPU_RNR.
  - name: VALID
    bit_range:
    - 4
    - 4
    description: "On writes, indicates whether the write must update the base address of the region identified by the REGION field, updating the MPU_RNR to indicate this new region. \n                            Write: \n                            0 = MPU_RNR not changed, and the processor: \n                            Updates the base address for the region specified in the MPU_RNR. \n                            Ignores the value of the REGION field. \n                            1 = The processor: \n                            Updates the value of the MPU_RNR to the value of the REGION field. \n                            Updates the base address for the region specified in the REGION field. \n                            Always reads as zero."
  - name: ADDR
    bit_range:
    - 31
    - 8
    description: Base address of the region.
  side_effects: null
- id: MPU_RASR
  address_offset: 60832
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: ENABLE
    bit_range:
    - 0
    - 0
    description: Enables the region.
  - name: SIZE
    bit_range:
    - 5
    - 1
    description: Indicates the region size. Region size in bytes = 2^(SIZE+1). The minimum permitted value is 7 (b00111) = 256Bytes
  - name: SRD
    bit_range:
    - 15
    - 8
    description: Subregion Disable. For regions of 256 bytes or larger, each bit of this field controls whether one of the eight equal subregions is enabled.
  - name: ATTRS
    bit_range:
    - 31
    - 16
    description: "The MPU Region Attribute field. Use to define the region attribute control. \n                            28 = XN: Instruction access disable bit: \n                            0 = Instruction fetches enabled. \n                            1 = Instruction fetches disabled. \n                            26:24 = AP: Access permission field \n                            18 = S: Shareable bit \n                            17 = C: Cacheable bit \n                            16 = B: Bufferable bit"
  side_effects: null
