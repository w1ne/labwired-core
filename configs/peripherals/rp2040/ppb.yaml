- id: ICSR
  address_offset: 60676
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: VECTACTIVE
    bit_range:
    - 8
    - 0
    description: Active exception number field. Reset clears the VECTACTIVE field.
  - name: VECTPENDING
    bit_range:
    - 20
    - 12
    description: 'Indicates the exception number for the highest priority pending exception: 0 = no pending exceptions. Non zero = The pending state includes the effect of memory-mapped enable and mask registers. It does not include the PRIMASK special-purpose register qualifier.'
  - name: ISRPENDING
    bit_range:
    - 22
    - 22
    description: External interrupt pending flag
  - name: ISRPREEMPT
    bit_range:
    - 23
    - 23
    description: The system can only access this bit when the core is halted. It indicates that a pending interrupt is to be taken in the next running cycle. If C_MASKINTS is clear in the Debug Halting Control and Status Register, the interrupt is serviced.
  - name: PENDSTCLR
    bit_range:
    - 25
    - 25
    description: "SysTick exception clear-pending bit. \n                            Write: \n                            0 = No effect. \n                            1 = Removes the pending state from the SysTick exception. \n                            This bit is WO. On a register read its value is Unknown."
  - name: PENDSTSET
    bit_range:
    - 26
    - 26
    description: "SysTick exception set-pending bit. \n                            Write: \n                            0 = No effect. \n                            1 = Changes SysTick exception state to pending. \n                            Read: \n                            0 = SysTick exception is not pending. \n                            1 = SysTick exception is pending."
  - name: PENDSVCLR
    bit_range:
    - 27
    - 27
    description: "PendSV clear-pending bit. \n                            Write: \n                            0 = No effect. \n                            1 = Removes the pending state from the PendSV exception."
  - name: PENDSVSET
    bit_range:
    - 28
    - 28
    description: "PendSV set-pending bit. \n                            Write: \n                            0 = No effect. \n                            1 = Changes PendSV exception state to pending. \n                            Read: \n                            0 = PendSV exception is not pending. \n                            1 = PendSV exception is pending. \n                            Writing 1 to this bit is the only way to set the PendSV exception state to pending."
  - name: NMIPENDSET
    bit_range:
    - 31
    - 31
    description: "Setting this bit will activate an NMI. Since NMI is the highest priority exception, it will activate as soon as it is registered. \n                            NMI set-pending bit. \n                            Write: \n                            0 = No effect. \n                            1 = Changes NMI exception state to pending. \n                            Read: \n                            0 = NMI exception is not pending. \n                            1 = NMI exception is pending. \n                            Because NMI is the highest-priority exception, normally the processor enters the NMI \n                            exception handler as soon as it detects a write of 1 to this bit. Entering the handler then clears \n                            this bit to 0. This means a read of this bit by the NMI exception handler returns 1 only if the \n                            NMI signal is reasserted while the processor is executing that handler."
  side_effects: null
