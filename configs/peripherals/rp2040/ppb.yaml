- id: SYST_CSR
  address_offset: 57360
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: ENABLE
    bit_range:
    - 0
    - 0
    description: "Enable SysTick counter: \n                            0 = Counter disabled. \n                            1 = Counter enabled."
  - name: TICKINT
    bit_range:
    - 1
    - 1
    description: "Enables SysTick exception request: \n                            0 = Counting down to zero does not assert the SysTick exception request. \n                            1 = Counting down to zero to asserts the SysTick exception request."
  - name: CLKSOURCE
    bit_range:
    - 2
    - 2
    description: "SysTick clock source. Always reads as one if SYST_CALIB reports NOREF. \n                            Selects the SysTick timer clock source: \n                            0 = External reference clock. \n                            1 = Processor clock."
  - name: COUNTFLAG
    bit_range:
    - 16
    - 16
    description: Returns 1 if timer counted to 0 since last time this was read. Clears on read by application or debugger.
  side_effects: null
- id: SYST_RVR
  address_offset: 57364
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: RELOAD
    bit_range:
    - 23
    - 0
