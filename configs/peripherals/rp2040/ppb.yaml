- id: AIRCR
  address_offset: 60684
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: VECTCLRACTIVE
    bit_range:
    - 1
    - 1
    description: 'Clears all active state information for fixed and configurable exceptions. This bit: is self-clearing, can only be set by the DAP when the core is halted.  When set: clears all active exception status of the processor, forces a return to Thread mode, forces an IPSR of 0. A debugger must re-initialize the stack.'
  - name: SYSRESETREQ
    bit_range:
    - 2
    - 2
    description: Writing 1 to this bit causes the SYSRESETREQ signal to the outer system to be asserted to request a reset. The intention is to force a large system reset of all major components except for debug. The C_HALT bit in the DHCSR is cleared as a result of the system reset requested. The debugger does not lose contact with the device.
  - name: ENDIANESS
    bit_range:
    - 15
    - 15
    description: "Data endianness implemented: \n                            0 = Little-endian."
  - name: VECTKEY
    bit_range:
    - 31
    - 16
    description: "Register key: \n                            Reads as Unknown \n                            On writes, write 0x05FA to VECTKEY, otherwise the write is ignored."
  side_effects: null
- id: SCR
  address_offset: 60688
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: SLEEPONEXIT
    bit_range:
    - 1
    - 1
    description: "Indicates sleep-on-exit when returning from Handler mode to Thread mode: \n                            0 = Do not sleep when returning to Thread mode. \n                            1 = Enter sleep, or deep sleep, on return from an ISR to Thread mode. \n                            Setting this bit to 1 enables an interrupt driven application to avoid returning to an empty main application."
  - name: SLEEPDEEP
    bit_range:
    - 2
    - 2
    description: "Controls whether the processor uses sleep or deep sleep as its low power mode: \n                            0 = Sleep. \n                            1 = Deep sleep."
  - name: SEVONPEND
    bit_range:
    - 4
    - 4
    description: "Send Event on Pending bit: \n                            0 = Only enabled interrupts or events can wakeup the processor, disabled interrupts are excluded. \n                            1 = Enabled events and all interrupts, including disabled interrupts, can wakeup the processor. \n                            When an event or interrupt becomes pending, the event signal wakes up the processor from WFE. If the \n                            processor is not waiting for an event, the event is registered and affects the next WFE. \n                            The processor also wakes up on execution of an SEV instruction or an external event."
  side_effects: null
- id: CCR
  address_offset: 60692
  size: 32
  access: READ_WRITE
  reset_value: 0
  fields:
  - name: UNALIGN_TRP
    bit_range:
    - 3
    - 3
    description: Always reads as one, indicates that all unaligned accesses generate a HardFault.
  - name: STKALIGN
    bit_range:
    - 9
    - 9
    description: Always reads as one, indicates 8-byte stack alignment on exception entry. On exception entry, the processor uses bit[9] of the stacked PSR to indicate the stack alignment. On return from the exception it uses this stacked bit to restore the correct stack alignment.
  side_effects: null
