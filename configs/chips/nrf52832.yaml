# LabWired - nRF52832 Chip Descriptor
name: "nrf52832"
arch: "arm"
core: "cortex-m4"
registers_count: 50
flash:
  base: 0x00000000
  size: "512KB"
ram:
  base: 0x20000000
  size: "64KB"
peripherals:
  - id: "uart0"
    type: "uart"
    base_address: 0x40002000
    config:
      profile: "nrf52"
  # nRF52832 shares the nRF52 series peripheral memory map with the nRF52840;
  # the blocks below mirror the proven nrf52840.yaml declarations for the IP
  # the nrf52832 also carries. nrf52832 has a SINGLE GPIO port (P0) and no P1.
  - id: "gpio0"
    type: "gpio"
    base_address: 0x50000000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "clock"
    type: "nrf_clock"
    base_address: 0x40000000
    size: "4KB"
    irq: 0
  - id: "timer0"
    type: "nrf52840_timer"
    base_address: 0x40008000
    size: "4KB"
    irq: 8
  - id: "twi1"
    type: "nrf52840_i2c"
    base_address: 0x40004000
    size: "4KB"
    irq: 4
  - id: "spi2"
    type: "nrf52840_spi"
    base_address: 0x40023000
    size: "4KB"
    irq: 35
  - id: "rtc0"
    type: "nrf52840_rtc"
    base_address: 0x4000b000
    size: "4KB"
    irq: 11
  - id: "wdt"
    type: "nrf52840_watchdog"
    base_address: 0x40010000
    size: "4KB"
    irq: 16
  - id: "saadc"
    type: "nrf52840_saadc"
    base_address: 0x40007000
    size: "4KB"
    irq: 7
  - id: "pwm0"
    type: "nrf52840_pwm"
    base_address: 0x4001c000
    size: "4KB"
    irq: 28
