# LabWired - nRF52832 Chip Descriptor
name: "nrf52832"
arch: "arm"
registers_count: 50
flash:
  base: 0x00000000
  size: "512KB"
ram:
  base: 0x20000000
  size: "64KB"
peripherals:
  - id: "uart0"
    type: "declarative"
    base_address: 0x40002000
    config:
      path: "../peripherals/nrf52832/uart0.yaml"
