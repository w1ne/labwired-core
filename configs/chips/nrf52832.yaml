# LabWired - nRF52832 Chip Descriptor
name: "nrf52832"
arch: "arm"
core: "cortex-m4"
registers_count: 50
flash:
  base: 0x00000000
  size: "512KB"
ram:
  base: 0x20000000
  size: "64KB"
# Nordic nRF5 SDK / ArduinoCore-nRF5 errata probes read a reserved silicon
# fingerprint window at 0xF0000FE0 (nrf52_errata_16 etc.). On real die this
# returns a package/rev code; unmapped, the sim bus-faults. Map a tiny
# zero-filled window so "not this rev" (byte != 6) is the honest outcome for
# a generic 52832 model — same pattern as mapping any other reserved MMIO.
memory_regions:
  - name: "nrf_errata_probe"
    base: 0xF0000000
    size: "4KB"
peripherals:
  # Classic UART0 (PS §6.33) — Arduino Adafruit core uses TXD@0x51C +
  # EVENTS_TXDRDY@0x11C (not EasyDMA UARTE). Same behavioural model as nRF52840.
  - id: "uart0"
    type: "nrf52840_uart"
    base_address: 0x40002000
    size: "4KB"
    irq: 2
  # nRF52832 shares the nRF52 series peripheral memory map with the nRF52840;
  # the blocks below mirror the proven nrf52840.yaml declarations for the IP
  # the nrf52832 also carries. nrf52832 has a SINGLE GPIO port (P0) and no P1.
  - id: "gpio0"
    type: "gpio"
    base_address: 0x50000000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "clock"
    type: "nrf_clock"
    base_address: 0x40000000
    size: "4KB"
    irq: 0
  - id: "timer0"
    type: "nrf52840_timer"
    base_address: 0x40008000
    size: "4KB"
    irq: 8
  - id: "twi1"
    type: "nrf52840_i2c"
    base_address: 0x40004000
    size: "4KB"
    irq: 4
  - id: "spi2"
    type: "nrf52840_spi"
    base_address: 0x40023000
    size: "4KB"
    irq: 35
  - id: "rtc0"
    type: "nrf52840_rtc"
    base_address: 0x4000b000
    size: "4KB"
    irq: 11
  # RTC1 — Arduino nRF52 `millis()`/`delay()` use RTC1 COUNTER @ 0x504
  # (AppTimer). Must not be shadowed by a mis-addressed RADIO model.
  - id: "rtc1"
    type: "nrf52840_rtc"
    base_address: 0x40011000
    size: "4KB"
    irq: 17
    config:
      num_cc: 4
  - id: "wdt"
    type: "nrf52840_watchdog"
    base_address: 0x40010000
    size: "4KB"
    irq: 16
  - id: "saadc"
    type: "nrf52840_saadc"
    base_address: 0x40007000
    size: "4KB"
    irq: 7
  - id: "pwm0"
    type: "nrf52840_pwm"
    base_address: 0x4001c000
    size: "4KB"
    irq: 28
  # NVMC — flash controller (PS §6.13). Core may probe CONFIG/READY.
  - id: "nvmc"
    type: "nrf52840_nvmc"
    base_address: 0x4001e000
    size: "4KB"
  # FICR / UICR — Arduino nRF52 core reads factory config at boot
  # (CODEPAGESIZE etc. @ 0x10000100+). Without FICR, sketches bus-fault at
  # 0x10000130 (see validation/arduino-matrix). Same models as nrf52840.
  - id: "ficr"
    type: "nrf52840_ficr"
    base_address: 0x10000000
    size: "4KB"
  - id: "uicr"
    type: "nrf52840_uicr"
    base_address: 0x10001000
    size: "4KB"
  # RADIO — real base is 0x40001000 (PS §6.20), NOT 0x40011000 (that is RTC1).
  - id: "radio"
    type: "nrf52840_radio"
    base_address: 0x40001000
    size: "4KB"
    irq: 1
