#
# Nordic nRF54L15 — APPLICATION core (Cortex-M33, 128 MHz).
#
# Source references:
# - Address map, IRQ numbers, GPIO widths and TIMER cc-num are taken from the
#   Zephyr devicetree `dts/vendor/nordic/nrf54l_05_10_15.dtsi` (+ nrf54l15.dtsi
#   for the memory sizes). That is the exact view the firmware is linked
#   against, which is the same sourcing rule used for nrf5340.yaml.
# - Cross-checked against the nRF54L15 Product Specification memory map.
#
# Address map note — this is the thing to get right:
#   All peripherals sit behind a single `global_peripherals` node with
#   `ranges = <0x0 0x50000000 0x10000000>`, so a devicetree `reg = <0xc6000 ...>`
#   is absolute address 0x500C6000. 0x5000_0000 is the SECURE alias and is the
#   devicetree default; 0x4000_0000 is the non-secure alias, selected in the DT
#   by USE_NON_SECURE_ADDRESS_MAP. This profile maps the SECURE view, which is
#   what a TF-M-less bare-metal or `nrf54l15dk/nrf54l15/cpuapp` build uses.
#   FICR/UICR and the RRAM controller are NOT in that window and carry their own
#   absolute addresses.
#
# Two nRF54L-family differences from nRF52/nRF5340 that matter:
#   1. NVM is RRAM (resistive), not FLASH, based at 0x0 with a dedicated
#      RRAM controller at 0x5004B000 — there is no NVMC.
#   2. Timekeeping is the GRTC (Global RTC), not RTC0/RTC1. There is no nRF52
#      RTC on this part, so the nRF52 RTC model is deliberately NOT mapped.
#
# Peripheral models: TIMER, GPIO, TEMP, EGU and GPIOTE keep the nRF52
# register layouts, so the existing behavioural models are reused verbatim at
# the nRF54L bases (same approach nrf5340.yaml takes). Blocks that are new to
# this family, or that the current boot paths only poke without polling, are
# mapped as benign stub windows so a write/readback never faults the bus.
name: "nrf54l15"
arch: "arm"
core: "cortex-m33"

# RRAM, not flash. 1524 KB — an odd size, and it is correct: see
# nrf54l15.dtsi, `cpuapp_rram: reg = <0x0 DT_SIZE_K(1524)>`.
flash:
  base: 0x00000000
  size: "1524KB"
ram:
  base: 0x20000000
  size: "256KB"

peripherals:
  # ── UARTE ──────────────────────────────────────────────────────────────
  # UARTE20 is the nRF54L15-DK console (routed to the on-board VCP).
  #
  # This family needs its OWN UARTE model — it is not the nRF52 block at a new
  # base. EasyDMA moved into a DMA.{RX,TX} register cluster and the whole
  # task/event surface was renumbered: the TX kick is TASKS_DMA.TX.START at
  # 0x050 (nRF52: STARTTX 0x008), completion is EVENTS_DMA.TX.END at 0x168
  # (nRF52: ENDTX 0x120), EVENTS_TXSTOPPED is 0x130 (nRF52: 0x158), and the
  # buffer descriptors are DMA.TX.PTR/MAXCNT at 0x73C/0x740 (nRF52:
  # 0x544/0x548).
  #
  # ENABLE (0x500) and BAUDRATE (0x524) coincidentally land on the same
  # offsets in both generations, which is what disguised the incompatibility:
  # the nRF52 model accepted the enable/baud writes and looked alive, then
  # never saw the DMA start task — unmodified Zephyr hung in
  # uarte_tx_path_init() spinning on EVENTS_TXSTOPPED at 0x130.
  #
  # NOTE: uart20/spi20/twi20 are the same 0x500C6000 instance in three
  # personalities — the DT declares all three at one address and expects
  # exactly one to be enabled. Only the UARTE personality is mapped here;
  # mapping a SPIM model at the same base would collide.
  - id: "uart20"
    type: "nrf54l_uarte"
    base_address: 0x500C6000
    size: "4KB"
    irq: 198
  - id: "uart30"
    type: "nrf54l_uarte"
    base_address: 0x50104000
    size: "4KB"
    irq: 260

  # ── TWIM (I²C master) ──────────────────────────────────────────────────
  # Same personality caveat as UARTE20: uart21/spi21/twi21 are one instance at
  # 0x500C7000, and uart22/spi22/twi22 are one instance at 0x500C8000. The TWIM
  # personality is mapped for both, because a sensor-carrying board needs I²C
  # far more than it needs a third and fourth UART. Enabling a UARTE model at
  # either base instead would collide.
  #
  # A DEDICATED nRF54L model, for the same reason as the UARTE: EasyDMA moved
  # into a DMA.{RX,TX} cluster. TX start is 0x050 (nRF52 STARTTX 0x008), RX
  # start 0x028 (0x000), DMA.TX.PTR/MAXCNT 0x73C/0x740 (0x544/0x548) and
  # DMA.RX.PTR/MAXCNT 0x704/0x708 (0x534/0x538).
  #
  # EVENTS_STOPPED (0x104), ENABLE (0x500, value 6), FREQUENCY (0x524) and
  # ADDRESS (0x588) match nRF52 — the same class of coincidence that disguised
  # the UARTE incompatibility. The SHORTS bit positions are genuinely unchanged,
  # so the write-then-repeated-START-read sequence is driven as before.
  - id: "twi21"
    type: "nrf54l_twim"
    base_address: 0x500C7000
    size: "4KB"
    irq: 199
  - id: "twi22"
    type: "nrf54l_twim"
    base_address: 0x500C8000
    size: "4KB"
    irq: 200

  # ── SysTick ────────────────────────────────────────────────────────────
  # The 24-bit ARMv8-M architectural SysTick timer, part of the Cortex-M33
  # core (SCS block at 0xE000_E010), NOT an nRF peripheral. It raises system
  # exception 15 — no NVIC line — and needs no vector table beyond the
  # architectural entries. `configure_cortex_m` installs SCB/NVIC/DWT but not
  # SysTick, so it is declared here (the M33 genuinely has it) to give firmware
  # a periodic core interrupt. The smart-ring firmware uses it to model a BLE
  # connection-event ISR: a periodic exception that busy-holds the CPU for a
  # connection-event window, demonstrating how radio contention starves the
  # sensor drain loop and overflows the PPG FIFO (see smart-ring.yaml).
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
    size: "16B"

  # ── TIMER ──────────────────────────────────────────────────────────────
  # cc-num differs per instance on this family (DT `cc-num`): TIMER10 has 8,
  # TIMER20..22 have 6. The nRF52 model defaults to 4, so both are explicit.
  - id: "timer10"
    type: "nrf52840_timer"
    base_address: 0x50085000
    size: "4KB"
    irq: 133
    config:
      num_cc: 8
  - id: "timer20"
    type: "nrf52840_timer"
    base_address: 0x500CA000
    size: "4KB"
    irq: 202
    config:
      num_cc: 6
  - id: "timer21"
    type: "nrf52840_timer"
    base_address: 0x500CB000
    size: "4KB"
    irq: 203
    config:
      num_cc: 6
  - id: "timer22"
    type: "nrf52840_timer"
    base_address: 0x500CC000
    size: "4KB"
    irq: 204
    config:
      num_cc: 6

  # ── GPIO ───────────────────────────────────────────────────────────────
  # Port widths are NOT uniform on this part (DT `ngpios`): P0=7, P1=17, P2=11.
  # The DK's LEDs are on P2 and P1, so a wrong width here silently breaks the
  # board_io bindings rather than faulting.
  #
  # BASE ADDRESS — read before "fixing" these values.
  #
  # Nordic changed the GPIO port struct EVERY generation, so there is no single
  # rule to carry across the family. What the MDK actually says:
  #
  #   part      NRF_Pn base    OUT offset within the struct
  #   nRF52840  0x50000000     +0x504   (RESERVED[321] prefix)
  #   nRF5340   0x50842500     +0x004   (RESERVED[1] prefix)
  #   nRF54L15  0x500D8200     +0x000   (no prefix at all)
  #
  # LabWired's gpio model uses the nRF52 peripheral-relative offsets (OUT 0x504,
  # OUTSET 0x508, IN 0x510, DIR 0x514, DIRSET 0x518), so the base mapped here
  # must be chosen so those offsets land on the real registers:
  #
  #   mapped_base = MDK_base - 0x504
  #
  # P0 0x5010A000-0x504=0x50109AFC, P1 0x500D8200-0x504=0x500D7CFC,
  # P2 0x50050400-0x504=0x5004FEFC. Verified against the MDK
  # nrf54l15_global.h (NRF_P0/P1/P2_S_BASE) and nrf54l15_types.h
  # (NRF_GPIO_Type, OUT at 0x000).
  #
  # This is silent when wrong: UART still works and the board still boots, only
  # the pins never move — which is why firmware_survival asserts DIR and OUT at
  # the pin after booting a real ELF rather than trusting the banner.
  - id: "gpio0"
    type: "gpio"
    base_address: 0x50109AFC
    size: "4KB"
    config:
      profile: "nrf52"
      num_pins: 7
  - id: "gpio1"
    type: "gpio"
    base_address: 0x500D7CFC
    size: "4KB"
    config:
      profile: "nrf52"
      num_pins: 17
  - id: "gpio2"
    type: "gpio"
    base_address: 0x5004FEFC
    size: "4KB"
    config:
      profile: "nrf52"
      num_pins: 11

  # ── TEMP ───────────────────────────────────────────────────────────────
  # Die temperature sensor; same task/event + RESULT layout as nRF52.
  - id: "temp"
    type: "nrf52840_temp"
    base_address: 0x500D7000
    size: "4KB"
    irq: 215

  # ── EGU ────────────────────────────────────────────────────────────────
  - id: "egu10"
    type: "nrf52840_egu"
    base_address: 0x50087000
    size: "4KB"
    irq: 135
  - id: "egu20"
    type: "nrf52840_egu"
    base_address: 0x500C9000
    size: "4KB"
    irq: 201

  # ── GPIOTE ─────────────────────────────────────────────────────────────
  - id: "gpiote20"
    type: "nrf52_gpiote"
    base_address: 0x500DA000
    size: "4KB"
  - id: "gpiote30"
    type: "nrf52_gpiote"
    base_address: 0x5010C000
    size: "4KB"

  # ── GRTC ───────────────────────────────────────────────────────────────
  # The Global RTC replaces RTC0/RTC1 on this family and is what Zephyr drives
  # the kernel tick from, so it is a real behavioural model rather than a stub.
  #
  # Modelled: the free-running 52-bit SYSCOUNTER at 1 MHz (nrfx
  # NRF_GRTC_SYSCOUNTER_MAIN_FREQUENCY_HZ), its four per-domain register views,
  # the SYSCOUNTERL-read-latches-SYSCOUNTERH anti-tearing pair, TASKS_START /
  # STOP / CLEAR / CAPTURE[n], MODE.SYSCOUNTEREN (the enable nrfx actually
  # uses), the 12 CC channels with CCL/CCH/CCADD/CCEN, EVENTS_COMPARE[n], and
  # all four INTEN/INTENSET/INTENCLR/INTPEND groups.
  #
  # Not modelled: the low-frequency timer (RTCOUNTER/RTCOMPARE), the PWM block,
  # CLKOUT generation, DPPI SUBSCRIBE/PUBLISH routing, and the sleep/wake
  # arbitration behind TIMEOUT / WAKETIME / SYSCOUNTER.ACTIVE. Those registers
  # accept writes and read back, and STATUS reads READY, so a driver's
  # configure-then-verify pass makes progress rather than hanging.
  #
  # cc-num = 12 comes from the Zephyr DT node `grtc@e2000` and matches the MDK
  # `GRTC_CC_MaxCount`.
  #
  # IRQ: the MDK IRQn table gives GRTC_0..GRTC_3 = 226..229. The Zephyr DT node
  # carries no `interrupts` property (the per-CPU group is picked by
  # GRTC_IRQ_GROUP in the nrfx config), so GRTC_0 is mapped here and the model
  # collapses all four interrupt groups onto it. Needs bench confirmation.
  - id: "grtc"
    type: "nrf54l_grtc"
    base_address: 0x500E2000
    size: "4KB"
    irq: 226
    config:
      num_cc: 12

  # ── Benign stub windows ────────────────────────────────────────────────

  # CLOCK — oscillator control. A DEDICATED nRF54L model, not the nRF52 one.
  #
  # The devicetree binds this as `compatible = "nordic,nrf-clock"`, the same
  # binding nRF52/nRF5340 use, and that is misleading: the nRF54L block replaced
  # the HFCLK/LFCLK task pair with an XO/PLL/LFCLK trio and moved every status
  # register. TASKS_LFCLKSTART is 0x010 (nRF52: 0x008), EVENTS_LFCLKSTARTED is
  # 0x108 (0x104), LFCLK.STAT is 0x44C (LFCLKSTAT 0x418) and LFCLK.SRC is 0x440
  # (LFCLKSRC 0x518). XO.STAT happens to land on 0x40C, the nRF52 HFCLKSTAT
  # offset — a coincidence that let the nRF52 model look like it worked right
  # up until Zephyr hung in lfclk_spinwait().
  #
  # Source: MDK SVD GLOBAL_CLOCK_S + nrf54l15_application_peripherals.h field
  # positions (LFCLK_STAT.STATE bit 16, .SRC bits 1:0).
  - id: "clock"
    type: "nrf54l_clock"
    base_address: 0x5010E000
    size: "4KB"
    irq: 261

  # TAMPC — tamper controller, and the block that gates APPROTECT.
  #
  # Zephyr's SystemInit calls nrf54l_handle_approtect_signal() (Nordic MDK
  # system_nrf54l_approtect.h) which READS the protect-domain signal registers
  # at +0x500/0x508/0x510/0x518 before writing them. An unmapped window faulted
  # the bus here on the first Zephyr boot attempt.
  #
  # Zero is the correct value, not merely a convenient one: the MDK treats
  # "signal locked AND high" as an invalid state and deliberately hangs the part
  # (it starts WDT30 with a minimum counter and spins in while(1) waiting for
  # the reset). Reading zero means "not locked", which is the unprovisioned /
  # APPROTECT-disabled development part — the state a simulator should model.
  # A stub that returned 0xFFFFFFFF here would boot into that deliberate hang
  # and look like a simulator bug.
  #
  # Base is nRF54L15-specific: NRF_TAMPC_S_BASE = 0x500DC000 in the MDK's
  # nrf54l15_global.h. Other nRF54L parts put TAMPC elsewhere (0x500EF000 on
  # nRF54LC10/LM20), so do not copy this address across the family.
  - id: "tampc"
    type: "nrf54l_tampc_stub"
    base_address: 0x500DC000
    size: "4KB"

  # WDT30 / WDT31 — mapped so the MDK's approtect-invalid-state path (which
  # pokes WDT30 to force a reset) writes somewhere real rather than faulting.
  # Not reached on a healthy boot; present so a fault here means a genuine
  # problem rather than a missing window.
  - id: "wdt30"
    type: "nrf54l_wdt_stub"
    base_address: 0x50108000
    size: "4KB"
  - id: "wdt31"
    type: "nrf54l_wdt_stub"
    base_address: 0x50109000
    size: "4KB"

  # RRAM controller — NVM write/erase control. Reads as zero; a firmware that
  # only executes from RRAM never needs it, but the window must exist so a
  # config readback does not fault.
  - id: "rramc"
    type: "nrf54l_rramc_stub"
    base_address: 0x5004B000
    size: "4KB"

  # Regulators (DCDC/LDO selection) — write-only on the boot path.
  - id: "regulators"
    type: "nrf54l_regulators_stub"
    base_address: 0x50120000
    size: "4KB"

  # DPPIC / PPIB — event routing fabric. Poked during peripheral init but not
  # polled for a settled value on a UART smoke boot.
  - id: "dppic20"
    type: "nrf54l_dppic_stub"
    base_address: 0x500C2000
    size: "4KB"
  - id: "dppic30"
    type: "nrf54l_dppic_stub"
    base_address: 0x50102000
    size: "4KB"

  # FICR / UICR — factory and user info. NOT inside the 0x5000_0000 window;
  # these are absolute (DT: ficr@ffc000, uicr@ffd000). Unprovisioned UICR reads
  # as zero, which the boot path accepts.
  - id: "ficr"
    type: "nrf54l_ficr_stub"
    base_address: 0x00FFC000
    size: "4KB"
  - id: "uicr"
    type: "nrf54l_uicr_stub"
    base_address: 0x00FFD000
    size: "4KB"
