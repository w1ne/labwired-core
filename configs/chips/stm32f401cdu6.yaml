  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
  - id: "i2c2"
    type: "i2c"
    base_address: 0x40005800
    size: "1KB"
    irq: 33
  - id: "i2c3"
    type: "i2c"
