    irq: 30
  - id: "tim5"
    type: "timer"
    base_address: 0x40000C00
    size: "1KB"
    irq: 50
  - id: "rtc"
    type: "stub"
    base_address: 0x40002800
    size: "1KB"
  - id: "wwdg"
