# STM32F401CDU6 Chip Descriptor
#
# Verified on attached hardware via ST-LINK/OpenOCD:
# - DBGMCU IDCODE: 0x10016433
# - Flash size: 384 KiB

name: "stm32f401cdu6"
arch: "arm"
core: "cortex-m4"
registers_count: 150
flash:
  base: 0x08000000
  size: "384KB"
ram:
  base: 0x20000000
  size: "96KB"
peripherals:
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
  - id: "tim3"
    type: "timer"
    base_address: 0x40000400
    size: "1KB"
    irq: 29
