name: "stm32f401re"
arch: "arm"
core: "cortex-m4"
registers_count: 150
flash:
  base: 0x08000000
  size: "512KB"
ram:
  base: 0x20000000
  size: "96KB"
peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x40023800
    size: "1KB"
    config:
      profile: "stm32f4"
  - id: "gpioa"
    type: "gpio"
    base_address: 0x40020000
    size: "1KB"
    config:
      profile: "stm32v2"
      # SWD/JTAG defaults (RM0368 §8.4 / STM32F401 SVD): PA13/14/15 in AF mode.
      reset_moder: 0xA8000000
      reset_pupdr: 0x64000000
  - id: "gpiob"
    type: "gpio"
    base_address: 0x40020400
    size: "1KB"
    config:
      profile: "stm32v2"
      # JTAG defaults (RM0368 §8.4 / STM32F401 SVD): PB3 (JTDO/SWO), PB4 (NJTRST).
      reset_moder: 0x00000280
      reset_ospeedr: 0x000000C0
      reset_pupdr: 0x00000100
  - id: "gpioc"
    type: "gpio"
    base_address: 0x40020800
    size: "1KB"
    config:
      profile: "stm32v2"
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 38
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
  - id: "flash"
    type: "flash"
    base_address: 0x40023C00
    size: "1KB"
    config:
      # F4 embedded-flash interface (RM0368 §3.8): ACR reset 0 (no F1-style
      # prefetch default), CR LOCK at bit 31, OPTCR present. The F1 profile's
      # 0x30 ACR default and bit-7 LOCK are silicon-wrong for F401.
      profile: "stm32f4"
  - id: "pwr"
    type: "pwr"
    base_address: 0x40007000
    size: "1KB"
    config:
      # F4 PWR (RM0368 §5.4): only PWR_CR/PWR_CSR exist, both reset 0. The
      # default L4 model surfaced CR1=0x200 / CR3=0x8000 and phantom PUCRx regs.
      profile: "stm32f4"
  - id: "uart1"
    type: "uart"
    base_address: 0x40011000
    size: "1KB"
    irq: 37
  # TIM2 — 32-bit general-purpose timer (RM0368 §13). On APB1, clock-gated by
  # RCC_APB1ENR.TIM2EN (bit 0); unclocked out of reset, so register writes are
  # dropped until firmware enables the gate.
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
    config:
      width: 32
    clock: { reg: "apb1enr", bit: 0 }
  # SPI1 — classic STM32 SPI (RM0368 §20). On APB2, clock-gated by
  # RCC_APB2ENR.SPI1EN (bit 12). F4 silicon CR masks mirror the F407:
  # CR2 bit 4 (FRF/TI-mode) writable → 0xF7; CR1 bit 12 (CRCNEXT) not latched
  # → 0xEFFF.
  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 35
    config:
      cr2_mask: 0xF7
      cr1_mask: 0xEFFF
    clock: { reg: "apb2enr", bit: 12 }
  # ADC1 — 12-bit SAR ADC (RM0368 §11). On APB2, clock-gated by
  # RCC_APB2ENR.ADC1EN (bit 8); unclocked out of reset.
  - id: "adc1"
    type: "adc"
    base_address: 0x40012000
    size: "1KB"
    irq: 18
    clock: { reg: "apb2enr", bit: 8 }
  # IWDG — independent watchdog (RM0368 §14). Clocked from the dedicated LSI
  # oscillator, NOT an APB/AHB peripheral-enable bit, so it carries no `clock:`
  # gate. The KR key (0x5555) protects PR/RLR writes instead.
  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"
  # RTC — calendar real-time clock (RM0368 §16; same IP as the L4 `rtc` model).
  # Lives in the backup domain, clock-enabled via RCC_BDCR.RTCEN — outside the
  # APB/AHB peripheral-enable gate this model expresses, so it is left ungated.
  - id: "rtc"
    type: "rtc"
    base_address: 0x40002800
    size: "1KB"
