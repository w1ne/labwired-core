#
# Source references:
# - STM32H563xx memory map and IRQ values:
#   https://github.com/STMicroelectronics/cmsis-device-h5/blob/main/Include/stm32h563xx.h
# - NUCLEO-H563ZI board BSP mapping (LEDs, COM port):
#   https://github.com/STMicroelectronics/stm32h5xx-nucleo-bsp/blob/main/stm32h5xx_nucleo.h
# - Reset values verified on NUCLEO-H563ZI silicon (DBGMCU_IDCODE 0x10016484,
#   Cortex-M33 r0p4) over SWD: scripts/hw-capture-stm32h563.sh, 2026-06-10.
#   GPIO MODER/OSPEEDR/PUPDR, RCC (profile h5) and SysTick CALIB below carry
#   the captured values.
#
# Known divergences from silicon (bench-probed 2026-06-10):
# - SPI1/2/3: register surface + flag machinery are silicon-pinned, but real
#   frames only shift when the spi_ker_ck kernel clock is configured; the
#   bench part had none, so the sim's always-clocked TX engine (EOT/TXC on
#   TSIZE exhaustion) is spec-derived, not silicon-pinned.
# - ADC1: reset state + the DEEPPWD/ADVREGEN/ADEN->ADRDY power-up path are
#   silicon-pinned; conversions are sim-modeled. ADC2 (0x42028100) shares the
#   1KB window but is NOT separately modeled (its offsets read as ADC1 holes).
# - RTC: calendar/init/WPR machinery silicon-pinned (BYPSHAD=1 path). The
#   sim calendar is always clocked; silicon needs DBP + LSI/LSE + BDCR.RTCEN
#   before anything ticks. Sub-second (SSR) granularity is approximate.
# - IWDG: silicon commits PR/RLR writes only after LSI-domain sync (SR.PVU/RVU
#   clear; with LSI off they never commit). The sim commits instantly and
#   keeps SR at 0, so PVU/RVU polling loops exit immediately.
# - RNG: silicon resets CR to 0x00800D00 and flags SR clock errors (0x22) when
#   the rng_ker_ck kernel clock is absent; the sim assumes a clocked, seeded
#   RNG with CR reset 0.

name: "stm32h563zi"
arch: "arm"
core: "cortex-m33"
registers_count: 220
flash:
  base: 0x08000000
  # Binary units (MiB) so the buffer is exactly 2 * 0x100000 = 2,097,152 bytes,
  # matching real H563 silicon: two 1 MiB (0x100000) banks. SI "2MB" would parse
  # as 2,000,000 (human_size) and break dual-bank addressing (bank 2 @ 0x08100000).
  size: "2MiB"
ram:
  base: 0x20000000
  # 640 KiB = 655,360 bytes, matching silicon (initial SP read = 0x200A0000 = RAM top).
  size: "640KiB"
peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x44020C00
    size: "1KB"
    config:
      profile: "h5"
  - id: "gpioa"
    type: "gpio"
    base_address: 0x42020000
    size: "1KB"
    config:
      profile: "stm32v2"
      # PA13/PA14 SWD pins + PA15 JTDI keep port A off the all-analog default.
      reset_moder: 0xABFFFFFF
      reset_ospeedr: 0x0C000000
      reset_pupdr: 0x64000000
  - id: "gpiob"
    type: "gpio"
    base_address: 0x42020400
    size: "1KB"
    config:
      profile: "stm32v2"
      # PB3 JTDO/SWO and PB4 NJTRST debug defaults.
      reset_moder: 0xFFFFFEBF
      reset_ospeedr: 0x000000C0
      reset_pupdr: 0x00000100
  - id: "gpioc"
    type: "gpio"
    base_address: 0x42020800
    size: "1KB"
    config:
      profile: "stm32v2"
      reset_moder: 0xFFFFFFFF
  - id: "gpiod"
    type: "gpio"
    base_address: 0x42020C00
    size: "1KB"
    config:
      profile: "stm32v2"
      reset_moder: 0xFFFFFFFF
  - id: "gpioe"
    type: "gpio"
    base_address: 0x42021000
    size: "1KB"
    config:
      profile: "stm32v2"
      reset_moder: 0xFFFFFFFF
  - id: "gpiof"
    type: "gpio"
    base_address: 0x42021400
    size: "1KB"
    config:
      profile: "stm32v2"
      reset_moder: 0xFFFFFFFF
  - id: "gpiog"
    type: "gpio"
    base_address: 0x42021800
    size: "1KB"
    config:
      profile: "stm32v2"
      reset_moder: 0xFFFFFFFF
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
    config:
      calib: 0x001003E8
  - id: "uart3"
    type: "uart"
    base_address: 0x40004800
    size: "1KB"
    irq: 60
    config:
      profile: "stm32v2"
  # GPDMA1 (RM0481): 8 channels at 0x50 + n*0x80. Mem-to-mem (CTR2.SWREQ)
  # silicon-verified 2026-06-11; linked-list mode not modeled.
  - id: "gpdma1"
    type: "gpdma"
    base_address: 0x40020000
    # 8 channels x 0x80 + 0x50 base = 0x450 of register space: channel 7's
    # CTR1/CBR1/CSAR/CDAR live above 1KB, so the window must be 2KB.
    size: "2KB"
    irq: 27
    config:
      irq_base: 27  # per-channel NVIC lines 27..34 (ch7 TCIE silicon-probed)
  # FDCAN1 (RM0481 §60, Bosch M_CAN with the fixed message-RAM layout).
  # Internal-loopback TX -> RX FIFO0 silicon-verified 2026-06-12
  # (capture13). The window spans the whole FDCAN estate relative to the
  # FDCAN1 base: M_CAN regs at +0x000, FDCAN_CONFIG at +0x100, SRAMCAN at
  # +0x800 (0x4000AC00). FDCAN2 (regs at +0x400, present on silicon) is
  # not modeled and reads 0 — divergence documented.
  - id: "fdcan1"
    type: "fdcan"
    base_address: 0x4000A400
    size: "4KB"
    irq: 39  # FDCAN1_IT0; line 1 (IT1 = 40) routing via ILS not modeled
  # TIM1 is the advanced-control PWM timer; the `_pwm` id suffix declares the
  # tier1 pwm class alongside timer (CLASS_MARKERS match on id substrings).
  - id: "tim1_pwm"
    type: "timer"
    base_address: 0x40012C00
    size: "1KB"
    irq: 42
    config:
      advanced: true
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 45
    config:
      width: 32
  - id: "tim3"
    type: "timer"
    base_address: 0x40000400
    size: "1KB"
    irq: 46
  # TIM12 (2ch GP) — embassy's time-driver-any pick on this part; reset +
  # PSC/CCR/DIER round-trips + free-running CNT bench-probed 2026-06-11.
  - id: "tim12"
    type: "timer"
    base_address: 0x40001800
    size: "1KB"
    irq: 120
  - id: "tim6"
    type: "timer"
    base_address: 0x40001000
    size: "1KB"
    irq: 49
    config:
      basic: true
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 51
    config:
      profile: "h5"
  - id: "i2c2"
    type: "i2c"
    base_address: 0x40005800
    size: "1KB"
    irq: 53
    config:
      profile: "h5"
  - id: "uart1"
    type: "uart"
    base_address: 0x40013800
    size: "1KB"
    irq: 58
    config:
      profile: "stm32v2"
  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 59
    config:
      profile: "stm32v2"
  - id: "lpuart1"
    type: "uart"
    base_address: 0x44002400
    size: "1KB"
    irq: 63
    config:
      profile: "stm32v2"
  - id: "wwdg"
    type: "wwdg"
    base_address: 0x40002C00
    size: "1KB"
    irq: 0
  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"
  # RNG_CR resets to 0x00800D00 on silicon (NIST-config default); the generic
  # model resets it to 0 — divergence documented, CR not pinned in conformance.
  - id: "rng"
    type: "rng"
    base_address: 0x420C0800
    size: "1KB"
    irq: 114
  - id: "crc"
    type: "crc"
    base_address: 0x40023000
    size: "1KB"
    config:
      idr_width: 32
  - id: "lptim1"
    type: "lptim"
    base_address: 0x44004400
    size: "1KB"
    irq: 64
  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 55
    config:
      profile: "stm32h5"
  - id: "spi2"
    type: "spi"
    base_address: 0x40003800
    size: "1KB"
    irq: 56
    config:
      profile: "stm32h5"
  - id: "spi3"
    type: "spi"
    base_address: 0x40003C00
    size: "1KB"
    irq: 57
    config:
      profile: "stm32h5"
  # 1KB window covers ADC1 (0x000) and the common block (0x300). ADC2 at
  # 0x100 is not separately modeled — see the divergence note up top.
  - id: "adc1"
    type: "adc"
    base_address: 0x42028000
    size: "1KB"
    irq: 37
    config:
      profile: "stm32l4"
  # RTC v3 calendar (RM0481). Silicon needs DBP + LSI + BDCR.RTCEN first;
  # the sim calendar is always clocked.
  - id: "rtc"
    type: "rtc_v3"
    base_address: 0x44007800
    size: "1KB"
    irq: 2
  # NVIC is wired unconditionally for Cortex-M machines (system/cortex_m.rs);
  # this entry declares the tier1 irq class and pins the canonical base.
  - id: "nvic"
    type: "nvic"
    base_address: 0xE000E100
    size: "1KB"
  # PWR (AHB3), H5 layout — VOSCR/VOSSR voltage scaling silicon-pinned
  # (foreign firmware polls VOSSR.VOSRDY before any PLL work).
  - id: "pwr"
    type: "pwr"
    base_address: 0x44020800
    size: "1KB"
    config:
      profile: "stm32h5"
  # FLASH interface registers (RM0481) — ACR latency/WRHIGHFREQ read-back for
  # clock bring-up; NSKEYR/OPTKEYR unlock, NSCR sector-erase and
  # OPTSR_PRG.SWAP_BANK + OPTCR.OBL_LAUNCH (drained in Machine::step) model the
  # UDS OTA reprogramming path. Programming is plain writes to the flash region.
  - id: "flash_iface"
    type: "flash"
    base_address: 0x40022000
    size: "1KB"
    config:
      profile: "stm32h5"
  # DBGMCU (RM0481) — IDCODE captured off the bench part 2026-06-10;
  # CR bits [4:3] are plain R/W storage on silicon (cf. the F103 finding).
  - id: "dbgmcu"
    type: "dbgmcu"
    base_address: 0x44024000
    size: "1KB"
    config:
      idcode: 0x10016484
