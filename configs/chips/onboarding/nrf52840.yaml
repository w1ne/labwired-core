#
# IRQ numbers from nRF52840 PS rev 1.7 §6.1.4 "Instantiation table".
# Required so that the sim's NVIC can pend the right line when a
# peripheral tick() returns irq:true. Without these, dynamic tick
# handlers silently no-op even when behaviourally correct.

name: nrf52840
arch: arm
flash:
  base: 0           # 0x00000000 — Nordic nRF52840 flash
  size: 1048576B    # 1024 KiB
ram:
  base: 536870912   # 0x20000000 — Nordic nRF52840 SRAM
  size: 262144B     # 256 KiB
peripherals:
- id: uart0
  type: nrf52840_uart
  bus: sysbus
  base_address: 1073750016
  irq: 2  # UARTE0_UART0
- id: uart1
  type: nrf52840_uart
  bus: sysbus
  base_address: 1073905664
  irq: 40  # UARTE1
- id: rtc0
  type: nrf52840_rtc
  bus: sysbus
  base_address: 1073786880
  irq: 11
- id: rtc1
  type: nrf52840_rtc
  bus: sysbus
  base_address: 1073811456
  irq: 17
- id: rtc2
  type: nrf52840_rtc
  bus: sysbus
  base_address: 1073889280
  irq: 36
- id: wdt
  type: nrf52840_watchdog
  bus: sysbus
  base_address: 1073807360
  irq: 16
- id: ppi
  type: nrf52840_ppi
  bus: sysbus
  base_address: 1073868800
- id: clock
  type: nrf_clock
  bus: sysbus
  base_address: 1073741824
  irq: 0  # POWER_CLOCK (shared)
- id: twi0
  type: nrf52840_i2c
  bus: sysbus
  base_address: 1073754112
  irq: 3  # SPI0_TWI0
- id: spi2
  type: nrf52840_spi
  bus: sysbus
  base_address: 1073885184
  irq: 35  # SPIM2_SPIS2_SPI2
- id: gpio0
  type: nrf52840_gpio
  bus: sysbus
  base_address: 1342177280  # 0x50000000 — standard Nordic P0 base
# Note: real Nordic P1 lives at 0x50000300 with 0x508-offset registers,
# but its 4KB peripheral window overlaps GPIO0's. We follow the
# production yaml's convention of placing P1 at 0x50001000 so the
# peripheral lookup is unambiguous. Firmware that targets P0 (the only
# port with LEDs on most demo boards) is unaffected; firmware that
# writes to P1's standard addresses won't reach gpio1 here.
- id: gpio1
  type: nrf52840_gpio
  bus: sysbus
  base_address: 1342181376  # 0x50001000
- id: gpiote
  type: nrf52840_gpiotasksevents
  bus: sysbus
  base_address: 1073766400
  irq: 6
- id: twi1
  type: nrf52840_i2c
  bus: sysbus
  base_address: 1073758208
  irq: 4  # SPI1_TWI1
