# LabWired - STM32L476RG chip configuration
#
# Source references:
# - RM0351 (STM32L4 Reference Manual): memory map, RCC layout, peripheral
#   register offsets.
# - DEV_ID 0x415, REV_ID 0x1007 verified against real silicon via SWD probe
#   (DBGMCU_IDCODE @ 0xE0042000 = 0x10076415).
#
# Tier: experimental — basic UART smoke verified against NUCLEO-L476RG hardware,
# other peripherals not yet hardware-validated.

name: "stm32l476rg"
arch: "arm"
registers_count: 200
flash:
  base: 0x08000000
  size: "1MB"
ram:
  base: 0x20000000
  size: "96KB"

peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x40021000
    size: "1KB"
    config:
      profile: "stm32l4"

  - id: "gpioa"
    type: "gpio"
    base_address: 0x48000000
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "gpiob"
    type: "gpio"
    base_address: 0x48000400
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "gpioc"
    type: "gpio"
    base_address: 0x48000800
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "gpiod"
    type: "gpio"
    base_address: 0x48000C00
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "gpioe"
    type: "gpio"
    base_address: 0x48001000
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "gpioh"
    type: "gpio"
    base_address: 0x48001C00
    size: "1KB"
    config:
      profile: "stm32v2"

  - id: "systick"
    type: "systick"
    base_address: 0xE000E010

  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 38
    config:
      profile: "stm32v2"

  - id: "uart1"
    type: "uart"
    base_address: 0x40013800
    size: "1KB"
    irq: 37
    config:
      profile: "stm32v2"

  - id: "uart3"
    type: "uart"
    base_address: 0x40004800
    size: "1KB"
    irq: 39
    config:
      profile: "stm32v2"

  - id: "uart4"
    type: "uart"
    base_address: 0x40004C00
    size: "1KB"
    irq: 52
    config:
      profile: "stm32v2"

  - id: "uart5"
    type: "uart"
    base_address: 0x40005000
    size: "1KB"
    irq: 53
    config:
      profile: "stm32v2"

  # LPUART1 — same register layout as USART (modern stm32v2).
  - id: "lpuart1"
    type: "uart"
    base_address: 0x40008000
    size: "1KB"
    irq: 70
    config:
      profile: "stm32v2"

  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 35

  - id: "spi2"
    type: "spi"
    base_address: 0x40003800
    size: "1KB"
    irq: 36

  - id: "spi3"
    type: "spi"
    base_address: 0x40003C00
    size: "1KB"
    irq: 51

  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
    config:
      profile: "stm32l4"

  - id: "i2c2"
    type: "i2c"
    base_address: 0x40005800
    size: "1KB"
    irq: 33
    config:
      profile: "stm32l4"

  - id: "i2c3"
    type: "i2c"
    base_address: 0x40005C00
    size: "1KB"
    irq: 72
    config:
      profile: "stm32l4"

  - id: "adc1"
    type: "adc"
    base_address: 0x50040000
    # 1KB window covers ADC1 (0x000), ADC2 (0x100), ADC3 (0x200), and the
    # common block at 0x300 — all three instances share the bus mapping.
    size: "1KB"
    irq: 18
    config:
      profile: "stm32l4"

  - id: "dma1"
    type: "dma"
    base_address: 0x40020000
    size: "1KB"
    irq: 11

  - id: "dma2"
    type: "dma"
    base_address: 0x40020400
    size: "1KB"
    irq: 56

  - id: "pwr"
    type: "pwr"
    base_address: 0x40007000
    size: "1KB"

  - id: "flash"
    type: "flash"
    base_address: 0x40022000
    size: "1KB"

  - id: "rng"
    type: "rng"
    base_address: 0x50060800
    size: "1KB"
    irq: 80

  - id: "crc"
    type: "crc"
    base_address: 0x40023000
    size: "1KB"

  # General-purpose 32-bit timer (TIM2 — STM32L4 RM0351 §29).
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
    config:
      width: 32

  # 32-bit general-purpose TIM5.
  - id: "tim5"
    type: "timer"
    base_address: 0x40000C00
    size: "1KB"
    irq: 50
    config:
      width: 32

  # 16-bit general-purpose TIM3, TIM4.
  - id: "tim3"
    type: "timer"
    base_address: 0x40000400
    size: "1KB"
    irq: 29

  - id: "tim4"
    type: "timer"
    base_address: 0x40000800
    size: "1KB"
    irq: 30

  # 16-bit basic timers TIM6, TIM7 — used by HAL as time base.
  - id: "tim6"
    type: "timer"
    base_address: 0x40001000
    size: "1KB"
    irq: 54

  - id: "tim7"
    type: "timer"
    base_address: 0x40001400
    size: "1KB"
    irq: 55

  # Advanced-control timers TIM1 / TIM8 — full register file with BDTR
  # (break + dead-time + MOE), RCR (repetition counter), CCMR3, CCR5/6.
  # Used for motor-control / centre-aligned PWM where dead-time matters.
  - id: "tim1"
    type: "timer"
    base_address: 0x40012C00
    size: "1KB"
    irq: 27
    config:
      advanced: true

  - id: "tim8"
    type: "timer"
    base_address: 0x40013400
    size: "1KB"
    irq: 46
    config:
      advanced: true

  # General-purpose 16-bit timers TIM15 / TIM16 / TIM17.
  - id: "tim15"
    type: "timer"
    base_address: 0x40014000
    size: "1KB"
    irq: 24

  - id: "tim16"
    type: "timer"
    base_address: 0x40014400
    size: "1KB"
    irq: 25

  - id: "tim17"
    type: "timer"
    base_address: 0x40014800
    size: "1KB"
    irq: 26

  - id: "rtc"
    type: "rtc"
    base_address: 0x40002800
    size: "1KB"

  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"

  - id: "wwdg"
    type: "wwdg"
    base_address: 0x40002C00
    size: "1KB"
    irq: 0

  - id: "dac"
    type: "dac"
    base_address: 0x40007400
    size: "1KB"

  # EXTI — 40 lines, two-bank layout (RM0351 §13).
  - id: "exti"
    type: "exti"
    base_address: 0x40010400
    size: "1KB"
    config:
      profile: "stm32l4"

  # SYSCFG — system config (mostly EXTI line source selection); modeled as stub.
  - id: "syscfg"
    type: "stub"
    base_address: 0x40010000
    size: "1KB"

  # Low-power timers.
  - id: "lptim1"
    type: "lptim"
    base_address: 0x40007C00
    size: "1KB"
    irq: 65

  - id: "lptim2"
    type: "lptim"
    base_address: 0x40009400
    size: "1KB"
    irq: 78

  # QUADSPI — quad-SPI memory interface (RM0351 §14).
  - id: "quadspi"
    type: "quadspi"
    base_address: 0xA0001000
    size: "1KB"
    irq: 71

  # SAI1 / SAI2 — serial audio interface.
  - id: "sai1"
    type: "sai"
    base_address: 0x40015400
    size: "1KB"
    irq: 74

  - id: "sai2"
    type: "sai"
    base_address: 0x40015800
    size: "1KB"
    irq: 75

  # USB OTG FS — Synopsys DWC2 controller (RM0351 §44).
  - id: "usb_otg_fs"
    type: "usb_otg"
    base_address: 0x50000000
    # Full DWC2 register window is 256KB; we model only the first 4KB.
    size: "4KB"
    irq: 67

  # bxCAN1 — basic-extended CAN.
  - id: "can1"
    type: "bxcan"
    base_address: 0x40006400
    size: "1KB"
    irq: 19

  # SDMMC1 — SD/MMC card host (RM0351 §38).
  - id: "sdmmc1"
    type: "sdmmc"
    base_address: 0x40012800
    size: "1KB"
    irq: 49

  # COMP — analog comparators (COMP1 + COMP2 sharing one window).
  - id: "comp"
    type: "comp"
    base_address: 0x40010200
    size: "1KB"
    irq: 64

  # TSC — touch sensing controller (RM0351 §21).
  - id: "tsc"
    type: "tsc"
    base_address: 0x40024000
    size: "1KB"
    irq: 77

  # FMC — flexible memory controller (RM0351 §13).
  - id: "fmc"
    type: "fmc"
    base_address: 0xA0000000
    size: "1KB"
    irq: 48

  - id: "scb"
    type: "scb"
    base_address: 0xE000ED00
    size: "1KB"

  - id: "nvic"
    type: "nvic"
    base_address: 0xE000E100
    size: "1KB"

  - id: "dbgmcu"
    type: "dbgmcu"
    base_address: 0xE0042000
    size: "1KB"
    config:
      # DBGMCU_IDCODE for STM32L476RG: REV_ID=0x1007 (Rev Z), DEV_ID=0x415.
      # Verified against real hardware via SWD probe.
      idcode: "0x10076415"
