name: "stm32f103c8"
arch: "arm"
core: "cortex-m3"
registers_count: 125
flash:
  base: 0x08000000
  size: "1MB"
ram:
  base: 0x20000000
  # STM32F103C8 has 20KB of SRAM (0x2000_0000..0x2000_5000). Modelling the
  # physical size means firmware whose stack/heap runs past 0x2000_5000 faults
  # in the sim exactly as it does on real silicon (HardFault before main()).
  size: "20KB"
peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x40021000
    size: "1KB"
  - id: "gpioa"
    type: "gpio"
    base_address: 0x40010800
    size: "1KB"
    # GPIOA is clocked from RCC_APB2ENR.IOPAEN (bit 2). Unclocked out of reset:
    # firmware that forgets to enable it has its register writes dropped on real
    # silicon — modelled here so the sim fails the same way (RM0008 §7.3.7).
    clock: { reg: "apb2enr", bit: 2 }
    config:
      profile: "stm32f1"
  - id: "gpiob"
    type: "gpio"
    base_address: 0x40010C00
    size: "1KB"
    config:
      profile: "stm32f1"
  - id: "gpioc"
    type: "gpio"
    base_address: 0x40011000
    size: "1KB"
    config:
      profile: "stm32f1"
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
  - id: "uart1"
    type: "uart"
    base_address: 0x40013800
    size: "1KB"
    irq: 37
    # USART1 is clocked from RCC_APB2ENR.USART1EN (bit 14). Unclocked out of
    # reset, so SR.TXE never asserts until firmware enables the clock — the exact
    # real-hardware behaviour the differential test proved the sim was missing.
    clock: { reg: "apb2enr", bit: 14 }
  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 38
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
    # I2C1 is clocked from RCC_APB1ENR.I2C1EN (bit 21). Unclocked out of reset,
    # so its registers read 0 / drop writes until firmware enables the clock
    # (RM0008 §7.3.8) — the tier-1 fixture proves the dead-while-gated state.
    clock: { reg: "apb1enr", bit: 21 }
  - id: "i2c2"
    type: "i2c"
    base_address: 0x40005800
    size: "1KB"
    irq: 33
  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 35
    # SPI1 is clocked from RCC_APB2ENR.SPI1EN (bit 12). Unclocked out of reset
    # (RM0008 §7.3.7) — SR.TXE never asserts until the clock is enabled.
    clock: { reg: "apb2enr", bit: 12 }
  - id: "spi2"
    type: "spi"
    base_address: 0x40003800
    size: "1KB"
    irq: 36
  - id: "afio"
    type: "afio"
    base_address: 0x40010000
    size: "1KB"
    # AFIO is clocked from RCC_APB2ENR.AFIOEN (bit 0). Unclocked out of reset.
    clock: { reg: "apb2enr", bit: 0 }
  - id: "exti"
    type: "exti"
    base_address: 0x40010400
    size: "1KB"
    # F103 implements 19 EXTI lines (0-18): 16 GPIO + PVD + RTC alarm + USB
    # wakeup. Silicon-confirmed writable mask 0x0007FFFF on the bench F103.
    config:
      lines: 19
  - id: "dma1"
    type: "dma"
    base_address: 0x40020000
    size: "1KB"
    # DMA1 is clocked from RCC_AHBENR.DMA1EN (bit 0). Unclocked out of reset
    # (RM0008 §7.3.6) — channel registers read 0 / drop writes until enabled.
    clock: { reg: "ahbenr", bit: 0 }
  # ─── STM32F1-family peripherals, reset values verified against ─────────
  # ─── STM32F103C8 silicon (Blue Pill, ST-LINK V2, 2026-06-04). ──────────
  # Each `profile` selects the chip-family layout in the peripheral model
  # so adding F1 entries here cannot regress L4/F4/V2 deployments.
  - id: "flash_ctrl"
    type: "flash"
    base_address: 0x40022000
    size: "1KB"
    config:
      profile: "stm32f1"
  - id: "dbgmcu"
    type: "dbgmcu"
    base_address: 0xE0042000
    size: "1KB"
    config:
      idcode: "0x20036410"  # STM32F103C8 — silicon-verified
  - id: "pwr"
    type: "pwr"
    base_address: 0x40007000
    size: "1KB"
  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"
  - id: "wwdg"
    type: "wwdg"
    base_address: 0x40002C00
    size: "1KB"
  - id: "rtc"
    type: "rtc_f1"
    base_address: 0x40002800
    size: "1KB"
  - id: "crc"
    type: "crc"
    base_address: 0x40023000
    size: "1KB"
    config:
      idr_width: 8  # STM32F1 CRC_IDR is 8-bit (RM0008 §6.4.2)
  # bxCAN + USB share SRAM @ 0x4000_6000; bxCAN registers at 0x6400.
  - id: "bxcan1"
    type: "bxcan"
    base_address: 0x40006400
    size: "1KB"
    # bxCAN1 is clocked from RCC_APB1ENR.CAN1EN (bit 25). Unclocked out of reset,
    # so MSR.INAK never asserts (the chip never enters init mode) until firmware
    # enables the clock — matching real silicon (RM0008 §7.3.8).
    clock: { reg: "apb1enr", bit: 25 }
  - id: "usb_dev"
    type: "stub"
    base_address: 0x40005C00
    size: "1KB"
  - id: "bkp"
    type: "stub"
    base_address: 0x40006C00
    size: "1KB"
  # Timers & ADC — modelled (the timer model is width-configurable, 16-bit =
  # F1 general-purpose layout; the ADC model defaults to its Stm32F1 layout).
  # Reset values silicon-confirmed on STM32F103 over SWD: TIM2 ARR=0xFFFF,
  # TIMx_CR1=0, ADCx CR1/CR2=0. Addresses + IRQs per RM0008 / CMSIS.
  # TIM1 is the advanced-control timer (BDTR/RCR/dead-time).
  - id: "tim1"
    type: "timer"
    base_address: 0x40012C00
    size: "1KB"
    irq: 25
    config:
      advanced: true
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
    # TIM2 is clocked from RCC_APB1ENR.TIM2EN (bit 0). Unclocked out of reset
    # (RM0008 §7.3.8) — ARR reads its 0xFFFF reset only once the clock is on.
    clock: { reg: "apb1enr", bit: 0 }
  - id: "tim3"
    type: "timer"
    base_address: 0x40000400
    size: "1KB"
    irq: 29
  - id: "tim4"
    type: "timer"
    base_address: 0x40000800
    size: "1KB"
    irq: 30
  - id: "adc1"
    type: "adc"
    base_address: 0x40012400
    size: "1KB"
    irq: 18
    # ADC1 is clocked from RCC_APB2ENR.ADC1EN (bit 9). Unclocked out of reset
    # (RM0008 §7.3.7) — the converter is dead until the clock is enabled.
    clock: { reg: "apb2enr", bit: 9 }
  - id: "adc2"
    type: "adc"
    base_address: 0x40012800
    size: "1KB"
  - id: "usart3"
    type: "uart"
    base_address: 0x40004800
    size: "1KB"
    irq: 39
