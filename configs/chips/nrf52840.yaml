name: "nrf52840"
arch: "arm"
core: "cortex-m4"
flash:
  base: 0x00000000
  size: "1024KB"
ram:
  base: 0x20000000
  size: "256KB"
peripherals:
  - id: "uart0"
    type: "uart"
    base_address: 0x40002000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "spi0"
    type: "spi"
    base_address: 0x40003000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "gpio0"
    type: "gpio"
    base_address: 0x50000000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "gpio1"
    type: "gpio"
    base_address: 0x50001000
    size: "4KB"
    config:
      profile: "nrf52"
