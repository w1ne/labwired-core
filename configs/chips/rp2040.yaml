# LabWired - RP2040 Chip Descriptor
name: "rp2040"
arch: "arm"
registers_count: 240
flash:
  base: 0x10000000
  size: "2MB"
ram:
  base: 0x20000000
  size: "256KB"
peripherals:
  - id: "pio0"
    type: "declarative"
    base_address: 0x50200000
    config:
      path: "../peripherals/rp2040/pio0.yaml"
  - id: "uart0"
    type: "declarative"
    base_address: 0x40034000
    config:
      path: "../peripherals/rp2040/uart0.yaml"
