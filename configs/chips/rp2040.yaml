# LabWired - RP2040 Chip Descriptor
name: "rp2040"
arch: "arm"
core: "cortex-m0+"
registers_count: 240
flash:
  base: 0x10000000
  size: "2MB"
ram:
  base: 0x20000000
  # 264KB contiguous: 4×64KB striped banks + the two 4KB scratch banks
  # (SCRATCH_X @0x20040000, SCRATCH_Y @0x20041000) Zephyr uses for early stacks.
  size: "264KB"
# The RP2040 bootrom runs a 256-byte second-stage bootloader (boot2) from the
# top of flash; the application vector table follows it at flash_base + 0x100.
# LabWired does not execute boot2 (flash is directly mapped), so it relocates
# the reset vector past the stage-2 blob using this offset.
reset_vector_offset: 0x100
# Mask ROM @ 0x00000000 — rom_func_lookup reads well-known table at 0x14/0x18.
# In-tree minimal B0-compatible image (crates/core/roms/rp2040/bootrom.bin).
memory_regions:
  - name: "bootrom"
    base: 0x00000000
    size: "16KB"
    image_env: "LABWIRED_RP2040_BOOTROM"
# The RP2040 HAL drives register setup through atomic SET/CLR/XOR aliases.
atomic_register_aliases: true
peripherals:
  # SYSINFO (datasheet §2.21). Read-only identity block; the only load-bearing
  # register is CHIP_ID, which the pico-sdk USB errata-E5 workaround reads (from
  # the USB ISR on bus reset) and asserts carries the Raspberry Pi manufacturer
  # id — a zero here aborts USB enumeration inside the ISR.
  - id: "sysinfo"
    type: "declarative"
    base_address: 0x40000000
    size: "4KB"
    config:
      path: "../peripherals/rp2040/sysinfo.yaml"
  # DMA controller (datasheet §2.5, base 0x50000000). Twelve channels; each a
  # transfer engine with READ_ADDR / WRITE_ADDR / TRANS_COUNT / CTRL_TRIG and
  # the four aliased register windows (AL1/AL2/AL3). Behavioural model — real
  # memory-to-memory byte movement over the chip bus for TREQ_PERMANENT
  # channels: address increment, TRANS_COUNT decrement, CHAIN_TO handoff, and
  # INTS0/INTS1 completion IRQ aggregation onto DMA_IRQ_0 (NVIC 11) /
  # DMA_IRQ_1 (NVIC 12). Paced (DREQ) transfers are a documented follow-up.
  - id: "dma"
    type: "rp2040_dma"
    base_address: 0x50000000
    size: "4KB"
  - id: "pio0"
    type: "pio"
    base_address: 0x50200000
    size: "4KB"
  # CLOCKS / RESETS / PSM / XOSC / PLL_SYS / PLL_USB as one block. Models the
  # boot "ready" bits (RESET_DONE, XOSC STABLE, PLL LOCK, CLK_*_SELECTED) so
  # Zephyr's clock bring-up completes; everything else is register storage.
  # Window 0x40008000..0x40030000 stops short of UART0 (0x40034000).
  - id: "clk_rst"
    type: "rp2040_clkrst"
    base_address: 0x40008000
    size: "160KB"
  - id: "uart0"
    type: "uart"
    base_address: 0x40034000
    config:
      profile: "pl011"
  # ROSC (ring oscillator): same model, separate window above UART0. Models
  # ROSC.STATUS.STABLE so the ROSC start-up poll terminates.
  - id: "rosc"
    type: "rp2040_clkrst"
    base_address: 0x40060000
    size: "4KB"
  # WATCHDOG: Zephyr writes the tick generator once during boot; storage is
  # enough (it is not polled before the console comes up).
  - id: "watchdog"
    type: "stub"
    base_address: 0x40058000
    size: "4KB"
  # TIMER: 64-bit free-running microsecond timer (datasheet §4.6). Behavioural
  # model — the counter advances on every tick, sampled via TIMERAWL/TIMERAWH
  # (and TIMELR/TIMEHR); PAUSE freezes it.
  - id: "timer"
    type: "rp2040_timer"
    base_address: 0x40054000
    size: "4KB"
  # SPI0: PL022 SSP (datasheet §4.4). Behavioural model — internal-loopback
  # (SSPCR1.LBM) transfer round-trip through SSPDR with SSPSR FIFO flags.
  - id: "spi0"
    type: "rp2040_spi"
    base_address: 0x4003c000
    size: "4KB"
  # I2C0: Synopsys DW_apb_i2c (datasheet §4.3). Behavioural master engine — a
  # command to an unconnected target raises TX_ABRT with a 7-bit address NACK,
  # the genuine no-slave bus response.
  - id: "i2c0"
    type: "rp2040_i2c"
    base_address: 0x40044000
    size: "4KB"
    # RP2040 datasheet §2.3.2 — I2C0_IRQ = 23 (NVIC). Zephyr i2c_dw is
    # interrupt-driven (TX_EMPTY / STOP_DET → device_sync_sem); without this
    # the transfer times out with -EAGAIN.
    irq: 23
  # Cortex-M0+ SysTick (SCS). Behavioural model: the ARMv7-M SysTick timer
  # (edge-triggered — raises system exception 15 only on the count-down to
  # zero, and only while ENABLE+TICKINT are set). The Arduino Mbed-OS core
  # drives the RTX kernel tick off SysTick, so a storage stub left the RTOS
  # without a scheduler tick and it faulted on the first mutex lock.
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
    size: "16B"
  # Single-cycle IO (SIO): GPIO out/oe via direct + set/clr/xor registers
  # (datasheet §2.3.1). Behavioural model — GPIO_IN reads back the driven
  # level (GPIO_OUT & GPIO_OE), a real set-drive-readback round-trip. CPUID
  # reads 0 (core 0). No atomic aliases on this block (it sits at 0xD0000000,
  # outside the APB/AHB window).
  - id: "sio"
    type: "rp2040_sio"
    base_address: 0xD0000000
    size: "4KB"
  # XIP_SSI: Synopsys DW_apb_ssi flash controller (datasheet §4.10). The
  # second-stage bootloader (boot2) programs it to bring up the QSPI flash and
  # switch to execute-in-place; the pico-sdk runtime re-runs a RAM copy of boot2
  # (flash_enable_xip_via_boot2) during start-up. Behavioural model — a real SSI
  # shift engine (DR0 clocks a frame each way, SR reports TFE/BUSY/RFNE) with a
  # W25Q-style flash command responder so boot2's status polling and quad-enable
  # sequence complete. The XIP window itself (0x10000000) is the directly-mapped
  # flash image, so instruction fetch + .rodata execute-in-place transparently.
  - id: "xip_ssi"
    type: "rp2040_xip_ssi"
    base_address: 0x18000000
    size: "4KB"
  # USB device controller (datasheet §4.1). One window spans both the 4KB DPRAM
  # (0x50100000) and the register block (0x50110000); the atomic SET/CLR/XOR
  # aliases resolve into it. Behavioural model with an attached simulated USB
  # host: it enumerates the device (GET_DESCRIPTOR / SET_ADDRESS /
  # SET_CONFIGURATION) then asserts CDC DTR (SET_CONTROL_LINE_STATE), which is
  # what flips the Arduino Mbed-OS core's `_terminal_connected` so `Serial`
  # (USB CDC) actually transmits — the sketch's bulk-IN bytes are captured off
  # the CDC data endpoint. Raises USBCTRL_IRQ (NVIC 5).
  - id: "usbctrl"
    type: "rp2040_usb"
    base_address: 0x50100000
    size: "80KB"
  # TBMAN (Test Bench Manager, datasheet §2.20). The pico-sdk runtime probes
  # TBMAN.PLATFORM in running_on_fpga()/running_on_asic() during clock bring-up.
  # Storage stub: PLATFORM reads 0, so the FPGA bit (bit 1) is clear and the
  # runtime takes the ASIC path — the correct behaviour for the simulated part.
  - id: "tbman"
    type: "stub"
    base_address: 0x4006c000
    size: "4KB"
