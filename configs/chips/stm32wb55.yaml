schema_version: "1.0"
name: "STM32WB55"
arch: "arm"
core: "cortex-m4"
flash:
  base: 0x08000000
  size: "512KB"
ram:
  base: 0x20000000
  size: "256KB"
# System memory (bootloader ROM) + option-byte window. Arduino/STM32Cube
# startup reads package/flash-size fingerprints around 0x1FFF73xx (RM0434
# system memory). Unmapped → bus fault mid-init; zero-filled is honest for
# a generic WB55 model (unknown package → default path).
memory_regions:
  - name: "system_memory"
    base: 0x1FFF0000
    size: "32KB"

peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x58000000
    config:
      profile: "stm32v2"
  - id: "gpioa"
    type: "gpio"
    base_address: 0x48000000
    size: "1KB"
    config:
      profile: "stm32v2"
  - id: "gpiob"
    type: "gpio"
    base_address: 0x48000400
    size: "1KB"
    config:
      profile: "stm32v2"
  - id: "gpioc"
    type: "gpio"
    base_address: 0x48000800
    size: "1KB"
    config:
      profile: "stm32v2"
  - id: "gpiod"
    type: "gpio"
    base_address: 0x48000C00
    size: "1KB"
    config:
      profile: "stm32v2"
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
  - id: "usart1"
    type: "uart"
    base_address: 0x40013800
    # CMSIS USART1_IRQn = 36 (not 37 — that is LPUART1_IRQn on WB55).
    irq: 36
    config:
      profile: "stm32v2"
  - id: "lpuart1"
    type: "uart"
    base_address: 0x40008000
    # CMSIS LPUART1_IRQn = 37 (RM0434 / stm32wb55xx.h).
    irq: 37
    config:
      profile: "stm32v2"
  - id: "flash"
    type: "flash"
    base_address: 0x58004000
    size: "1KB"
    config:
      profile: "l4"
  - id: "pwr"
    type: "pwr"
    base_address: 0x58000400
    size: "1KB"
  - id: "hsem"
    type: "hsem"
    base_address: 0x58001400
    size: "1KB"
  # ── Tier-1 peripherals (RM0434). The RCC model is profile stm32v2, so the
  # clock-gate `reg:` names resolve to the V2 enable-register offsets
  # (ahb2enr@0x8C, apb1lenr@0x9C, apb2enr@0xA4); the `bit:` values are the
  # silicon RM0434 §6.4 enable bits for each block's real bus. ─────────────
  # TIM2 — 32-bit GP timer (APB1). RCC_APB1ENR1.TIM2EN (bit 0).
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
    config:
      width: 32
    clock: { reg: "apb1enr", bit: 0 }
  # TIM1 — advanced-control PWM timer (APB2). The `_pwm` id suffix declares the
  # pwm class alongside timer. RCC_APB2ENR.TIM1EN (bit 11).
  - id: "tim1_pwm"
    type: "timer"
    base_address: 0x40012C00
    size: "1KB"
    irq: 24
    config:
      advanced: true
    clock: { reg: "apb2enr", bit: 11 }
  # I2C1 (APB1) — modern v2 controller. RCC_APB1ENR1.I2C1EN (bit 21).
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 30
    config:
      profile: "stm32l4"
    clock: { reg: "apb1enr", bit: 21 }
  # SPI1 (APB2). RCC_APB2ENR.SPI1EN (bit 12).
  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 34
    config:
      profile: "stm32_fifo"
    clock: { reg: "apb2enr", bit: 12 }
  # ADC1 (AHB2). RCC_AHB2ENR.ADCEN (bit 13). Model has no conversion engine
  # (L4 layout) — the genuinely-modelled DEEPPWD→ADVREGEN→ADEN→ADRDY power-up
  # path is exercised.
  - id: "adc1"
    type: "adc"
    base_address: 0x50040000
    size: "1KB"
    irq: 18
    config:
      profile: "stm32l4"
    clock: { reg: "ahb2enr", bit: 13 }
  # DMA1 (AHB1, 7-channel + DMAMUX). RM0434 puts DMA1EN on AHB1ENR (bit 0),
  # which the stm32v2 RCC model does not surface (it exposes only
  # ahb2enr/apb1lenr/apb2enr), so the channel is declared ungated; the
  # mem-to-mem round-trip is the truthful proof of the model.
  - id: "dma1"
    type: "dma"
    base_address: 0x40020000
    size: "1KB"
    irq: 11
  # IWDG — clocked by the LSI, no RCC enable gate on silicon (ungated).
  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"
  # RTC (APB1) — register interface gated by RCC_APB1ENR1.RTCAPBEN (bit 10).
  - id: "rtc"
    type: "rtc"
    base_address: 0x40002800
    size: "1KB"
    irq: 2
    clock: { reg: "apb1enr", bit: 10 }
  # NVIC is wired unconditionally for Cortex-M machines; this entry declares
  # the tier1 irq class and pins the canonical base.
  - id: "nvic"
    type: "nvic"
    base_address: 0xE000E100
    size: "1KB"
