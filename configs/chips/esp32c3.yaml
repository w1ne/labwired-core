name: "esp32c3"
arch: "riscv"
registers_count: 50
flash:
  base: 0x42000000
  size: "4MB"
ram:
  base: 0x3FC80000
  size: "400KB"
# Additional CPU-visible memory windows real IDF apps link into. On silicon the
# C3's 400KB SRAM is reachable via both the data bus (the `ram` window above,
# 0x3FC80000) and the instruction bus (IRAM, 0x4037C000); flash is cached at
# both the IROM window (`flash`, 0x42000000, code) and the DROM window
# (0x3C000000, rodata). Without these, an IDF app's entry (IRAM) and rodata
# (DROM) segments fall outside the memory map and never load.
memory_regions:
  - name: "iram"
    base: 0x4037C000
    size: "384KB"
  - name: "drom"
    base: 0x3C000000
    size: "8MB"
  # RTC FAST memory (8KB): CPU-visible retention RAM the IDF uses for boot-time
  # timekeeping (esp_rtc_get_time_us reads s_boot_time here) and deep-sleep
  # stubs. Unmapped, esp_rtc_get_time_us faults during cpu_start.
  - name: "rtc_fast"
    base: 0x50000000
    size: "8KB"
  # Mask ROM (the C3 calls ROM routines during early boot). The dump is the
  # chip's copyrighted mask ROM, so it's loaded from a path in
  # LABWIRED_ESP32C3_ROM rather than committed; region stays zero if unset.
  # Dump it from live silicon: openocd dump_image rom.bin 0x40000000 0x60000.
  - name: "rom"
    base: 0x40000000
    size: "384KB"
    image_env: "LABWIRED_ESP32C3_ROM"
  # ROM constant data (jump tables, function-pointer tables the ROM code reads).
  # Without it, ROM jump tables read zeros and the ROM jumps to garbage.
  # Dump: openocd dump_image rom_data.bin 0x3FF00000 0x20000.
  - name: "rom_data"
    base: 0x3FF00000
    size: "128KB"
    image_env: "LABWIRED_ESP32C3_ROM_DATA"
peripherals:
  - id: "uart0"
    type: "uart"
    base_address: 0x60000000
    size: "512B"
  - id: "gpio"
    type: "esp32c3_gpio"
    base_address: 0x60004000
    size: "4KB"
  - id: "timg0"
    type: "esp32_timg"
    base_address: 0x6001F000
  - id: "interrupt_core0"
    type: "declarative"
    base_address: 0x600C2000
    config:
      path: "../peripherals/esp32c3/interrupt_core0.yaml"
  # --- Blocks onboarded 2026-06-11: descriptors silicon-corroborated against a
  # --- live ESP32-C3 (rev v0.4) reset-state capture (366/423 reg reset values
  # --- matched; the rest are ROM-touched/dynamic). See examples/esp32c3/VALIDATION.md.
  - id: "uart1"
    type: "uart"
    base_address: 0x60010000
    size: "512B"
  - id: "timg1"
    type: "esp32_timg"
    base_address: 0x60020000
  - id: "system"
    type: "declarative"
    base_address: 0x600C0000
    config:
      path: "../peripherals/esp32c3/system.yaml"
  - id: "rtc_cntl"
    type: "declarative"
    base_address: 0x60008000
    config:
      path: "../peripherals/esp32c3/rtc_cntl.yaml"
  - id: "apb_ctrl"
    type: "declarative"
    base_address: 0x60026000
    config:
      path: "../peripherals/esp32c3/apb_ctrl.yaml"
  - id: "systimer"
    type: "declarative"
    base_address: 0x60023000
    config:
      path: "../peripherals/esp32c3/systimer.yaml"
  - id: "io_mux"
    type: "esp32c3_io_mux"
    base_address: 0x60009000
    config:
      path: "../peripherals/esp32c3/io_mux.yaml"
  # Behavioral I²C0 controller (command-list engine). The C3 I²C is the same
  # Espressif IP family as the S3, so this drives attached I2cDevice slaves
  # declared in a system.yaml `external_devices` (connection: "i2c0") — the
  # foundation for running real I²C sensors (e.g. MLX90640) on a C3 in sim.
  # The register layout still matches ../peripherals/esp32c3/i2c0.yaml (the SVD
  # descriptor that this model was diffed against); the behavioral model adds
  # the transaction engine the declarative descriptor lacks.
  - id: "i2c0"
    type: "esp32c3_i2c"
    base_address: 0x60013000
    size: "4KB"
  # GP-SPI2 (FSPI) behavioral master: the CPU/W-buffer transaction engine
  # (crates/core/src/peripherals/esp32c3/spi.rs). Same Espressif GP-SPI IP
  # family as the S3 SPI2; the register layout still matches
  # ../peripherals/esp32c3/spi2.yaml (the SVD descriptor it was diffed against),
  # and the behavioral model adds the CMD.USR launch handshake + TRANS_DONE
  # latching the declarative descriptor lacks.
  - id: "spi2"
    type: "esp32c3_spi"
    base_address: 0x60024000
    size: "4KB"
  # Behavioral LEDC (LED PWM) controller
  # (crates/core/src/peripherals/esp32c3/ledc.rs): the four low-speed timers
  # run as live up-counters clocked by elapsed cycles, each wrapping at its
  # programmed 2^DUTY_RES period and latching LSTIMERx_OVF — a real timer the
  # declarative descriptor lacks. The register layout still matches
  # ../peripherals/esp32c3/ledc.yaml (the SVD descriptor it was diffed against).
  - id: "ledc"
    type: "esp32c3_ledc"
    base_address: 0x60019000
    size: "1KB"
  - id: "rmt"
    type: "declarative"
    base_address: 0x60016000
    config:
      path: "../peripherals/esp32c3/rmt.yaml"
  # --- Estate completion 2026-06-11: the remaining SVD-documented blocks the
  # --- ESP32-C3 silicon exposes. Bases are authoritative from the ESP32-C3 SVD
  # --- (tests/fixtures/real_world/esp32c3.svd). Reset values silicon-validated
  # --- against the live C3 (rev v0.4, MAC 38:44:be:42:f5:58); see
  # --- examples/esp32c3/VALIDATION.md and the reset-conformance test.
  # Flash/PSRAM SPI controllers
  - id: "spi1"
    type: "declarative"
    base_address: 0x60002000
    config:
      path: "../peripherals/esp32c3/spi1.yaml"
  - id: "spi0"
    type: "declarative"
    base_address: 0x60003000
    config:
      path: "../peripherals/esp32c3/spi0.yaml"
  # GPIO sigma-delta (narrow window inside the GPIO range)
  - id: "gpio_sd"
    type: "declarative"
    base_address: 0x60004F00
    config:
      path: "../peripherals/esp32c3/gpio_sd.yaml"
  # eFuse controller
  - id: "efuse"
    type: "declarative"
    base_address: 0x60008800
    config:
      path: "../peripherals/esp32c3/efuse.yaml"
  # UART DMA bridges
  - id: "uhci1"
    type: "declarative"
    base_address: 0x6000C000
    config:
      path: "../peripherals/esp32c3/uhci1.yaml"
  - id: "uhci0"
    type: "declarative"
    base_address: 0x60014000
    config:
      path: "../peripherals/esp32c3/uhci0.yaml"
  # Radio baseband control block (documented control path; WiFi/BT MAC remains
  # thunk-backed — Espressif does not publish those registers).
  - id: "bb"
    type: "declarative"
    base_address: 0x6001D000
    config:
      path: "../peripherals/esp32c3/bb.yaml"
  # TWAI / CAN controller
  - id: "twai0"
    type: "declarative"
    base_address: 0x6002B000
    config:
      path: "../peripherals/esp32c3/twai0.yaml"
  # I2S
  - id: "i2s0"
    type: "declarative"
    base_address: 0x6002D000
    config:
      path: "../peripherals/esp32c3/i2s0.yaml"
  # (Hardware RNG is not a separate window: RNG_DATA lives at APB_CTRL+0xB0,
  # already modeled as apb_ctrl's RND_DATA register.)
  # Crypto accelerator estate
  - id: "aes"
    type: "declarative"
    base_address: 0x6003A000
    config:
      path: "../peripherals/esp32c3/aes.yaml"
  - id: "sha"
    type: "declarative"
    base_address: 0x6003B000
    config:
      path: "../peripherals/esp32c3/sha.yaml"
  - id: "rsa"
    type: "declarative"
    base_address: 0x6003C000
    config:
      path: "../peripherals/esp32c3/rsa.yaml"
  - id: "ds"
    type: "declarative"
    base_address: 0x6003D000
    config:
      path: "../peripherals/esp32c3/ds.yaml"
  - id: "hmac"
    type: "declarative"
    base_address: 0x6003E000
    config:
      path: "../peripherals/esp32c3/hmac.yaml"
  # GDMA (general DMA)
  - id: "dma"
    type: "declarative"
    base_address: 0x6003F000
    config:
      path: "../peripherals/esp32c3/dma.yaml"
  # SAR ADC behavioral one-shot engine
  # (crates/core/src/peripherals/esp32c3/apb_saradc.rs): a ONETIME_SAMPLE
  # conversion produces a channel-dependent result + DONE handshake. The
  # register layout matches ../peripherals/esp32c3/apb_saradc.yaml (the SVD
  # descriptor it was built against).
  - id: "apb_saradc"
    type: "esp32c3_apb_saradc"
    base_address: 0x60040000
    size: "4KB"
  # USB Serial/JTAG (the on-chip debug/console port)
  - id: "usb_device"
    type: "declarative"
    base_address: 0x60043000
    config:
      path: "../peripherals/esp32c3/usb_device.yaml"
  # Security / permission control
  - id: "sensitive"
    type: "declarative"
    base_address: 0x600C1000
    config:
      path: "../peripherals/esp32c3/sensitive.yaml"
  # External memory / cache controller
  - id: "extmem"
    type: "declarative"
    base_address: 0x600C4000
    config:
      path: "../peripherals/esp32c3/extmem.yaml"
  # Flash XTS-AES encryption
  - id: "xts_aes"
    type: "declarative"
    base_address: 0x600CC000
    config:
      path: "../peripherals/esp32c3/xts_aes.yaml"
  # Debug assist
  - id: "assist_debug"
    type: "declarative"
    base_address: 0x600CE000
    config:
      path: "../peripherals/esp32c3/assist_debug.yaml"
  # --- Radio (WiFi/BT) register-backed model, REVERSE-ENGINEERED from live
  # --- silicon (not SVD/TRM). See docs/esp32c3_radio_reverse_engineering.md.
  # --- Layer 1: config windows are register-backed so driver writes succeed
  # --- instead of faulting. reset_value = cold (pre-phy_enable) silicon read.
  # --- (Behavioral MAC status/DMA = layer 2, separate.)
  - id: "radio_fe"
    type: "declarative"
    base_address: 0x60006000
    config:
      path: "../peripherals/esp32c3/radio_fe.yaml"
  - id: "radio_nrx"
    type: "declarative"
    base_address: 0x6001CC00
    config:
      path: "../peripherals/esp32c3/radio_nrx.yaml"
  - id: "wifi_mac"
    type: "declarative"
    base_address: 0x60033000
    size: "12KB"
    config:
      path: "../peripherals/esp32c3/wifi_mac.yaml"
  # (ROM is now a real memory_region above, loaded from LABWIRED_ESP32C3_ROM,
  # so the C3's actual mask-ROM routines execute during boot.)
