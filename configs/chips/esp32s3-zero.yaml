#
# ESP32-S3-Zero (FH4R2 variant) chip descriptor for Plan 2.
#
# This YAML is documentation of the memory map; the simulator's
# crate::system::xtensa::configure_xtensa_esp32s3 function is the
# authoritative wiring code. The YAML is loaded by the CLI to validate
# that --chip references a known chip.

name: "esp32s3-zero"
arch: "xtensa-lx7"
flash:
  base: 0x42000000
  size: "4MiB"
ram:
  base: 0x3FC88000
  size: "480KiB"
peripherals:
  - id: "iram"
    type: "ram"
    base_address: 0x40370000
    size: "512KiB"
  - id: "rom_thunks"
    type: "rom_thunk_bank"
    base_address: 0x40000000
    size: "384KiB"
  - id: "flash_icache"
    type: "flash_xip"
    base_address: 0x42000000
    size: "4MiB"
  - id: "flash_dcache"
    type: "flash_xip"
    base_address: 0x3C000000
    size: "4MiB"
  - id: "usb_serial_jtag"
    type: "usb_serial_jtag"
    base_address: 0x60038000
    size: "4KiB"
  - id: "systimer"
    type: "systimer"
    base_address: 0x60023000
    size: "4KiB"
  - id: "system"
    type: "system_stub"
    base_address: 0x600C0000
    size: "4KiB"
  - id: "rtc_cntl"
    type: "rtc_cntl_stub"
    base_address: 0x60008000
    size: "4KiB"
  - id: "efuse"
    type: "efuse_stub"
    base_address: 0x60007000
    size: "4KiB"
  - id: "i2c0"
    type: "i2c"
    base_address: 0x60013000
    size: "4KiB"
  # Address-map declarations matching configure_xtensa_esp32s3's
  # programmatic registrations (model sources in
  # crates/core/src/peripherals/esp32s3/).
  - id: "uart0"
    type: "uart"
    base_address: 0x60000000
    size: "512B"
  - id: "gpio"
    type: "gpio"
    base_address: 0x60004000
    size: "2KiB"
    # Placeholder layout: the ESP32-S3 GPIO matrix has no dedicated GpioPort
    # model yet, and this chip boots via the Xtensa system builder (not the
    # from_config GPIO path). Pinned explicitly to the classic STM32F1 map it
    # historically resolved to, so the profile is a visible choice rather than
    # an omission-driven silent default (see SystemBus::gpio_layout_for).
    config:
      profile: "stm32f1"
  - id: "timg0"
    type: "timer_group"
    base_address: 0x6001F000
    size: "4KiB"
  - id: "interrupt_core0"
    type: "intmatrix"
    base_address: 0x600C2000
    size: "4KiB"
  - id: "gdma"
    type: "gdma"
    base_address: 0x6003F000
    size: "4KiB"
  - id: "mcpwm0"
    type: "mcpwm"
    base_address: 0x6001E000
    size: "4KiB"
  - id: "rmt"
    type: "rmt"
    base_address: 0x60016000
    size: "4KiB"
