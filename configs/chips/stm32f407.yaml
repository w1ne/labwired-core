#
# STM32F407VGT6 — Cortex-M4F, 1MB flash, 192KB RAM (128KB main + 64KB CCM
# not declared here). Reference board: STM32F4-DISCO / Nucleo-F407ZG.
#
# Scope is intentionally minimal — only the peripherals the F407 I²C
# onboarding lane (AHT20 + BMP280 over I²C1) requires. The Cortex-M4F
# CPU core, the I²C IP block (legacy F1/F2/F4 register layout, default in
# crates/core/src/peripherals/i2c.rs), and GPIO are the load-bearing
# pieces. Add more peripherals here as new firmware needs them.

name: "stm32f407vgt6"
arch: "arm"
core: "cortex-m4"
registers_count: 150
flash:
  base: 0x08000000
  size: "1MB"
ram:
  base: 0x20000000
  size: "128KB"
peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x40023800
    size: "1KB"
    config:
      profile: "stm32f4"
      # ENR writable masks = the F407's implemented-peripheral set, silicon-
      # confirmed on the bench F407 (stm32f4_mmio_diff). Per-part: the smaller
      # F401 sharing F4Rcc keeps the default (unmasked) until benched.
      rcc_ahb1enr_mask: 0x7E7411FF
      rcc_apb1enr_mask: 0x36FEC9FF
      rcc_apb2enr_mask: 0x00075F33
  - id: "gpioa"
    type: "stm32f4_gpio"
    base_address: 0x40020000
    size: "1KB"
  - id: "gpiob"
    type: "stm32f4_gpio"
    base_address: 0x40020400
    size: "1KB"
  - id: "gpioc"
    type: "stm32f4_gpio"
    base_address: 0x40020800
    size: "1KB"
  - id: "gpiod"
    type: "stm32f4_gpio"
    base_address: 0x40020C00
    size: "1KB"
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 38
    # F4 USART CR3 adds bit 11 (ONEBIT) over the shared F1 map → 0xFFF.
    # Silicon-confirmed on the bench F407 (stm32f4_mmio_diff).
    config:
      cr3_mask: 0xFFF
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
    # I2C1 is clocked from RCC_APB1ENR.I2C1EN (bit 21). Unclocked out of reset
    # (RM0090 §6.3.13) — registers read 0 / drop writes until the clock is on.
    clock: { reg: "apb1enr", bit: 21 }
  - id: "gpioe"
    type: "stm32f4_gpio"
    base_address: 0x40021000
    size: "1KB"
  - id: "tim1"
    type: "timer"
    base_address: 0x40010000
    size: "1KB"
    irq: 27
    config:
      advanced: true
  - id: "tim2"
    type: "timer"
    base_address: 0x40000000
    size: "1KB"
    irq: 28
    config:
      width: 32
    # TIM2 is clocked from RCC_APB1ENR.TIM2EN (bit 0). Unclocked out of reset
    # (RM0090 §6.3.11) — ARR reads its 0xFFFFFFFF reset only once the clock is on.
    clock: { reg: "apb1enr", bit: 0 }
  - id: "tim3"
    type: "timer"
    base_address: 0x40000400
    size: "1KB"
    irq: 29
  - id: "tim4"
    type: "timer"
    base_address: 0x40000800
    size: "1KB"
    irq: 30
  - id: "tim5"
    type: "timer"
    base_address: 0x40000C00
    size: "1KB"
    irq: 50
    config:
      width: 32
  - id: "usart1"
    type: "uart"
    base_address: 0x40011000
    size: "1KB"
    irq: 37
    config:
      cr3_mask: 0xFFF
  - id: "usart3"
    type: "uart"
    base_address: 0x40004800
    size: "1KB"
    irq: 39
    config:
      cr3_mask: 0xFFF
  - id: "usart6"
    type: "uart"
    base_address: 0x40011400
    size: "1KB"
    irq: 71
    config:
      cr3_mask: 0xFFF
  - id: "spi1"
    type: "spi"
    base_address: 0x40013000
    size: "1KB"
    irq: 35
    # SPI1 is clocked from RCC_APB2ENR.SPI1EN (bit 12). Unclocked out of reset
    # (RM0090 §6.3.16) — SR.TXE never asserts until the clock is enabled.
    clock: { reg: "apb2enr", bit: 12 }
    # F4 classic SPI CR2 adds bit 4 (FRF/TI-mode) over the F1 map → 0xF7.
    config:
      cr2_mask: 0xF7
      # F407 silicon does not latch CR1 bit 12 (CRCNEXT): writing 0xFFFF reads
      # back 0xEFFF (silicon-confirmed over SWD). F1/L0/L4 leave it writable.
      cr1_mask: 0xEFFF
  - id: "spi2"
    type: "spi"
    base_address: 0x40003800
    size: "1KB"
    irq: 36
    config:
      cr2_mask: 0xF7
      # F407 silicon does not latch CR1 bit 12 (CRCNEXT): writing 0xFFFF reads
      # back 0xEFFF (silicon-confirmed over SWD). F1/L0/L4 leave it writable.
      cr1_mask: 0xEFFF
  - id: "spi3"
    type: "spi"
    base_address: 0x40003C00
    size: "1KB"
    irq: 51
    config:
      cr2_mask: 0xF7
      # F407 silicon does not latch CR1 bit 12 (CRCNEXT): writing 0xFFFF reads
      # back 0xEFFF (silicon-confirmed over SWD). F1/L0/L4 leave it writable.
      cr1_mask: 0xEFFF
  - id: "i2c2"
    type: "i2c"
    base_address: 0x40005800
    size: "1KB"
    irq: 33
  - id: "i2c3"
    type: "i2c"
    base_address: 0x40005C00
    size: "1KB"
    irq: 72
  - id: "adc1"
    type: "adc"
    base_address: 0x40012000
    size: "1KB"
    irq: 18
    # ADC1 is clocked from RCC_APB2ENR.ADC1EN (bit 8 on F4 — NOT bit 9 as on F1).
    # Unclocked out of reset (RM0090 §6.3.16) — the converter is dead until on.
    clock: { reg: "apb2enr", bit: 8 }
  - id: "exti"
    type: "exti"
    base_address: 0x40013C00
    size: "1KB"
    config:
      lines: 23
  # IWDG — independent watchdog (RM0090 §21). Clocked from the dedicated LSI
  # oscillator, NOT an APB/AHB peripheral-enable bit, so it carries no `clock:`
  # gate. The KR key (0x5555) protects PR/RLR writes instead.
  - id: "iwdg"
    type: "iwdg"
    base_address: 0x40003000
    size: "1KB"
  # RTC — calendar real-time clock (RM0090 §26; same IP as the L4 `rtc` model).
  # Lives in the backup domain, clock-enabled via RCC_BDCR.RTCEN — outside the
  # APB/AHB peripheral-enable gate this model expresses, so it is left ungated.
  - id: "rtc"
    type: "rtc"
    base_address: 0x40002800
    size: "1KB"
  - id: "dbgmcu"
    type: "dbgmcu"
    base_address: 0xE0042000
    size: "1KB"
    config:
      # DBGMCU_IDCODE for STM32F407: DEV_ID=0x413, REV_ID=0x1001.
      # Read from the user's silicon via `openocd -f interface/stlink.cfg
      # -f target/stm32f4x.cfg -c "program ... verify reset exit"` — the
      # `device id = 0x10016413` line in the program output is the
      # authoritative source. REV_ID=0x1001 = "Rev 1", the most common
      # silicon revision for STM32F407V/Z/IG.
      idcode: 0x10016413
  # DMA1 / DMA2 — stream-based DMA controllers (RM0090 §10). Eight streams each;
  # DMA2 additionally supports memory-to-memory transfers (RM0090 §10.3.3). Each
  # stream has its own NVIC vector — the F4 stream lines are non-contiguous
  # (stm32f407xx.h), so they are listed explicitly per stream. Clocked from
  # RCC_AHB1ENR (DMA1EN bit 21, DMA2EN bit 22).
  - id: "dma1"
    type: "stm32f4_dma"
    base_address: 0x40026000
    size: "1KB"
    clock: { reg: "ahb1enr", bit: 21 }
    config:
      # DMA1_Stream0..7 NVIC positions (stm32f407xx.h): 11..17, then 47.
      stream_irqs: [11, 12, 13, 14, 15, 16, 17, 47]
  - id: "dma2"
    type: "stm32f4_dma"
    base_address: 0x40026400
    size: "1KB"
    clock: { reg: "ahb1enr", bit: 22 }
    config:
      dma2: true
      # DMA2_Stream0..7 NVIC positions (stm32f407xx.h): 56..60, then 68..70.
      stream_irqs: [56, 57, 58, 59, 60, 68, 69, 70]
  # FLASH interface + PWR — required by Arduino/STM32 core bring-up
  # (HAL_RCC_ClockConfig waits on FLASH_ACR latency; SystemInit touches PWR).
  # Same bindings as stm32f401.yaml; without them Arduino sketches bus-fault
  # at 0x40023C00 / 0x40007000 (see validation/arduino-matrix).
  - id: "flash"
    type: "flash"
    base_address: 0x40023C00
    size: "1KB"
    config:
      profile: "f1"
  - id: "pwr"
    type: "pwr"
    base_address: 0x40007000
    size: "1KB"
