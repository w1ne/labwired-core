#
# STM32F407VGT6 — Cortex-M4F, 1MB flash, 192KB RAM (128KB main + 64KB CCM
# not declared here). Reference board: STM32F4-DISCO / Nucleo-F407ZG.
#
# Scope is intentionally minimal — only the peripherals the F407 I²C
# onboarding lane (AHT20 + BMP280 over I²C1) requires. The Cortex-M4F
# CPU core, the I²C IP block (legacy F1/F2/F4 register layout, default in
# crates/core/src/peripherals/i2c.rs), and GPIO are the load-bearing
# pieces. Add more peripherals here as new firmware needs them.

name: "stm32f407vgt6"
arch: "arm"
registers_count: 150
flash:
  base: 0x08000000
  size: "1MB"
ram:
  base: 0x20000000
  size: "128KB"
peripherals:
  - id: "rcc"
    type: "rcc"
    base_address: 0x40023800
    size: "1KB"
    config:
      profile: "stm32f4"
  - id: "gpioa"
    type: "stm32f4_gpio"
    base_address: 0x40020000
    size: "1KB"
  - id: "gpiob"
    type: "stm32f4_gpio"
    base_address: 0x40020400
    size: "1KB"
  - id: "gpioc"
    type: "stm32f4_gpio"
    base_address: 0x40020800
    size: "1KB"
  - id: "gpiod"
    type: "stm32f4_gpio"
    base_address: 0x40020C00
    size: "1KB"
  - id: "systick"
    type: "systick"
    base_address: 0xE000E010
  - id: "uart2"
    type: "uart"
    base_address: 0x40004400
    size: "1KB"
    irq: 38
  - id: "i2c1"
    type: "i2c"
    base_address: 0x40005400
    size: "1KB"
    irq: 31
