[platformio]
src_dir = ../../examples/esp32c3-display-workshop-arduino
boards_dir = boards

[env]
platform = espressif32@7.0.1
board = esp32-c3-supermini
framework = arduino
monitor_speed = 115200

[env:oled_128x64]
build_flags = -DWORKSHOP_OLED_HEIGHT=64

[env:oled_128x32]
build_flags = -DWORKSHOP_OLED_HEIGHT=32
