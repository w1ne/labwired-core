[package]
name = "labwired-wasm"
version.workspace = true
edition = "2021"
license.workspace = true
publish = false

[lib]
crate-type = ["cdylib"]

# wasm-pack's default release pass is a bare `wasm-opt -O`, which (a) does NOT
# strip the DWARF debug info the workspace `debug = true` profile bakes in — the
# shipped bg.wasm was 4.5 MB, roughly half of it debug sections that the browser
# downloads and never uses — and (b) rejects the bulk-memory/simd128 opcodes we
# now emit (see .cargo/config.toml). This override strips debug and opts at -O3
# while allowing the post-MVP features. Keep the feature flags here in sync with
# the target-feature list in .cargo/config.toml.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3", "--strip-debug", "--enable-bulk-memory", "--enable-simd", "--enable-nontrapping-float-to-int"]

[dependencies]
wasm-bindgen = "0.2.92"
# #124 Phase 4: js-sys exposes `js_sys::WebAssembly::{Module, Instance}` used
# by the browser-side JIT prototype in `src/jit_browser.rs`. Already a
# transitive dep of `serde-wasm-bindgen`; pinning it here makes the direct
# usage visible at the dep boundary.
js-sys = "0.3"
# Phase 2B.3c (issue #192): the browser sim runs ESP32-classic via
# `configure_xtensa_esp32`, where every peripheral is migrated or inert — so the
# event-scheduler's per-cycle-walk deletion gives ~2.4x throughput (1.48 -> 3.57
# MIPS on the epaper firmware). Other arches keep the legacy walk; the feature is
# behaviour-neutral for them (full suite green flag-on). Enabled here to ship it.
labwired-core = { path = "../core", features = ["event-scheduler"] }
labwired-config = { path = "../config" }
labwired-loader = { path = "../loader" }
cortex-m = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
serde-wasm-bindgen = "0.6"
labwired-gdbstub = { path = "../gdbstub" }
gdbstub = "0.7"
gdbstub_arch = "0.3"
anyhow = "1.0"
tracing = "0.1"
