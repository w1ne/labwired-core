repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-added-large-files

-   repo: local
    hooks:
    -   id: cargo-fmt
        name: cargo fmt
        description: Check formatting with cargo fmt
        entry: cargo fmt --manifest-path core/Cargo.toml --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

    -   id: cargo-clippy
        name: cargo clippy
        description: Run clippy on the workspace
        entry: cargo clippy --manifest-path core/Cargo.toml --workspace --exclude firmware-armv6m-hello --exclude firmware-stm32f103-blinky --exclude firmware-stm32f103-uart --exclude firmware-armv6m-ci-fixture --exclude firmware-armv7m-benchmark --exclude firmware-f401-demo --exclude firmware-h563-demo --exclude firmware-h563-fullchip-demo --exclude firmware-h563-io-demo --exclude firmware-hil-showcase --exclude firmware-nrf52832-demo --exclude firmware-rp2040-pio-onboarding --exclude firmware-rv32i-ci-fixture --exclude firmware-rv32i-hello -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

    -   id: cargo-check
        name: cargo check
        description: Run cargo check on the workspace
        entry: cargo check --manifest-path core/Cargo.toml --workspace --exclude firmware-armv6m-hello --exclude firmware-stm32f103-blinky --exclude firmware-stm32f103-uart --exclude firmware-armv6m-ci-fixture --exclude firmware-armv7m-benchmark --exclude firmware-f401-demo --exclude firmware-h563-demo --exclude firmware-h563-fullchip-demo --exclude firmware-h563-io-demo --exclude firmware-hil-showcase --exclude firmware-nrf52832-demo --exclude firmware-rp2040-pio-onboarding --exclude firmware-rv32i-ci-fixture --exclude firmware-rv32i-hello
        language: system
        types: [rust]
        pass_filenames: false
