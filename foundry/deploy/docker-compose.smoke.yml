services:
  foundry-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      APP_ENV: "development"
      LABWIRED_PATH: "sh"
      DB_PATH: "/data/foundry.db"
      ARTIFACTS_DIR: "/data/artifacts"
      DATA_DIR: "/data"
      HARDWARE_JSON_PATH: "/app/configs/hardware.json"
      CORE_CONFIGS_DIR: "/app/core-configs"
      ALLOW_INSECURE_STRIPE_WEBHOOKS: "true"
    volumes:
      - foundry_smoke_data:/data
      - ../../core/configs:/app/core-configs:ro
    networks:
      - foundry_smoke_net

  foundry-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ""
    networks:
      - foundry_smoke_net

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - foundry-backend
      - foundry-frontend
    ports:
      - "8088:80"
    volumes:
      - ./Caddyfile.smoke:/etc/caddy/Caddyfile:ro
    networks:
      - foundry_smoke_net

volumes:
  foundry_smoke_data:

networks:
  foundry_smoke_net:
    driver: bridge
