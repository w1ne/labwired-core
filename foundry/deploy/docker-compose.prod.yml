services:
  foundry-backend:
    image: "${BACKEND_IMAGE:-ghcr.io/w1ne/foundry-backend}:${BACKEND_IMAGE_TAG:-latest}"
    restart: unless-stopped
    environment:
      PORT: "8080"
      APP_ENV: "production"
      LABWIRED_PATH: "labwired"
      DB_PATH: "/data/foundry.db"
      ARTIFACTS_DIR: "/data/artifacts"
      HARDWARE_JSON_PATH: "/app/configs/renode_hardware.json"
      WORKER_CONCURRENCY: "4"
      WORKSPACE_MAX_INFLIGHT: "8"
      ARTIFACT_RETENTION_DAYS: "14"
      RUN_METADATA_RETENTION_DAYS: "90"
      ARTIFACT_CLEANUP_INTERVAL_SECONDS: "3600"
      WORKER_LEASE_TIMEOUT_SECONDS: "45"
      WORKER_HEARTBEAT_INTERVAL_SECONDS: "10"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      ALLOW_INSECURE_STRIPE_WEBHOOKS: "false"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    volumes:
      - foundry_data:/data
      - ${LABWIRED_BINARY_PATH:-/srv/labwired/bin/labwired}:/usr/local/bin/labwired:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    networks:
      - foundry_net

  foundry-frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/w1ne/foundry-frontend}:${FRONTEND_IMAGE_TAG:-latest}"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    networks:
      - foundry_net

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    depends_on:
      - foundry-backend
      - foundry-frontend
    networks:
      - foundry_net

volumes:
  foundry_data:
  caddy_data:
  caddy_config:

networks:
  foundry_net:
    driver: bridge
