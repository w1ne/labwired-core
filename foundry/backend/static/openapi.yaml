openapi: 3.0.3
info:
  title: LabWired Foundry API
  description: |
    Verification-as-a-Service (VaaS) for autonomous AI hardware agents.
    Includes synthesis, verification, polling, catalog, and usage endpoints.
  version: 1.1.1
servers:
  - url: http://localhost:8080/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
    ClerkBearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        remediation:
          type: string

    CatalogAsset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        pass_rate:
          type: integer
        registers:
          type: integer
        ir_url:
          type: string
        verified:
          type: boolean
        source_type:
          type: string
        source_ref:
          type: string
        source_url:
          type: string
        official_url:
          type: string
        validation_url:
          type: string

    VerificationRequest:
      type: object
      required:
        - chip_yaml
      properties:
        peripheral_id:
          type: string
          description: Optional identifier for your model.
        chip_yaml:
          type: string
          description: LabWired-compatible YAML definition of the peripheral logic.

    SystemVerificationRequest:
      type: object
      required:
        - system_yaml
      properties:
        system_yaml:
          type: string
          description: LabWired system YAML linking MCU and peripherals.

    SynthesisRequest:
      type: object
      required:
        - component_name
        - requirements
      properties:
        component_name:
          type: string
        requirements:
          type: string
        datasheet_url:
          type: string

    QueuedRunResponse:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [queued]
        poll_url:
          type: string

    SynthesisQueuedResponse:
      type: object
      properties:
        job_id:
          type: string
        run_id:
          type: string
        status:
          type: string
          enum: [queued]
        poll_url:
          type: string

    RunArtifacts:
      type: object
      properties:
        ir_url:
          type: string
        vcd_url:
          type: string
        result_url:
          type: string

    RunStatus:
      type: object
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [queued, running, pass, fail, error]
        assertions_passed:
          type: integer
        assertions_total:
          type: integer
        created_at:
          type: string
        artifacts:
          $ref: '#/components/schemas/RunArtifacts'

    APIKeyPublic:
      type: object
      properties:
        id:
          type: string
        key_prefix:
          type: string
        workspace_id:
          type: string
        tier:
          type: string

    AccountUsage:
      type: object
      properties:
        clerk_user_id:
          type: string
        tier:
          type: string
        runs_used_this_month:
          type: integer
        quota:
          type: integer
        runs_remaining:
          type: integer

    QuickstartResponse:
      type: object
      properties:
        key_prefix:
          type: string
        curl:
          type: string

paths:
  /info:
    get:
      summary: API Discovery
      responses:
        '200':
          description: API info

  /health:
    get:
      summary: Health status
      responses:
        '200':
          description: Healthy or degraded status

  /catalog:
    get:
      summary: List verified assets
      responses:
        '200':
          description: A list of catalog assets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogAsset'

  /catalog/{id}:
    get:
      summary: Get catalog asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog asset details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogAsset'
        '404':
          description: Asset not found.

  /estimate:
    post:
      summary: Estimate synthesis cost
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SynthesisRequest'
      responses:
        '200':
          description: Cost estimate.

  /synthesize:
    post:
      summary: Submit synthesis job
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SynthesisRequest'
      responses:
        '202':
          description: Synthesis queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SynthesisQueuedResponse'

  /models/verify:
    post:
      summary: Enqueue model verification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '202':
          description: Verification queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedRunResponse'

  /systems/verify:
    post:
      summary: Enqueue system verification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemVerificationRequest'
      responses:
        '202':
          description: Verification queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedRunResponse'

  /runs:
    get:
      summary: List runs for workspace
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Run list.

  /runs/{run_id}:
    get:
      summary: Get run status
      security:
        - BearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current run status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatus'
        '404':
          description: Run not found.

  /runs/{run_id}/artifacts/{file}:
    get:
      summary: Download run artifact
      security:
        - BearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: file
          in: path
          required: true
          schema:
            type: string
            enum: [output.json, proof.vcd, result.json, error.log]
      responses:
        '200':
          description: Artifact file stream.
        '404':
          description: Artifact or run not found.

  /usage:
    get:
      summary: Get workspace usage/quota
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usage payload.

  /account/usage:
    get:
      summary: Get dashboard usage/quota
      security:
        - ClerkBearerAuth: []
      responses:
        '200':
          description: Account usage across Clerk-owned workspaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountUsage'

  /account/runs:
    get:
      summary: List dashboard runs
      security:
        - ClerkBearerAuth: []
      responses:
        '200':
          description: Recent runs across Clerk-owned workspaces.

  /account/runs/{run_id}:
    get:
      summary: Get dashboard run status
      security:
        - ClerkBearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current dashboard run status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatus'

  /account/runs/{run_id}/artifacts/{file}:
    get:
      summary: Download dashboard run artifact
      security:
        - ClerkBearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
        - name: file
          in: path
          required: true
          schema:
            type: string
            enum: [output.json, proof.vcd, result.json, error.log]
      responses:
        '200':
          description: Artifact file stream.

  /account/keys:
    get:
      summary: List dashboard API keys
      security:
        - ClerkBearerAuth: []
      responses:
        '200':
          description: Active API keys for the Clerk account.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKeyPublic'
    post:
      summary: Create dashboard API key
      security:
        - ClerkBearerAuth: []
      responses:
        '201':
          description: API key created.

  /account/keys/{key_id}:
    delete:
      summary: Revoke dashboard API key
      security:
        - ClerkBearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: API key revoked.

  /account/quickstart:
    get:
      summary: Get personalized dashboard quickstart snippet
      security:
        - ClerkBearerAuth: []
      responses:
        '200':
          description: Curl snippet for human operators.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickstartResponse'

  /account/estimate:
    post:
      summary: Estimate synthesis cost from dashboard
      security:
        - ClerkBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SynthesisRequest'
      responses:
        '200':
          description: Cost estimate.

  /account/synthesize:
    post:
      summary: Submit synthesis job from dashboard
      security:
        - ClerkBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SynthesisRequest'
      responses:
        '202':
          description: Synthesis queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SynthesisQueuedResponse'

  /account/models/verify:
    post:
      summary: Enqueue model verification from dashboard
      security:
        - ClerkBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '202':
          description: Verification queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedRunResponse'

  /account/systems/verify:
    post:
      summary: Enqueue system verification from dashboard
      security:
        - ClerkBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemVerificationRequest'
      responses:
        '202':
          description: Verification queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedRunResponse'

  /hardware:
    get:
      summary: List supported hardware items
      responses:
        '200':
          description: Hardware list.
