openapi: 3.0.3
info:
  title: LabWired Foundry VaaS API
  description: |
    Verification-as-a-Service (VaaS) for autonomous AI hardware agents.
    Provides a standardized loop for task ingestion, context retrieval, and iterative formal verification.
  version: 1.1.0
servers:
  - url: http://localhost:8080/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human/Agent-readable description of what went wrong.
        remediation:
          type: string
          description: Actionable suggestion for the calling agent.

    Task:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          description: High-level description of the peripheral to be synthesized.
        status:
          type: string
          enum: [open, in_progress, completed, failed]

    TaskContext:
      type: object
      properties:
        task_id:
          type: string
        datasheet_excerpts:
          type: array
          items:
            type: string
        memory_map_constraints:
          type: object
          additionalProperties: true

    VerificationRequest:
      type: object
      required:
        - chip_yaml
      properties:
        chip_yaml:
          type: string
          description: LabWired-compatible YAML definition of the peripheral logic.

    VerificationResult:
      type: object
      properties:
        pass:
          type: boolean
        assertions_passed:
          type: integer
        assertions_total:
          type: integer
        compiler_logs:
          type: string
        vcd_url:
          type: string
          description: URL to download the Value Change Dump (VCD) trace.
        error:
          type: string
          description: Detailed error stack trace if verification failed.

  responses:
    UnauthorizedError:
      description: API key is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /info:
    get:
      summary: API Discovery
      description: Returns metadata about the Foundry engine capabilities.
      responses:
        '200':
          description: OK

  /tasks/next:
    get:
      summary: Task Ingestion
      description: Poll for the next available peripheral synthesis task.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A new task to be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '204':
          description: No tasks currently available.

  /tasks/{id}/context:
    get:
      summary: Context Retrieval
      description: Fetch detailed specs, constraints, and datasheet excerpts for a specific task.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detailed task context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskContext'

  /tasks/{id}/verify:
    post:
      summary: Iterative Verification
      description: Submit a peripheral model for formal verification against the task requirements. Returns synchronous execution traces and compiler feedback.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Verification executed. Check `pass` boolean and `compiler_logs` for results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
  /systems/verify:
    post:
      summary: System-Level Verification
      description: Submit a multi-component system netlist for formal verification. Returns synchronous execution traces across multiple buses.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - system_yaml
              properties:
                system_yaml:
                  type: string
                  description: LabWired system YAML linking MCU and peripherals.
      responses:
        '200':
          description: System Verification executed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
